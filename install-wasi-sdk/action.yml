name: Install WASI SDK
description: |
  Install WASI SDK for cross-compiling C/C++ libraries to WebAssembly.
  Fixes compiler env vars so host-native builds are not broken.
inputs:
  version:
    description: WASI SDK version to install
    required: false
    default: "25"
runs:
  using: composite
  steps:
    - name: Ensure python is available
      shell: bash
      run: |
        if ! command -v python &>/dev/null && command -v python3 &>/dev/null; then
          sudo ln -sf "$(command -v python3)" /usr/local/bin/python
        fi

    - name: Install WASI SDK
      uses: bytecodealliance/setup-wasi-sdk-action@b2de090b44eb70013ee96b393727d473b35e1728
      with:
        version: ${{ inputs.version }}
        github-token: ${{ github.token }}

    - name: Fix WASI SDK compiler env vars
      shell: bash
      run: |
        # The setup-wasi-sdk-action sets CC/CXX/AR globally to the WASI SDK
        # compilers. This breaks host-native C compilation because the WASI
        # sysroot lacks host headers (stdlib.h, stdio.h).
        #
        # Fix: move the WASI compilers to target-specific env vars that
        # cc-rs picks up only when building for wasm32-unknown-unknown,
        # and unset the global CC/CXX/AR so host builds use the system compiler.
        if [ -n "${CC:-}" ]; then
          echo "CC_wasm32_unknown_unknown=${CC}" >> "$GITHUB_ENV"
        fi
        if [ -n "${CXX:-}" ]; then
          echo "CXX_wasm32_unknown_unknown=${CXX}" >> "$GITHUB_ENV"
        fi
        if [ -n "${AR:-}" ]; then
          echo "AR_wasm32_unknown_unknown=${AR}" >> "$GITHUB_ENV"
        fi
        echo "CC=" >> "$GITHUB_ENV"
        echo "CXX=" >> "$GITHUB_ENV"
        echo "AR=" >> "$GITHUB_ENV"

    - name: Set WASI_SYSROOT and verify
      shell: bash
      run: |
        echo "WASI SDK installed at: $WASI_SDK_PATH"
        SYSROOT="${WASI_SDK_PATH}/share/wasi-sysroot"
        if [ -d "$SYSROOT" ]; then
          echo "WASI_SYSROOT=${SYSROOT}" >> "$GITHUB_ENV"
          echo "WASI_SYSROOT set to: $SYSROOT"
        else
          echo "::warning::WASI sysroot not found at $SYSROOT"
        fi
