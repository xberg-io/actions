name: Build Documentation
description: >
  Build the documentation site with zensical.
  Supports strict mode for CI (fail on warnings) vs dev mode (permissive).

inputs:
  working-directory:
    description: "Working directory for docs commands"
    required: false
    default: "."
  strict:
    description: "Use strict build mode (fail on warnings, for CI)"
    required: false
    default: "true"
  python-version:
    description: "Python version to use for the docs build"
    required: false
    default: "3.13"
  docs-group:
    description: >
      Name of the uv dependency group that pulls in the docs builder
      (zensical + theme + plugins). Override when a repo names this group
      something other than `doc` (e.g. `docs`).
    required: false
    default: "doc"

runs:
  using: composite
  steps:
    - name: Install Task
      uses: kreuzberg-dev/actions/install-task@v1

    - name: Setup Python environment
      uses: kreuzberg-dev/actions/setup-python-env@v1
      with:
        python-version: ${{ inputs.python-version }}
        # The default install-command only syncs the `dev` group; the docs
        # build needs the docs group (zensical + theme + plugins) too.
        # Include both so `task docs:build` (which uses `uv run --no-sync`)
        # can succeed.
        install-command: "uv sync --all-extras --all-packages --group dev --group ${{ inputs.docs-group }} --no-install-project --no-install-workspace"

    - name: Build documentation
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        if [ "${{ inputs.strict }}" = "true" ]; then
          if [ -x "$(command -v task)" ]; then
            task docs:build:strict
          else
            zensical build --strict --clean
          fi
        else
          if [ -x "$(command -v task)" ]; then
            task docs:build
          else
            zensical build --clean
          fi
        fi
