name: Finalize Release
description: >
  Post-publish: edit the GitHub Release from draft to published, set or
  clear the prerelease flag, optionally create a Go module tag, and write
  a step summary. Idempotent — safe to re-run on already-finalized
  releases.

inputs:
  tag:
    description: "Git tag for the release"
    required: true
  is-prerelease:
    description: >
      "true"/"false" to force the prerelease flag, or "auto" to derive from
      the tag suffix (-rc/-alpha/-beta/-pre).
    required: false
    default: "auto"
  go-module-path:
    description: >
      If non-empty, additionally create a Go module subdir tag so consumers
      can resolve the version. Default behavior: strip a trailing `/vN`
      (N>=2) segment from the path before composing the tag (e.g.
      `packages/go/v5` → tag `packages/go/{tag}`); this matches the canonical
      Go layout where `go.mod` lives at the stripped path. Set
      `go-strip-major-version: false` when `go.mod` actually lives at the
      subdirectory path (e.g. `packages/go/v5/go.mod`), in which case the tag
      becomes `packages/go/v5/{tag}`.
    required: false
    default: ""
  go-strip-major-version:
    description: >
      "true" (default) strips a trailing `/vN` (N>=2) from `go-module-path`
      before tagging. "false" uses the path verbatim — required when
      `go.mod` is at `{go-module-path}/go.mod` rather than at the stripped
      parent.
    required: false
    default: "true"
  dry-run:
    description: "Print intended actions without modifying the release"
    required: false
    default: "false"
  token:
    description: "GitHub token for authentication"
    required: false
    default: ${{ github.token }}

outputs:
  finalized:
    description: "One of: true, false, already-finalized"
    value: ${{ steps.finalize.outputs.finalized }}
  prerelease-flag:
    description: "Resolved prerelease flag (true or false)"
    value: ${{ steps.finalize.outputs.prerelease-flag }}

runs:
  using: composite
  steps:
    - name: Finalize release
      id: finalize
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        # The finalize job typically runs without `actions/checkout`, so the gh
        # CLI has no git remote to auto-detect the repo from. Set GH_REPO so
        # `gh release view`/`edit` resolve correctly.
        GH_REPO: ${{ github.repository }}
        INPUT_TAG: ${{ inputs.tag }}
        INPUT_IS_PRERELEASE: ${{ inputs.is-prerelease }}
        INPUT_GO_MODULE_PATH: ${{ inputs.go-module-path }}
        INPUT_GO_STRIP_MAJOR_VERSION: ${{ inputs.go-strip-major-version }}
        INPUT_DRY_RUN: ${{ inputs.dry-run }}
        INPUT_REPO: ${{ github.repository }}
      run: |
        python3 "${{ github.action_path }}/scripts/finalize_release.py"
