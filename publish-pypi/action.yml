name: Publish to PyPI
description: >
  Publish Python packages to PyPI via uv's trusted-publishing (OIDC) flow.
  Avoids the pypa/gh-action-pypi-publish Docker action, which fails when
  invoked inside a composite action because it caches its image at
  ghcr.io/<composite-action-repo>:<ref> — a namespace the composite repo
  rarely has permission to publish/pull from.

inputs:
  packages-dir:
    description: "Directory containing wheel and sdist files"
    required: true
  dry-run:
    description: "Perform a dry run without publishing"
    required: false
    default: "false"
  repository-url:
    description: "Override the upload URL (e.g. https://test.pypi.org/legacy/)"
    required: false
    default: "https://upload.pypi.org/legacy/"

outputs:
  published:
    description: "Whether packages were published"
    value: ${{ steps.publish.outputs.published }}
  skipped:
    description: "Whether the publish was skipped because the version was already on the registry"
    value: ${{ steps.validate.outputs.version_published }}

runs:
  using: composite
  steps:
    - name: Validate packages and check idempotency
      id: validate
      shell: bash
      env:
        INPUT_PACKAGES_DIR: ${{ inputs.packages-dir }}
        INPUT_DRY_RUN: ${{ inputs.dry-run }}
        INPUT_REPOSITORY_URL: ${{ inputs.repository-url }}
      run: python3 "${{ github.action_path }}/scripts/publish.py"

    - name: Install uv
      if: inputs.dry-run != 'true' && steps.validate.outputs.version_published != 'true'
      uses: astral-sh/setup-uv@v9.0.0
      with:
        enable-cache: false

    - name: Publish to PyPI via trusted publishing
      if: inputs.dry-run != 'true' && steps.validate.outputs.version_published != 'true'
      shell: bash
      env:
        UV_PUBLISH_URL: ${{ inputs.repository-url }}
        PACKAGES_DIR: ${{ inputs.packages-dir }}
      run: |
        set -euo pipefail
        # Derive the simple-index URL from the upload URL so `--check-url` can skip
        # files already on the registry (e.g. https://upload.pypi.org/legacy/ ->
        # https://pypi.org/simple/). Without it, uploading a directory that spans
        # multiple packages (the integrations dist: crewai/txtai/surrealdb/...) fails
        # the moment one package's version already exists from an earlier partial run.
        # The coarse version-level idempotency check in publish.py bails on multi-package
        # dirs, so this per-file skip is what makes those re-runs succeed.
        base="${UV_PUBLISH_URL%/}"
        base="${base%/legacy}"
        base="$(printf '%s' "$base" | sed -E 's#^([a-z]+://)upload\.#\1#')"
        check_url="$base/simple/"
        # uv discovers the GHA OIDC token via ACTIONS_ID_TOKEN_REQUEST_{URL,TOKEN}
        # and exchanges it with PyPI's mint-token endpoint automatically.
        uv publish \
          --trusted-publishing automatic \
          --publish-url "$UV_PUBLISH_URL" \
          --check-url "$check_url" \
          "$PACKAGES_DIR"/*

    - name: Set output
      id: publish
      shell: bash
      run: |
        if [ "${{ steps.validate.outputs.version_published }}" = "true" ] || [ "${{ inputs.dry-run }}" = "true" ]; then
          echo "published=false" >> "$GITHUB_OUTPUT"
        else
          echo "published=true" >> "$GITHUB_OUTPUT"
        fi
