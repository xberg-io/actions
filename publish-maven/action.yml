name: Publish to Maven Central
description: >
  Deploy Maven artifacts to Maven Central with GPG signing.
  Handles already-published versions idempotently.

  Auth via env: `MAVEN_USERNAME`, `MAVEN_PASSWORD` (Sonatype Central Portal
  user token), `MAVEN_GPG_PASSPHRASE`. The GPG private key is imported from
  the `MAVEN_GPG_PRIVATE_KEY` env var. Accepts both ASCII-armored format
  (`-----BEGIN PGP PRIVATE KEY BLOCK-----`) and base64-encoded armored
  (auto-detected). If the GPG key is already in the keyring (e.g. you ran
  `actions/setup-java@v5` with `gpg-private-key`), leave `MAVEN_GPG_PRIVATE_KEY`
  unset and this action will skip the import step.

inputs:
  pom-file:
    description: "Path to pom.xml file"
    required: false
    default: "pom.xml"
  maven-profile:
    description: "Maven profile to activate for publishing"
    required: false
    default: "publish"
  extra-args:
    description: "Additional Maven arguments (space-separated)"
    required: false
    default: ""
  dry-run:
    description: "Perform a dry run without actually publishing"
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Import GPG key
      if: env.MAVEN_GPG_PRIVATE_KEY != ''
      shell: bash
      env:
        MAVEN_GPG_PRIVATE_KEY: ${{ env.MAVEN_GPG_PRIVATE_KEY }}
        MAVEN_GPG_PASSPHRASE: ${{ env.MAVEN_GPG_PASSPHRASE }}
      run: |
        # Try importing as raw (armored) first; on failure, try base64-decoded.
        # GH Actions log-masks any substring that matches a registered secret,
        # so prefix-detection via a literal armor-header grep is brittle.
        # Trying both forms unconditionally is simpler and more robust.
        gpg_err=$(mktemp)
        if printf '%s' "$MAVEN_GPG_PRIVATE_KEY" | gpg --batch --import 2>"$gpg_err"; then
          echo "Imported MAVEN_GPG_PRIVATE_KEY as armored OpenPGP"
        elif printf '%s' "$MAVEN_GPG_PRIVATE_KEY" | base64 -d 2>/dev/null | gpg --batch --import 2>"$gpg_err"; then
          echo "Imported MAVEN_GPG_PRIVATE_KEY (base64-decoded)"
        else
          echo "Error: MAVEN_GPG_PRIVATE_KEY could not be imported as armored OpenPGP or base64-encoded OpenPGP." >&2
          echo "gpg output from last attempt:" >&2
          sed 's/^/  /' "$gpg_err" >&2
          exit 1
        fi
        rm -f "$gpg_err"
        # Make the key usable for non-interactive signing
        for fpr in $(gpg --list-secret-keys --with-colons | awk -F: '$1 == "fpr" {print $10; exit}'); do
          echo "$fpr:6:" | gpg --import-ownertrust
        done

    - name: Deploy to Maven Central
      shell: bash
      env:
        MAVEN_GPG_PASSPHRASE: ${{ env.MAVEN_GPG_PASSPHRASE }}
        MAVEN_USERNAME: ${{ env.MAVEN_USERNAME }}
        MAVEN_PASSWORD: ${{ env.MAVEN_PASSWORD }}
        INPUT_POM_FILE: ${{ inputs.pom-file }}
        INPUT_MAVEN_PROFILE: ${{ inputs.maven-profile }}
        INPUT_EXTRA_ARGS: ${{ inputs.extra-args }}
        INPUT_DRY_RUN: ${{ inputs.dry-run }}
      run: |
        python3 "${{ github.action_path }}/scripts/deploy.py"
