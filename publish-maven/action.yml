name: Publish to Maven Central
description: >
  Deploy Maven artifacts to Maven Central with GPG signing.
  Handles already-published versions idempotently.

inputs:
  pom-file:
    description: "Path to pom.xml file"
    required: false
    default: "pom.xml"
  maven-profile:
    description: "Maven profile to activate for publishing"
    required: false
    default: "publish"
  extra-args:
    description: "Additional Maven arguments (space-separated)"
    required: false
    default: ""
  dry-run:
    description: "Perform a dry run without actually publishing"
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Deploy to Maven Central
      shell: bash
      env:
        MAVEN_GPG_PASSPHRASE: ${{ env.MAVEN_GPG_PASSPHRASE }}
        MAVEN_USERNAME: ${{ env.MAVEN_USERNAME }}
        MAVEN_PASSWORD: ${{ env.MAVEN_PASSWORD }}
        INPUT_POM_FILE: ${{ inputs.pom-file }}
        INPUT_MAVEN_PROFILE: ${{ inputs.maven-profile }}
        INPUT_EXTRA_ARGS: ${{ inputs.extra-args }}
        INPUT_DRY_RUN: ${{ inputs.dry-run }}
      run: |
        python3 "${{ github.action_path }}/scripts/deploy.py"
