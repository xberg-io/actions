name: Setup Python Environment
description: Install uv, set up Python, and cache the local virtual environment
inputs:
  python-version:
    description: Python version spec passed to actions/setup-python
    required: true
  cache-prefix:
    description: Prefix for cache keys
    required: false
    default: python-dependencies
  install-command:
    description: Command to install dependencies (default installs deps without building the project)
    required: false
    default: "uv sync --all-extras --all-packages --group dev --no-install-project --no-install-workspace"
  preserve-pkg-config-path:
    description: Preserve PKG_CONFIG_PATH for OpenSSL after uv operations
    required: false
    default: "true"
outputs:
  python-version:
    description: Resolved Python version
    value: ${{ steps.setup-python.outputs.python-version }}
  cache-hit:
    description: Whether the dependency cache was restored
    value: ${{ steps.cache-python.outputs.cache-hit }}
runs:
  using: composite
  steps:
    - name: Compute uv.lock hash
      id: uv-lock-hash
      shell: bash
      run: |
        bash "${GITHUB_ACTION_PATH}/scripts/uv-lock-hash.sh"

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Set up Python
      id: setup-python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}

    - name: Cache Python dependencies
      id: cache-python
      uses: actions/cache@v5
      with:
        path: |
          ~/.cache/uv
          .venv
        key: ${{ inputs.cache-prefix }}-v2-${{ runner.os }}-${{ inputs.python-version }}-${{ steps.uv-lock-hash.outputs.value }}
        restore-keys: |
          ${{ inputs.cache-prefix }}-v2-${{ runner.os }}-${{ inputs.python-version }}-

    - name: Pin Python version for uv
      shell: bash
      run: |
        bash "${GITHUB_ACTION_PATH}/scripts/pin-python.sh" "${{ inputs.python-version }}"

    - name: Install Python dependencies
      shell: bash
      run: ${{ inputs.install-command }}

    - name: Add venv bin to PATH
      shell: bash
      run: |
        if [ -d ".venv/bin" ]; then
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
        fi

    - name: Preserve PKG_CONFIG_PATH for OpenSSL
      if: inputs.preserve-pkg-config-path == 'true'
      shell: bash
      run: |
        bash "${GITHUB_ACTION_PATH}/scripts/preserve-pkg-config-path.sh"
