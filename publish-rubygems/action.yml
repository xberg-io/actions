name: Publish to RubyGems
description: >
  Publish Ruby gems with validation and idempotent handling.

  Authentication: OIDC-first. When GEM_HOST_API_KEY is empty/unset, this
  action invokes rubygems/configure-rubygems-credentials which
  exchanges the GHA OIDC token (audience: rubygems.org) for a short-lived
  RubyGems credential via the trusted publishing flow. The caller's job
  only needs `permissions: id-token: write`. Classic API-key auth is
  still supported by setting GEM_HOST_API_KEY in the caller's env.

inputs:
  gems-dir:
    description: "Directory containing .gem files to publish"
    required: true
  dry-run:
    description: "Perform a dry run without actually publishing"
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Configure RubyGems trusted publishing (OIDC)
      if: ${{ env.GEM_HOST_API_KEY == '' && inputs.dry-run != 'true' }}
      uses: rubygems/configure-rubygems-credentials@v2.1.0

    - name: Publish gems
      shell: bash
      env:
        GEM_HOST_API_KEY: ${{ env.GEM_HOST_API_KEY }}
        INPUT_GEMS_DIR: ${{ inputs.gems-dir }}
        INPUT_DRY_RUN: ${{ inputs.dry-run }}
      run: |
        python3 "${{ github.action_path }}/scripts/publish.py"
