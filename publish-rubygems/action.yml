name: Publish to RubyGems
description: >
  Publish Ruby gems with validation and idempotent handling.
  Supports trusted publishing via rubygems/configure-rubygems-credentials.

inputs:
  gems-dir:
    description: "Directory containing .gem files to publish"
    required: true
  dry-run:
    description: "Perform a dry run without actually publishing"
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Publish gems
      shell: bash
      env:
        GEM_HOST_API_KEY: ${{ env.GEM_HOST_API_KEY }}
        INPUT_GEMS_DIR: ${{ inputs.gems-dir }}
        INPUT_DRY_RUN: ${{ inputs.dry-run }}
      run: |
        python3 "${{ github.action_path }}/scripts/publish.py"
