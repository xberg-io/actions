default_install_hook_types:
  - pre-commit
  - commit-msg

repos:
  # Commit message linting
  - repo: https://github.com/Goldziher/gitfluff
    rev: v0.8.0
    hooks:
      - id: gitfluff-lint
        args: ["--write"]
        stages: [commit-msg]

  # AI-Rulez: auto-generate AI assistant configuration files
  - repo: https://github.com/Goldziher/ai-rulez
    rev: v4.1.6
    hooks:
      - id: ai-rulez-generate

  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: detect-private-key
      - id: check-yaml
        args: ["--allow-multiple-documents", "--unsafe"]
      - id: check-json
      - id: check-toml
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable

  # TOML formatting
  - repo: https://github.com/tox-dev/pyproject-fmt
    rev: "v2.21.2"
    hooks:
      - id: pyproject-fmt

  - repo: https://github.com/kreuzberg-dev/pre-commit-hooks
    rev: v1.0.0
    hooks:
      - id: shfmt
        args: ["-w", "-i", "2"]
      - id: shellcheck

      - id: oxfmt
      - id: mypy
        exclude: ^tests/
  # GitHub Actions: linting
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  # GitHub Actions: pin maintenance
  - repo: https://github.com/Goldziher/gh-actions-updater
    rev: v0.1.1
    hooks:
      - id: gh-actions-updater

  # Python (for helper scripts)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
