default_install_hook_types:
- pre-commit
- commit-msg
default_stages:
- pre-commit
repos:
- repo: https://github.com/Goldziher/gitfluff
  rev: v0.8.0
  hooks:
  - id: gitfluff-lint
    args:
    - --write
    stages:
    - commit-msg
- repo: https://github.com/xberg-io/pre-commit-hooks
  rev: v2.1.10
  hooks:
  - id: ai-rulez-generate
  - id: trailing-whitespace
  - id: end-of-file-fixer
  - id: check-merge-conflict
  - id: check-added-large-files
  - id: detect-private-key
    exclude: ^(CHANGELOG\.md|publish-maven/action\.yml)$
  - id: check-yaml
    args:
    - --allow-multiple-documents
    - --unsafe
  - id: check-json
  - id: check-toml
  - id: check-case-conflict
  - id: check-executables-have-shebangs
  - id: check-shebang-scripts-are-executable
  - id: pyproject-fmt
  - id: shfmt
    args:
    - -w
    - -i
    - '2'
  - id: shellcheck
  - id: oxfmt
  - id: mypy
    exclude: (^tests/|/tests/)
  - id: rumdl-fmt
  - id: actionlint
  - id: gh-actions-updater
  - id: typos
    exclude: ^publish-maven(-gradle)?/action\.yml$
    args:
    - --force-exclude
  - id: ruff
  - id: ruff-format
