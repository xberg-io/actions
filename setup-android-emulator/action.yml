name: Setup Android Emulator
description: >
  Provision an Android emulator on the runner via
  reactivecircus/android-emulator-runner. Pins the API level, system image
  target, and ABI; exports ANDROID_HOME / ANDROID_SDK_ROOT so downstream
  `task ...:test:e2e` calls can drive the emulator. Designed for use across
  kreuzberg-dev polyglot repos that ship a kotlin-android binding.

  The emulator process itself is started by the consumer step that calls
  `reactivecircus/android-emulator-runner@v2` (this action only handles the
  SDK/AVD bootstrap + env wiring). See README.md for usage.

inputs:
  api-level:
    description: "Android API level to install (e.g. 34)"
    required: false
    default: "34"
  target:
    description: "System image target: google_apis | default | google_apis_playstore"
    required: false
    default: "google_apis"
  arch:
    description: "System image ABI: x86_64 (KVM-accelerated on GHA Linux) | arm64-v8a"
    required: false
    default: "x86_64"
  profile:
    description: "AVD hardware profile (e.g. pixel_6)"
    required: false
    default: "pixel_6"
  avd-name:
    description: "AVD identifier"
    required: false
    default: "kreuzberg-test"

outputs:
  android-home:
    description: "Absolute path to the resolved Android SDK root"
    value: ${{ steps.setup.outputs.android-home }}
  avd-name:
    description: "Name of the provisioned AVD"
    value: ${{ inputs.avd-name }}

runs:
  using: composite
  steps:
    - name: Enable KVM (Linux only)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
          | sudo tee /etc/udev/rules.d/99-kvm4all.rules >/dev/null
        sudo udevadm control --reload-rules
        sudo udevadm trigger --name-match=kvm

    - name: Setup Java (required by sdkmanager + AGP)
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: "25"

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Cache AVD
      id: avd-cache
      uses: actions/cache@v4
      with:
        path: |
          ~/.android/avd/*
          ~/.android/adb*
        key: avd-${{ inputs.api-level }}-${{ inputs.target }}-${{ inputs.arch }}-${{ inputs.profile }}

    - name: Create AVD snapshot (cold cache)
      if: steps.avd-cache.outputs.cache-hit != 'true'
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: ${{ inputs.api-level }}
        target: ${{ inputs.target }}
        arch: ${{ inputs.arch }}
        profile: ${{ inputs.profile }}
        avd-name: ${{ inputs.avd-name }}
        force-avd-creation: false
        emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
        disable-animations: true
        script: echo "AVD snapshot generated"

    - name: Export Android env
      id: setup
      shell: bash
      run: |
        set -euo pipefail
        if [[ -z "${ANDROID_HOME:-}" ]]; then
          echo "Error: ANDROID_HOME not set by android-actions/setup-android" >&2
          exit 1
        fi
        echo "ANDROID_HOME=${ANDROID_HOME}" >> "$GITHUB_ENV"
        echo "ANDROID_SDK_ROOT=${ANDROID_HOME}" >> "$GITHUB_ENV"
        {
          echo "${ANDROID_HOME}/platform-tools"
          echo "${ANDROID_HOME}/emulator"
          echo "${ANDROID_HOME}/cmdline-tools/latest/bin"
        } >> "$GITHUB_PATH"
        echo "android-home=${ANDROID_HOME}" >> "$GITHUB_OUTPUT"
