name: Publish to NuGet
description: >
  Publish .NET NuGet packages to nuget.org with skip-duplicate support.
  Supports two authentication modes:
    1. OIDC trusted publishing (preferred). Configure a trusted publisher
       on https://www.nuget.org/account/trustedpublishing pointing at the
       caller's repo + workflow file; then set `permissions: id-token: write`
       on the calling workflow/job and pass the nuget.org username via the
       `nuget-user` input (or the `NUGET_USER` env var on the action call).
       No long-lived secret needed.
    2. Static API key. Set NUGET_API_KEY in the calling workflow's env.
  The script picks OIDC when `NUGET_API_KEY` is empty.

inputs:
  packages-dir:
    description: "Directory containing .nupkg files"
    required: true
  source:
    description: "NuGet source URL"
    required: false
    default: "https://api.nuget.org/v3/index.json"
  nuget-user:
    description: >
      nuget.org username (profile name, NOT email). Required for OIDC trusted
      publishing — the token exchange POSTs this as the API key owner.
      Ignored when NUGET_API_KEY is set.
    required: false
    default: ""
  dry-run:
    description: "Perform a dry run without actually publishing"
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Ensure .NET SDK
      shell: bash
      run: |
        "${{ github.action_path }}/scripts/ensure-dotnet.sh"
    - name: Publish NuGet packages
      shell: bash
      env:
        # Static-key flow (legacy); when unset, the script falls back to
        # OIDC trusted publishing via ACTIONS_ID_TOKEN_REQUEST_*.
        NUGET_API_KEY: ${{ env.NUGET_API_KEY }}
        # OIDC trusted publishing — these are injected by GitHub when the
        # workflow has `permissions: id-token: write`.
        ACTIONS_ID_TOKEN_REQUEST_URL: ${{ env.ACTIONS_ID_TOKEN_REQUEST_URL }}
        ACTIONS_ID_TOKEN_REQUEST_TOKEN: ${{ env.ACTIONS_ID_TOKEN_REQUEST_TOKEN }}
        INPUT_PACKAGES_DIR: ${{ inputs.packages-dir }}
        INPUT_SOURCE: ${{ inputs.source }}
        INPUT_NUGET_USER: ${{ inputs.nuget-user }}
        INPUT_DRY_RUN: ${{ inputs.dry-run }}
      run: |
        python3 "${{ github.action_path }}/scripts/publish.py"
