# Generated by scripts/migrate_to_poly.py from .pre-commit-config.yaml + tool configs. Review before committing.

[defaults]
line_length = 120
line_ending = "lf"
final_newline = true
trim_trailing_whitespace = true

[discovery]
exclude = ["**/*.lock", "**/Cargo.lock", "**/go.sum", "**/package-lock.json", "**/pnpm-lock.yaml", "**/uv.lock"]

[per-file-ignores]
"**/scripts/**" = [
    "C901",
    "D101",
    "D102",
    "D103",
    "INP001",
    "PERF401",
    "PLC0415",
    "PLR0912",
    "PLR0915",
    "PLW2901",
    "S607",
    "SIM105",
    "T201",
]
"**/tests/**/*.*" = [
    "A005",
    "ANN",
    "ARG001",
    "ARG002",
    "ARG005",
    "ASYNC230",
    "BLE001",
    "D",
    "N806",
    "N815",
    "PD",
    "PGH003",
    "PLC",
    "PLR0915",
    "PLR2004",
    "PT006",
    "PT007",
    "PT013",
    "PT017",
    "PT031",
    "RUF012",
    "S",
    "SIM117",
    "SLF001",
]

[lint.python.ruff]
pydocstyle_convention = "google"
mccabe_max_complexity = 15
pylint_max_args = 10
pylint_max_branches = 15
pylint_max_returns = 10
select = ["ALL"]
ignore = [
    "ANN401",
    "ASYNC109",
    "ASYNC110",
    "BLE001",
    "COM812",
    "D100",
    "D104",
    "D107",
    "D205",
    "E501",
    "EM",
    "FBT",
    "FIX",
    "ISC001",
    "PD011",
    "PGH003",
    "PLR2004",
    "PLW0603",
    "S104",
    "S110",
    "S603",
    "TD",
    "TRY",
]

[hooks]
stages = ["pre-commit"]

[hooks.builtin]
polylint = { exclude = [
    "**/*.lock",
    "**/Cargo.lock",
    "**/go.sum",
    "**/package-lock.json",
    "**/pnpm-lock.yaml",
    "**/uv.lock",
] }
polyfmt = { exclude = [
    "**/*.lock",
    "**/Cargo.lock",
    "**/go.sum",
    "**/package-lock.json",
    "**/pnpm-lock.yaml",
    "**/uv.lock",
] }
commit = { stages = ["commit-msg"] }
file_safety = { exclude = [
    "**/*.lock",
    "**/Cargo.lock",
    "**/go.sum",
    "**/package-lock.json",
    "**/pnpm-lock.yaml",
    "**/uv.lock",
] }

# --- catalog tools (standalone binaries, PATH-probed) ---
[tools.shfmt]
enabled = true

[tools.shellcheck]
enabled = true

[tools.pyrefly]
enabled = true
# TODO exclude: regex not auto-convertible to glob: (^tests/|/tests/)

[tools.actionlint]
enabled = true

