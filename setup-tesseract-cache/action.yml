name: Setup Tesseract Cache
description: Manages tesseract build cache per architecture with configurable paths

inputs:
  label:
    description: Platform label (e.g. linux-x86_64, linux-aarch64)
    required: true
  cache-dir-prefix:
    description: Prefix directory path for cache storage (e.g. .tesseract-cache)
    required: true
  tesseract-crate-toml:
    description: Path to tesseract crate Cargo.toml for cache-key hashing
    required: true
  enable-cache:
    description: Enable tesseract caching (disable for cross-arch builds)
    required: false
    default: "true"
  rust-target:
    description: Rust target triple for per-target cache cleanup
    required: false
    default: ""

outputs:
  cache-dir:
    description: Tesseract cache directory path
    value: ${{ steps.set-outputs.outputs.cache-dir }}
  cache-enabled:
    description: Whether caching is enabled (true/false)
    value: ${{ steps.set-outputs.outputs.cache-enabled }}
  docker-options:
    description: Docker options for passing cache env vars
    value: ${{ steps.set-outputs.outputs.docker-options }}

runs:
  using: composite
  steps:
    - name: Clean cache directories (cache disabled)
      if: inputs.enable-cache != 'true'
      shell: bash
      run: ${{ github.action_path }}/scripts/clean-dirs.sh "${{ inputs.label }}" "${{ inputs.cache-dir-prefix }}"

    - name: Setup cache directories
      if: inputs.enable-cache == 'true'
      shell: bash
      run: ${{ github.action_path }}/scripts/setup-dirs.sh "${{ inputs.label }}" "${{ inputs.cache-dir-prefix }}"

    - name: Resolve cache key paths
      id: cache-key-paths
      if: inputs.enable-cache == 'true'
      shell: bash
      run: |
        set -euo pipefail
        crate_dir="$(dirname "${{ inputs.tesseract-crate-toml }}")"
        echo "build-rs=${crate_dir}/build.rs" >> "$GITHUB_OUTPUT"

    - name: Cache tesseract build cache
      if: inputs.enable-cache == 'true'
      uses: actions/cache@v5
      with:
        path: |
          ${{ inputs.cache-dir-prefix }}/${{ inputs.label }}
          .xdg-cache/${{ inputs.label }}
        key: xberg-tesseract-cache-v2-${{ runner.os }}-${{ inputs.label }}-${{ hashFiles(inputs.tesseract-crate-toml, steps.cache-key-paths.outputs.build-rs) }}
        restore-keys: |
          xberg-tesseract-cache-v2-${{ runner.os }}-${{ inputs.label }}-

    - name: Clean per-target Tesseract cache
      if: inputs.rust-target != ''
      shell: bash
      run: ${{ github.action_path }}/scripts/clean-target-cache.sh "${{ inputs.rust-target }}"

    - name: Set outputs and environment
      id: set-outputs
      shell: bash
      run: ${{ github.action_path }}/scripts/set-outputs.sh "${{ inputs.label }}" "${{ inputs.enable-cache }}" "${{ inputs.cache-dir-prefix }}"
