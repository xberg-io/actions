name: Setup Node.js Workspace
description: Configure Node.js with pnpm and workspace dependencies
inputs:
  node-version:
    description: Node.js version to install
    required: false
    default: "24"
  frozen-lockfile:
    description: Use frozen lockfile for pnpm install
    required: false
    default: "false"
  ignore-scripts:
    description: >
      Skip running install scripts (e.g. native-binding postinstalls).
      Use when the workspace only needs JS tooling (lint, format) and not
      compiled native modules — avoids node-gyp builds that may fail on
      newer Node ABIs.
    required: false
    default: "false"
  registry-url:
    description: npm registry URL for authentication (e.g., https://registry.npmjs.org/)
    required: false
    default: ""
runs:
  using: composite
  steps:
    - name: Install pnpm
      uses: pnpm/action-setup@v6
      with:
        # standalone install avoids the `npm` self-installer path; required on
        # GitHub-hosted ARM Linux runners where Node/npm are not preinstalled.
        standalone: true
        # Pin to pnpm 10.x — `@pnpm/exe` 11+ ships a broken SEA binary for
        # Intel macOS (darwin-x64): the upstream Node.js SEA bug surfaces as
        # `npm error @pnpm/exe does not ship a working binary for Intel
        # macOS` during pnpm/action-setup, killing the install before any
        # job code runs. Upstream: https://github.com/pnpm/pnpm/issues/11423
        # + https://github.com/nodejs/node/issues/62893. Lockfile 9.0 is
        # forward/backward compatible between pnpm 10 and 11, so CI on 10
        # stays compatible with local dev on 11.5.1.
        version: "10"

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm
        registry-url: ${{ inputs.registry-url != '' && inputs.registry-url || null }}

    - name: Install dependencies
      shell: bash
      run: |
        args=()
        if [ "${{ inputs.frozen-lockfile }}" = "true" ]; then
          args+=(--frozen-lockfile)
        else
          # pnpm defaults frozen-lockfile=true in CI; pass the explicit negation
          # so `frozen-lockfile: false` is honored (e.g. napi workspaces whose
          # platform optionalDependencies pin a not-yet-published version that
          # cannot be recorded in the lockfile).
          args+=(--no-frozen-lockfile)
        fi
        if [ "${{ inputs.ignore-scripts }}" = "true" ]; then
          args+=(--ignore-scripts)
        fi
        pnpm install "${args[@]}"

    - name: Add pnpm bin to PATH
      shell: bash
      run: echo "$(pnpm bin)" >> "$GITHUB_PATH"
