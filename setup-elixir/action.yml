name: Setup Elixir
description: Install Elixir and OTP with Hex/Rebar
inputs:
  elixir-version:
    description: Elixir version to install
    required: false
    default: "1.19"
  otp-version:
    description: OTP version to install
    required: false
    default: "28"
runs:
  using: composite
  steps:
    - name: Normalize ImageOS for unsupported runner labels
      shell: bash
      run: |
        # erlef/setup-beam@v1 ships a finite list of recognized ImageOS values
        # and aborts when GitHub introduces a new label before the action does.
        # Rewrite the unknown labels we have seen to the closest accepted value
        # so the action can resolve a matching OTP/Elixir build.
        case "${ImageOS:-}" in
          ubuntu24-arm64) echo "ImageOS=ubuntu24" >> "$GITHUB_ENV" ;;
          ubuntu22-arm64) echo "ImageOS=ubuntu22" >> "$GITHUB_ENV" ;;
          win25-vs2026)   echo "ImageOS=win25"    >> "$GITHUB_ENV" ;;
        esac

    - name: Setup Beam
      uses: erlef/setup-beam@v1
      with:
        elixir-version: ${{ inputs.elixir-version }}
        otp-version: ${{ inputs.otp-version }}

    - name: Install Hex and Rebar
      shell: bash
      run: mix local.hex --force && mix local.rebar --force
