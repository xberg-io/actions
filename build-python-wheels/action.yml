name: Build Python Wheels
description: Build Python wheels using cibuildwheel

inputs:
  python-version:
    description: Python version to use for cibuildwheel host
    required: false
    default: "3.13"
  package-dir:
    description: Path to the Python package directory (relative to repo root)
    required: false
    default: "packages/python"
  cibw-build:
    description: CIBW_BUILD filter
    required: false
    default: "cp310-* cp311-* cp312-* cp313-* cp314-*"
  cibw-skip:
    description: CIBW_SKIP filter
    required: false
    default: "*-musllinux* *-win32 *-manylinux_i686"
  cibw-before-build-linux:
    description: CIBW_BEFORE_BUILD_LINUX command
    required: false
    default: "pip install maturin uv && source ~/.cargo/env"
  cibw-before-build-macos:
    description: CIBW_BEFORE_BUILD_MACOS command
    required: false
    default: "pip install maturin uv && source ~/.cargo/env"
  cibw-before-build-windows:
    description: CIBW_BEFORE_BUILD_WINDOWS command
    required: false
    default: "pip install maturin uv && set PATH=%USERPROFILE%\\.cargo\\bin;%PATH%"
  cibw-environment:
    description: CIBW_ENVIRONMENT (Linux default)
    required: false
    # CARGO_BUILD_LOCKED=true forces the nested `cargo build` (invoked by maturin
    # inside the manylinux container) to honour the committed Cargo.lock, so
    # broken upstream releases (e.g. `brotli-decompressor 5.0.1`/`5.0.2`) cannot
    # quietly substitute themselves for the pinned `5.0.0`.
    default: 'MATURIN_BUILD_ARGS="--compatibility linux" CARGO_BUILD_LOCKED=true'
  cibw-environment-windows:
    description: CIBW_ENVIRONMENT_WINDOWS
    required: false
    default: 'MATURIN_BUILD_ARGS="" CARGO_BUILD_LOCKED=true'
  cibw-environment-macos:
    description: CIBW_ENVIRONMENT_MACOS
    required: false
    default: 'MATURIN_BUILD_ARGS="" CARGO_BUILD_LOCKED=true'
  artifact-name:
    description: Name for the uploaded artifact (must be passed explicitly, e.g. wheels-Linux)
    required: false
    default: ""
  upload-artifact:
    description: Whether to upload the wheels as an artifact
    required: false
    default: "true"
  manylinux-x86_64-image:
    description: CIBW_MANYLINUX_X86_64_IMAGE (e.g. manylinux2014, manylinux_2_28)
    required: false
    default: "manylinux2014"
  manylinux-aarch64-image:
    description: CIBW_MANYLINUX_AARCH64_IMAGE
    required: false
    default: "manylinux2014"
  build-libheif:
    description: >
      Build and install libheif 1.23.0 (plus codec headers) in the manylinux
      container before building wheels. Required only by libheif-sys consumers
      (e.g. kreuzberg). Opt-in — defaults to off so consumers that do not link
      libheif are not coupled to its system dependencies.
    required: false
    default: "false"

outputs:
  artifact-name:
    description: Name of the uploaded artifact
    value: ${{ steps.artifact.outputs.name }}

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}


    - name: Install cibuildwheel
      shell: bash
      run: python -m pip install cibuildwheel==3.2.0

    - name: Resolve linker for native arm64 builds
      id: linker-config
      shell: bash
      run: |
        # `runner.arch` returns ARM64/X64 (uppercase) per GitHub Actions docs,
        # so the previous lowercase comparison silently fell through and never
        # exported the linker override. Use a case-insensitive shell compare.
        arch_lower="$(echo "${{ runner.arch }}" | tr '[:upper:]' '[:lower:]')"
        if [[ "$arch_lower" == "arm64" && "${{ runner.os }}" == "Linux" ]]; then
          echo "linker-env=CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=gcc" >> "$GITHUB_OUTPUT"
        else
          echo "linker-env=" >> "$GITHUB_OUTPUT"
        fi

    - name: Build wheels
      shell: bash
      run: python -m cibuildwheel --output-dir wheelhouse "${{ inputs.package-dir }}"
      env:
        CIBW_BUILD: ${{ inputs.cibw-build }}
        # libheif is built only when `build-libheif` is opt-in (libheif-sys consumers
        # such as kreuzberg). Consumers that do not link libheif skip it entirely and
        # avoid coupling to codec system deps that are unavailable on some manylinux bases.
        CIBW_BEFORE_ALL_LINUX: >
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y &&
          source ~/.cargo/env &&
          if [ "${{ inputs.build-libheif }}" = "true" ]; then
          PKG=$(command -v dnf >/dev/null && echo dnf || echo yum) &&
          $PKG install -y cmake gcc-c++ numactl-devel &&
          for codec in libaom-devel libdav1d-devel libde265-devel x265-devel; do $PKG install -y "$codec" || true; done &&
          curl -fsSL -o /tmp/libheif.tar.gz https://github.com/strukturag/libheif/releases/download/v1.23.0/libheif-1.23.0.tar.gz &&
          tar -xzf /tmp/libheif.tar.gz -C /tmp &&
          mkdir -p /tmp/libheif-1.23.0/build &&
          cd /tmp/libheif-1.23.0/build &&
          cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr/local -DCMAKE_INSTALL_LIBDIR=lib -DWITH_EXAMPLES=OFF -DWITH_GDK_PIXBUF=OFF -DBUILD_TESTING=OFF &&
          make -j"$(nproc)" &&
          make install &&
          ldconfig &&
          cd - &&
          rm -rf /tmp/libheif*;
          fi
        # macos-latest runner images preinstall a Rust toolchain whose
        # `bin/cargo-clippy` is not tracked by rustup's component manifest. When
        # maturin runs `cargo metadata` inside a consumer checkout, the consumer's
        # rust-toolchain.toml (channel = "1.95", components = [..., "clippy"]) makes
        # rustup materialize the 1.95 toolchain and install the clippy component,
        # which aborts on the untracked binary with
        # `failed to install component 'clippy-preview-aarch64-apple-darwin',
        # detected conflict: 'bin/cargo-clippy'`, failing the wheel build. Wiping
        # ~/.cargo and ~/.rustup gives the in-cibw rustup sole ownership of the
        # toolchain state, so the rust-toolchain.toml-driven install is clean. A
        # prior non-wiping pre-install (ac2ae06) regressed this: it staged the
        # default `stable` toolchain (not the pinned 1.95) and left the stray
        # binary in place, so the conflict reproduced.
        CIBW_BEFORE_ALL_MACOS: rm -rf ~/.cargo ~/.rustup && curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y && source ~/.cargo/env
        CIBW_BEFORE_ALL_WINDOWS: >
          curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y &&
          refreshenv
        CIBW_BEFORE_BUILD_LINUX: ${{ inputs.cibw-before-build-linux }}
        CIBW_BEFORE_BUILD_MACOS: ${{ inputs.cibw-before-build-macos }}
        CIBW_BEFORE_BUILD_WINDOWS: ${{ inputs.cibw-before-build-windows }}
        CIBW_BUILD_FRONTEND: build
        CIBW_ENVIRONMENT: ${{ inputs.cibw-environment }} ${{ steps.linker-config.outputs.linker-env }}
        CIBW_ENVIRONMENT_WINDOWS: ${{ inputs.cibw-environment-windows }}
        CIBW_ENVIRONMENT_MACOS: ${{ inputs.cibw-environment-macos }}
        CIBW_SKIP: ${{ inputs.cibw-skip }}
        CIBW_MANYLINUX_X86_64_IMAGE: ${{ inputs.manylinux-x86_64-image }}
        CIBW_MANYLINUX_AARCH64_IMAGE: ${{ inputs.manylinux-aarch64-image }}

    - name: Determine artifact name
      if: inputs.upload-artifact == 'true'
      id: artifact
      shell: bash
      run: |
        NAME="${{ inputs.artifact-name }}"
        if [[ -z "$NAME" ]]; then
          NAME="wheels-${RUNNER_OS}"
        fi
        echo "name=$NAME" >> "$GITHUB_OUTPUT"

    - name: Upload wheels
      if: inputs.upload-artifact == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.artifact.outputs.name }}
        path: ./wheelhouse/*.whl
        retention-days: 7
