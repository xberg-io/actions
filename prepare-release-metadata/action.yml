name: Prepare Release Metadata
description: |
  Extract and validate release metadata from a workflow event. Backed by
  `alef release-metadata`. Reads alef.toml in the consuming repo to discover
  the canonical target list.
inputs:
  available-targets:
    description: "Comma-separated list of available release targets (default: 'all')."
    required: false
    default: "all"
  alef-version:
    description: "Alef CLI version to install (semver, 'latest', or 'main')."
    required: false
    default: "latest"
outputs:
  tag:
    description: "Git tag (e.g., v4.3.6)"
    value: ${{ steps.prepare.outputs.tag }}
  version:
    description: "Semantic version without v prefix"
    value: ${{ steps.prepare.outputs.version }}
  npm_tag:
    description: "npm dist-tag (latest or next)"
    value: ${{ steps.prepare.outputs.npm_tag }}
  ref:
    description: "Full git ref"
    value: ${{ steps.prepare.outputs.ref }}
  checkout_ref:
    description: "Ref to use for git checkout"
    value: ${{ steps.prepare.outputs.checkout_ref }}
  target_sha:
    description: "Specific SHA to checkout (empty if using ref)"
    value: ${{ steps.prepare.outputs.target_sha }}
  matrix_ref:
    description: "Short ref for build matrix context"
    value: ${{ steps.prepare.outputs.matrix_ref }}
  is_tag:
    description: "Whether ref is a tag"
    value: ${{ steps.prepare.outputs.is_tag }}
  is_prerelease:
    description: "Whether the version is a prerelease (-rc/-alpha/-beta/-pre)"
    value: ${{ steps.prepare.outputs.is_prerelease }}
  dry_run:
    description: "Whether this is a dry run"
    value: ${{ steps.prepare.outputs.dry_run }}
  force_republish:
    description: "Whether to force republish"
    value: ${{ steps.prepare.outputs.force_republish }}
  release_targets:
    description: "Comma-separated list of enabled targets (or 'all'/'none')"
    value: ${{ steps.prepare.outputs.release_targets }}
  release_any:
    description: "Whether any target is enabled"
    value: ${{ steps.prepare.outputs.release_any }}
  release_python:
    value: ${{ steps.prepare.outputs.release_python }}
    description: "Whether the python target is enabled"
  release_node:
    value: ${{ steps.prepare.outputs.release_node }}
    description: "Whether the node target is enabled"
  release_ruby:
    value: ${{ steps.prepare.outputs.release_ruby }}
    description: "Whether the ruby target is enabled"
  release_cli:
    value: ${{ steps.prepare.outputs.release_cli }}
    description: "Whether the cli target is enabled"
  release_crates:
    value: ${{ steps.prepare.outputs.release_crates }}
    description: "Whether the crates target is enabled"
  release_docker:
    value: ${{ steps.prepare.outputs.release_docker }}
    description: "Whether the docker target is enabled"
  release_homebrew:
    value: ${{ steps.prepare.outputs.release_homebrew }}
    description: "Whether the homebrew target is enabled"
  release_java:
    value: ${{ steps.prepare.outputs.release_java }}
    description: "Whether the java target is enabled"
  release_csharp:
    value: ${{ steps.prepare.outputs.release_csharp }}
    description: "Whether the csharp target is enabled"
  release_go:
    value: ${{ steps.prepare.outputs.release_go }}
    description: "Whether the go target is enabled"
  release_wasm:
    value: ${{ steps.prepare.outputs.release_wasm }}
    description: "Whether the wasm target is enabled"
  release_php:
    value: ${{ steps.prepare.outputs.release_php }}
    description: "Whether the php target is enabled"
  release_elixir:
    value: ${{ steps.prepare.outputs.release_elixir }}
    description: "Whether the elixir target is enabled"
  release_r:
    value: ${{ steps.prepare.outputs.release_r }}
    description: "Whether the r target is enabled"
  release_c_ffi:
    value: ${{ steps.prepare.outputs.release_c_ffi }}
    description: "Whether the c_ffi target is enabled"
  release_dart:
    value: ${{ steps.prepare.outputs.release_dart }}
    description: "Whether the dart target is enabled (requires alef >= 0.15.8)"
  release_swift:
    value: ${{ steps.prepare.outputs.release_swift }}
    description: "Whether the swift target is enabled (requires alef >= 0.15.8)"
  release_gleam:
    value: ${{ steps.prepare.outputs.release_gleam }}
    description: "Whether the gleam target is enabled (requires alef >= 0.15.8)"
  release_zig:
    value: ${{ steps.prepare.outputs.release_zig }}
    description: "Whether the zig target is enabled (requires alef >= 0.15.8)"
  release_kotlin:
    value: ${{ steps.prepare.outputs.release_kotlin }}
    description: "Whether the kotlin target is enabled (requires alef >= 0.15.8)"
  release_kotlin_android:
    value: ${{ steps.prepare.outputs.release_kotlin_android }}
    description: "Whether the kotlin-android target is enabled (requires alef >= 0.23.43)"
runs:
  using: composite
  steps:
    - name: Install alef
      uses: xberg-io/actions/install-alef@v1
      with:
        version: ${{ inputs.alef-version }}

    - name: Resolve event metadata
      id: prepare
      shell: bash
      env:
        EVENT_NAME: ${{ github.event_name }}
        INPUT_TAG: ${{ inputs.tag || github.event.inputs.tag || '' }}
        INPUT_DRY_RUN: ${{ inputs.dry-run || github.event.inputs.dry_run || 'false' }}
        INPUT_FORCE_REPUBLISH: ${{ inputs.force-republish || github.event.inputs.force_republish || 'false' }}
        INPUT_REF: ${{ inputs.ref || github.event.inputs.ref || '' }}
        INPUT_TARGETS: ${{ inputs.targets || github.event.inputs.targets || '' }}
        EVENT_RELEASE_TAG: ${{ github.event.release.tag_name || '' }}
        EVENT_DISPATCH_TAG: ${{ github.event.client_payload.tag || '' }}
        EVENT_DISPATCH_DRY_RUN: ${{ github.event.client_payload.dry_run || 'false' }}
        EVENT_DISPATCH_FORCE_REPUBLISH: ${{ github.event.client_payload.force_republish || 'false' }}
        EVENT_DISPATCH_REF: ${{ github.event.client_payload.ref || '' }}
        EVENT_DISPATCH_TARGETS: ${{ github.event.client_payload.targets || '' }}
        GITHUB_REF_NAME: ${{ github.ref_name }}
        AVAILABLE_TARGETS: ${{ inputs.available-targets }}
      run: |
        set -euo pipefail

        # Resolve tag, ref, dry-run, force-republish, targets per event type.
        # Mirrors the dispatch logic in xberg's
        # validate-and-compute-release-metadata.sh so consuming workflows that
        # rely on the prior behavior keep working.
        case "${EVENT_NAME}" in
        workflow_dispatch)
          tag="${INPUT_TAG}"
          dry_run="${INPUT_DRY_RUN}"
          force_republish="${INPUT_FORCE_REPUBLISH}"
          ref_input="${INPUT_REF}"
          targets="${INPUT_TARGETS}"
          ;;
        release)
          tag="${EVENT_RELEASE_TAG}"
          dry_run="false"
          force_republish="false"
          ref_input="refs/tags/${EVENT_RELEASE_TAG}"
          targets=""
          ;;
        repository_dispatch)
          tag="${EVENT_DISPATCH_TAG}"
          dry_run="${EVENT_DISPATCH_DRY_RUN}"
          force_republish="${EVENT_DISPATCH_FORCE_REPUBLISH}"
          ref_input="${EVENT_DISPATCH_REF}"
          targets="${EVENT_DISPATCH_TARGETS}"
          ;;
        *)
          tag="${GITHUB_REF_NAME}"
          dry_run="false"
          force_republish="false"
          ref_input=""
          targets=""
          ;;
        esac

        # When dry-running without an explicit tag, synthesize one from the
        # repo's canonical version so the publish pipeline can dry-build
        # against HEAD without a real release. Read alef.toml or Cargo.toml
        # for the version. Falls back to GITHUB_REF_NAME if neither exists.
        if [[ -z "${tag}" && "${dry_run}" == "true" ]]; then
          synth_version=""
          if [[ -f "Cargo.toml" ]]; then
            synth_version="$(sed -n '/^\[workspace\.package\]/,/^\[/{s/^version[[:space:]]*=[[:space:]]*"\([^"]*\)".*/\1/p}' Cargo.toml | head -1)"
            if [[ -z "${synth_version}" ]]; then
              synth_version="$(sed -n '/^\[package\]/,/^\[/{s/^version[[:space:]]*=[[:space:]]*"\([^"]*\)".*/\1/p}' Cargo.toml | head -1)"
            fi
          fi
          if [[ -z "${synth_version}" ]]; then
            synth_version="${GITHUB_REF_NAME:-0.0.0-dryrun}"
          fi
          tag="v${synth_version#v}-dryrun-${GITHUB_SHA:0:7}"
          echo "::notice::synthesized dry-run tag: ${tag}"
        fi

        if [[ -z "${tag}" ]]; then
          echo "::error::release tag could not be determined from event=${EVENT_NAME}" >&2
          exit 1
        fi

        targets="${targets:-${AVAILABLE_TARGETS:-all}}"

        # Build alef args.
        args=(release-metadata --tag "${tag}" --targets "${targets}" --event "${EVENT_NAME}" --json)
        if [[ -n "${ref_input}" ]]; then
          args+=(--git-ref "${ref_input}")
        fi
        if [[ "${dry_run}" == "true" ]]; then
          args+=(--dry-run)
        fi
        if [[ "${force_republish}" == "true" ]]; then
          args+=(--force-republish)
        fi

        json=$(alef "${args[@]}")

        # For dry-run with a synthesized tag, the synth tag does not exist as a
        # real git ref — downstream actions/checkout calls would fail trying to
        # check out refs/tags/<synth>. Override checkout_ref + target_sha to the
        # current commit so the dry-run pipeline can build against HEAD.
        if [[ "${dry_run}" == "true" ]]; then
          json=$(echo "${json}" | jq --arg sha "${GITHUB_SHA}" '. + {ref: $sha, checkout_ref: $sha, target_sha: $sha, matrix_ref: ("main")}')
        fi

        echo "${json}" | jq .

        # Emit each top-level field as a GITHUB_OUTPUT line.
        echo "${json}" | jq -r 'to_entries[] | "\(.key)=\(.value)"' >>"$GITHUB_OUTPUT"
