name: Rewrite Native Deps
description: >
  Rewrite a source-build language package's workspace path-dependencies to
  registry version-dependencies via `alef publish prepare`. Source-build
  packages (Ruby gem, Python sdist, Elixir NIF, PHP extension, Swift) ship a
  Cargo.toml whose core-crate deps point at workspace paths that do not exist
  once the package is unpacked on a consumer machine; this action strips those
  paths and pins the published version so the shipped manifest resolves. Run it
  before the native Rust build/package step.

inputs:
  lang:
    description: "Language(s) to prepare, comma-separated (e.g. ruby, python, php, elixir, swift)"
    required: true
  alef-version:
    description: "Alef version to install (passed to install-alef@v1). 'latest' reads the pin from alef.toml."
    required: false
    default: "latest"
  require-registry:
    description: >
      Regenerate Cargo.lock and fail hard if a referenced workspace-member version
      is not yet published to the registry. Use in release pipelines (after the core
      crates are published); set "false" for local/pre-release dev.
    required: false
    default: "true"
  working-directory:
    description: "Directory to run alef from (the repo root containing alef.toml)"
    required: false
    default: "."

runs:
  using: composite
  steps:
    - name: Install alef CLI
      uses: kreuzberg-dev/actions/install-alef@v1
      with:
        version: ${{ inputs.alef-version }}

    - name: Rewrite native dependencies to registry versions
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        INPUT_LANG: ${{ inputs.lang }}
        INPUT_REQUIRE_REGISTRY: ${{ inputs.require-registry }}
      run: |
        set -euo pipefail
        if ! [[ "${INPUT_LANG}" =~ ^[a-z]+(,[a-z]+)*$ ]]; then
          echo "Error: invalid lang '${INPUT_LANG}' (expected comma-separated lowercase language names)" >&2
          exit 1
        fi
        args=(publish prepare --lang "${INPUT_LANG}")
        if [ "${INPUT_REQUIRE_REGISTRY}" = "true" ]; then
          args+=(--require-registry)
        fi
        echo "Running: alef ${args[*]}"
        alef "${args[@]}"

    - name: Strip workspace [patch.*] sections so sdist consumers resolve registry deps
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        # `alef publish prepare` rewrites the binding crate's path-dep on the core
        # crate to a registry version-dep, but leaves any workspace-root
        # `[patch.crates-io] core = { path = "..." }` (or similar `[patch.*]`)
        # untouched. When the sdist is unpacked on a consumer machine the path
        # no longer exists, but the [patch] override still wins over the
        # registry dep → cargo bails with `failed to read .../Cargo.toml`.
        # Strip the [patch.*] sections entirely; they are dev/workspace
        # affordances that have no meaning in a published source distribution.
        # Resolves kreuzberg-dev/html-to-markdown#390 (Alpine/musl sdist install).
        if [ -f Cargo.toml ] && grep -q '^\[patch\.' Cargo.toml; then
          awk '
            BEGIN { in_patch = 0 }
            /^\[patch\./ { in_patch = 1; next }
            in_patch && /^\[/ { in_patch = 0 }
            !in_patch { print }
          ' Cargo.toml > Cargo.toml.tmp
          mv Cargo.toml.tmp Cargo.toml
          echo "Stripped [patch.*] sections from workspace Cargo.toml for sdist build."
        else
          echo "No [patch.*] sections in workspace Cargo.toml; nothing to strip."
        fi

    - name: Strip path= from [workspace.dependencies] entries so sdist consumers resolve registry deps
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        # cargo eagerly validates every `[workspace.dependencies]` entry even when
        # no member uses `workspace = true` for that name. A leftover
        # `path = "crates/<core>"` in workspace.dependencies points at a directory
        # NOT shipped in the sdist (alef publish prepare only ships the binding
        # crate via maturin's manifest-path), so cargo bails on consumer install
        # with `failed to read .../crates/<core>/Cargo.toml`. Strip the `path`
        # attribute from every workspace.dependencies entry, leaving the version
        # so the dep resolves from the registry. Stripping the entry entirely is
        # also safe — alef-generated binding crates use explicit version deps,
        # not `workspace = true` — but dropping just `path` is the minimal change.
        # Resolves kreuzberg-dev/html-to-markdown#402 (Alpine/musl sdist install
        # still failing after #390 fix because [workspace.dependencies] was missed).
        if [ -f Cargo.toml ] && grep -q '^\[workspace\.dependencies\]' Cargo.toml; then
          python3 - <<'PY'
        import re
        import sys
        from pathlib import Path

        p = Path("Cargo.toml")
        lines = p.read_text().splitlines(keepends=True)
        out = []
        in_ws_deps = False
        section_re = re.compile(r"^\[([^\]]+)\]")
        # Match `path = "..."` or `path="..."`, plus a trailing comma + optional space
        # (so `, path = "..."` cleans up to nothing inside an inline-table entry).
        path_in_inline_re = re.compile(r",\s*path\s*=\s*\"[^\"]+\"")
        # Also handle the form where `path` comes first: `{ path = "...", ...`
        path_first_in_inline_re = re.compile(r"path\s*=\s*\"[^\"]+\"\s*,\s*")
        # Standalone `path = "..."` lines inside dotted tables.
        standalone_path_re = re.compile(r"^\s*path\s*=\s*\"[^\"]+\"\s*\n?$")

        stripped_lines = 0
        for line in lines:
            m = section_re.match(line)
            if m:
                in_ws_deps = m.group(1) == "workspace.dependencies" or m.group(1).startswith("workspace.dependencies.")
                out.append(line)
                continue
            if in_ws_deps:
                if standalone_path_re.match(line):
                    stripped_lines += 1
                    continue
                new = path_in_inline_re.sub("", line)
                if new == line:
                    new = path_first_in_inline_re.sub("", line)
                if new != line:
                    stripped_lines += 1
                out.append(new)
            else:
                out.append(line)

        if stripped_lines:
            p.write_text("".join(out))
            print(f"Stripped path= from {stripped_lines} [workspace.dependencies] entries.")
        else:
            print("No path= attributes in [workspace.dependencies]; nothing to strip.")
        PY
        else
          echo "No [workspace.dependencies] section in Cargo.toml; nothing to strip."
        fi
