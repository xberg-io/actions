name: Build Node.js NAPI-RS Bindings
description: >
  Build NAPI-RS Node.js bindings for a single target. Defaults to a host build
  via `pnpm run build`; pass `target` to drive a `napi build --target ...`
  cross-compile with optional `--use-napi-cross`, run `napi artifacts` to
  collect platform binaries into `npm/`, and pack the staged tree as a
  tarball. All steps are bash-based so the same step block runs on Linux,
  macOS, and Windows (Git Bash).

inputs:
  crate-dir:
    description: Path to the NAPI-RS crate directory (relative to repo root)
    required: true
  build-command:
    description: >
      Override build command (legacy mode). Used only when `target` is empty
      — passing `target` triggers an explicit `napi build` invocation and
      ignores this input.
    required: false
    default: "pnpm run build"
  target:
    description: Cargo target triple to build (e.g. x86_64-unknown-linux-gnu). When set, the action runs `napi build --target <target>` and ignores `build-command`.
    required: false
    default: ""
  use-napi-cross:
    description: Pass `--use-napi-cross` to napi build for cross-compilation (only used when `target` is set).
    required: false
    default: "false"
  release:
    description: Build in release mode (only used when `target` is set).
    required: false
    default: "true"
  js-name:
    description: Generated JS entry filename (only used when `target` is set).
    required: false
    default: "index.js"
  dts-name:
    description: Generated TypeScript declaration filename (only used when `target` is set).
    required: false
    default: "index.d.ts"
  collect-artifacts:
    description: After building, run `napi artifacts` to collect platform binaries into the npm directory.
    required: false
    default: "true"
  npm-dir:
    description: napi staging directory under crate-dir (e.g. `npm`).
    required: false
    default: "npm"
  install-deps:
    description: Run `pnpm install --filter ./<crate-dir>...` before building. Set to `false` if the caller has already done it.
    required: false
    default: "true"
  pack-tarball:
    description: Legacy mode — npm-pack the crate-dir and expose the .tgz path via the `tarball` output.
    required: false
    default: "false"
  pack-target-tarball:
    description: >
      When non-empty, tar the staged `npm/` tree as the given filename
      (relative to `$GITHUB_WORKSPACE`) and expose its absolute path via
      the `target-tarball` output. Intended for matrix builds that ship
      per-target staged bindings as artifacts.
    required: false
    default: ""

outputs:
  tarball:
    description: Path to the legacy `npm pack` tarball (when `pack-tarball=true`).
    value: ${{ steps.pack.outputs.tarball }}
  target-tarball:
    description: Path to the per-target tarball (when `pack-target-tarball` is set).
    value: ${{ steps.pack-target.outputs.target-tarball }}

runs:
  using: composite
  steps:
    - name: Install pnpm workspace deps
      if: inputs.install-deps == 'true'
      shell: bash
      run: |
        set -euo pipefail
        # --no-frozen-lockfile: pnpm defaults frozen-lockfile=true in CI, but the
        # napi platform packages live in optionalDependencies pinned to the
        # unpublished release version and can never be recorded in pnpm-lock.yaml,
        # so a frozen install fails with ERR_PNPM_OUTDATED_LOCKFILE. The lockfile
        # is left unchanged (only the unrecordable optional deps differ).
        pnpm install --no-frozen-lockfile --filter ./${{ inputs.crate-dir }}...

    - name: Build NAPI-RS bindings (default / legacy)
      if: inputs.target == ''
      shell: bash
      working-directory: ${{ inputs.crate-dir }}
      run: |
        set -euo pipefail
        ${{ inputs.build-command }}

    - name: Build NAPI-RS bindings (target)
      if: inputs.target != ''
      shell: bash
      working-directory: ${{ inputs.crate-dir }}
      env:
        TARGET: ${{ inputs.target }}
        USE_NAPI_CROSS: ${{ inputs.use-napi-cross }}
        RELEASE: ${{ inputs.release }}
        JS_NAME: ${{ inputs.js-name }}
        DTS_NAME: ${{ inputs.dts-name }}
        NPM_DIR: ${{ inputs.npm-dir }}
        COLLECT_ARTIFACTS: ${{ inputs.collect-artifacts }}
      run: |
        set -euo pipefail
        rm -rf "${NPM_DIR}"
        pnpm exec napi create-npm-dirs
        napi_args=(napi build --platform --target "${TARGET}" --js "${JS_NAME}" --dts "${DTS_NAME}")
        if [ "${RELEASE}" = "true" ]; then
          napi_args+=(--release)
        fi
        if [ "${USE_NAPI_CROSS}" = "true" ]; then
          napi_args+=(--use-napi-cross)
        fi
        pnpm exec "${napi_args[@]}"
        if [ "${COLLECT_ARTIFACTS}" = "true" ]; then
          pnpm exec napi artifacts --output-dir . --npm-dir "${NPM_DIR}"
        fi

    - name: Verify platform-specific .node file was staged
      if: inputs.target != '' && inputs.collect-artifacts == 'true'
      shell: bash
      working-directory: ${{ inputs.crate-dir }}
      env:
        TARGET: ${{ inputs.target }}
        NPM_DIR: ${{ inputs.npm-dir }}
      run: |
        set -euo pipefail
        # After `napi create-npm-dirs` + `napi build --target X`, every platform
        # subdir has a package.json but only the target's dir gets a .node file.
        # Verify by scanning all platform dirs for a .node — the build produces
        # exactly one regardless of which subdir name maps to the target triple.
        # (Older logic picked the alphabetically-first platform dir, which fired
        # a false negative whenever the target wasn't the first one — e.g. any
        # build target other than darwin-arm64.)
        platform_dirs=("${NPM_DIR}"/*/package.json)
        if [ ${#platform_dirs[@]} -eq 0 ] || [ ! -e "${platform_dirs[0]}" ]; then
          echo "::error::No platform subdirectory found in ${NPM_DIR}/"
          ls -la "${NPM_DIR}" || true
          exit 1
        fi

        node_file=$(find "${NPM_DIR}" -maxdepth 2 -name "*.node" -type f | head -1)
        if [ -z "${node_file}" ]; then
          echo "::error::No .node file found in any ${NPM_DIR}/*/ subdir"
          for p in "${platform_dirs[@]}"; do
            d=$(dirname "$p")
            echo "--- $(basename "$d") ---"
            ls -la "$d" || true
          done
          exit 1
        fi

        platform_dir=$(dirname "${node_file}")
        platform_name=$(basename "${platform_dir}")
        echo "Verified: ${platform_name} platform package contains $(basename "${node_file}")"

    - name: Vendor dynamically-linked ONNX Runtime lib beside the .node
      # When the crate links ONNX Runtime dynamically, setup-onnx-runtime stages
      # libonnxruntime into the crate dir and the build bakes an
      # @loader_path (macOS) / $ORIGIN (Linux) / own-dir (Windows) rpath into the
      # .node. `napi artifacts` copies ONLY the .node into npm/<platform>/, so the
      # ORT shared lib is absent from the published platform package and consumers
      # hit ERR_DLOPEN_FAILED ("cannot find libonnxruntime") at require() time.
      # Copy the staged ORT lib(s) alongside the .node and add every shippable
      # binary to that package's `files` (npm publish honours `files`, dropping
      # anything not listed). Auto-scoped: no-op when no ORT lib was staged
      # (statically linked or non-ORT crates), so this stays safe for callers
      # that don't use ONNX Runtime.
      if: inputs.target != '' && inputs.collect-artifacts == 'true'
      shell: bash
      working-directory: ${{ inputs.crate-dir }}
      env:
        NPM_DIR: ${{ inputs.npm-dir }}
      run: |
        set -euo pipefail
        # ORT shared libs staged into the crate dir by setup-onnx-runtime.
        shopt -s nullglob
        ort_libs=(libonnxruntime*.dylib libonnxruntime*.so* onnxruntime*.dll \
          libonnxruntime_providers_*.dylib libonnxruntime_providers_*.so*)
        shopt -u nullglob
        if [ ${#ort_libs[@]} -eq 0 ]; then
          echo "No ONNX Runtime shared lib staged in $(pwd); nothing to vendor (static/non-ORT build)."
          exit 0
        fi

        node_file=$(find "${NPM_DIR}" -maxdepth 2 -name "*.node" -type f | head -1)
        if [ -z "${node_file}" ]; then
          echo "::error::ORT libs staged but no .node found under ${NPM_DIR}/ to vendor beside"
          exit 1
        fi
        platform_dir=$(dirname "${node_file}")

        for lib in "${ort_libs[@]}"; do
          cp -f "${lib}" "${platform_dir}/"
          echo "Vendored $(basename "${lib}") -> ${platform_dir}/"
        done

        # Reconcile the platform package.json `files` with the shippable binaries
        # now on disk (the .node plus every vendored ORT lib). node is guaranteed
        # present in this action's runtime.
        node -e '
          const fs = require("fs"), path = require("path");
          const dir = process.argv[1];
          const pkgPath = path.join(dir, "package.json");
          const pkg = JSON.parse(fs.readFileSync(pkgPath, "utf8"));
          const shipExt = /\.(node|dylib|dll)$|\.so(\.[0-9]+)*$/;
          const onDisk = fs.readdirSync(dir).filter((f) => shipExt.test(f));
          const files = new Set(pkg.files || []);
          for (const f of onDisk) files.add(f);
          pkg.files = [...files].sort();
          fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + "\n");
          console.log("Updated " + pkgPath + " files: " + JSON.stringify(pkg.files));
        ' "${platform_dir}"
        ls -la "${platform_dir}"

    - name: Pack Node tarball (legacy)
      if: inputs.pack-tarball == 'true'
      id: pack
      shell: bash
      run: |
        set -euo pipefail
        pushd "${{ inputs.crate-dir }}" >/dev/null
        NODE_TGZ=$(npm pack | tail -1)
        mv "${NODE_TGZ}" "${GITHUB_WORKSPACE}/${NODE_TGZ}"
        popd >/dev/null
        echo "tarball=${GITHUB_WORKSPACE}/${NODE_TGZ}" >> "${GITHUB_OUTPUT}"

    - name: Pack per-target tarball
      if: inputs.pack-target-tarball != ''
      id: pack-target
      shell: bash
      env:
        CRATE_DIR: ${{ inputs.crate-dir }}
        NPM_DIR: ${{ inputs.npm-dir }}
        JS_NAME: ${{ inputs.js-name }}
        DTS_NAME: ${{ inputs.dts-name }}
        TARBALL_NAME: ${{ inputs.pack-target-tarball }}
      run: |
        set -euo pipefail
        # cd into the workspace so the tarball destination is a relative
        # path. On Windows, $GITHUB_WORKSPACE is `D:\a\...` and GNU tar
        # interprets the leading `D:` as a remote-host separator
        # (`tar: Cannot connect to D: resolve failed`). BSD tar on macOS
        # has no `--force-local` flag, so dodging the colon is the only
        # portable option.
        cd "${GITHUB_WORKSPACE}"
        # Include napi-generated JS loader + TS declarations alongside the
        # npm/ tree. Without these the main package ships only README/LICENSE
        # (the `files` array in package.json lists index.js + index.d.ts but
        # they live at crate root, not under npm/). They are identical across
        # all targets, so last-writer-wins on extract is fine.
        tar_members=("${NPM_DIR}")
        if [ -f "${CRATE_DIR}/${JS_NAME}" ]; then
          tar_members+=("${JS_NAME}")
        fi
        if [ -f "${CRATE_DIR}/${DTS_NAME}" ]; then
          tar_members+=("${DTS_NAME}")
        fi
        tar -czf "${TARBALL_NAME}" -C "${CRATE_DIR}" "${tar_members[@]}"
        echo "target-tarball=${GITHUB_WORKSPACE}/${TARBALL_NAME}" >> "${GITHUB_OUTPUT}"
