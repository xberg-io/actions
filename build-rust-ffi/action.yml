name: Build Rust FFI Library
description: Build a Rust FFI crate with cargo, with proper flags, error diagnostics, and artifact verification

inputs:
  crate-name:
    description: "Name of the Rust crate to build (e.g., kreuzberg-ffi, html-to-markdown-ffi)"
    required: true
  features:
    description: "Cargo features to enable (comma-separated, optional)"
    required: false
    default: ""
  target:
    description: "Rust target triple (optional, defaults to host)"
    required: false
    default: ""
  build-profile:
    description: "Build profile (release or dev)"
    required: false
    default: "release"
  verbose:
    description: "Enable verbose build output"
    required: false
    default: "true"
  additional-flags:
    description: "Additional cargo build flags (optional)"
    required: false
    default: ""
  manifest-path:
    description: "Path to Cargo.toml if crate is not in standard crates/<name>/ location"
    required: false
    default: ""
  disable-sccache:
    description: "Disable sccache for this build (useful for FFI builds that conflict with sccache)"
    required: false
    default: "true"
  glibc-version:
    description: "glibc version for gnu targets (e.g. '2.28') to enable zigbuild; empty = native cargo build"
    required: false
    default: ""
  linux-features:
    description: "Extra Cargo features enabled only on the linux-gnu cargo-zigbuild path (e.g. 'kreuzberg/openssl-vendored' to vendor OpenSSL, since zigcc cannot find the Debian multiarch system headers). Empty by default; ignored on native/macOS/Windows builds."
    required: false
    default: ""

outputs:
  library-path:
    description: "Path to the built library"
    value: ${{ steps.build.outputs.library-path }}
  target-dir:
    description: "Cargo target directory with profile"
    value: ${{ steps.build.outputs.target-dir }}

runs:
  using: composite
  steps:
    - name: Validate inputs
      shell: bash
      env:
        CRATE_NAME: ${{ inputs.crate-name }}
        MANIFEST_PATH: ${{ inputs.manifest-path }}
      run: |
        python3 "$GITHUB_ACTION_PATH/scripts/build.py" --validate-only

    - name: Build FFI library
      id: build
      shell: bash
      env:
        CRATE_NAME: ${{ inputs.crate-name }}
        FEATURES: ${{ inputs.features }}
        TARGET: ${{ inputs.target }}
        BUILD_PROFILE: ${{ inputs.build-profile }}
        VERBOSE: ${{ inputs.verbose }}
        ADDITIONAL_FLAGS: ${{ inputs.additional-flags }}
        MANIFEST_PATH: ${{ inputs.manifest-path }}
        DISABLE_SCCACHE: ${{ inputs.disable-sccache }}
        GLIBC_VERSION: ${{ inputs.glibc-version }}
        LINUX_FEATURES: ${{ inputs.linux-features }}
      run: |
        python3 "$GITHUB_ACTION_PATH/scripts/build.py"

    - name: Fix macOS dylib install_name
      shell: bash
      env:
        LIBRARY_PATH: ${{ steps.build.outputs.library-path }}
        CRATE_NAME: ${{ inputs.crate-name }}
      run: |
        python3 "$GITHUB_ACTION_PATH/scripts/fix_dylib_install_name.py"

    - name: Verify build artifacts
      shell: bash
      env:
        LIBRARY_PATH: ${{ steps.build.outputs.library-path }}
        TARGET_DIR: ${{ steps.build.outputs.target-dir }}
      run: |
        python3 "$GITHUB_ACTION_PATH/scripts/verify.py"
