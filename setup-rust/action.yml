name: Setup Rust Environment
description: Install Rust toolchain with caching for build artifacts. For *-unknown-linux-musl targets, automatically installs musl-tools and configures cc-rs environment variables.
inputs:
  components:
    description: Comma-separated list of Rust components to install
    required: false
    default: rustfmt, clippy, llvm-tools-preview, rust-src
  target:
    description: Target triple to install
    required: false
    default: ""
  cache-key-prefix:
    description: Prefix for cache keys
    required: false
    default: rust-build
  toolchain:
    description: Specific Rust toolchain triple/channel to install (e.g., stable, stable-x86_64-pc-windows-gnu)
    required: false
    default: ""
  use-sccache:
    description: Enable sccache as the Rust compiler wrapper
    required: false
    default: "true"
  report-stats:
    description: Report sccache statistics after builds
    required: false
    default: "true"
  shared-core-cache:
    description: Enable shared cache for FFI core libraries across language bindings
    required: false
    default: "false"
  disable-cache:
    description: Disable build artifact caching (useful for Windows where fingerprints get corrupted)
    required: false
    default: "false"
  install-llvm-cov:
    description: Install cargo-llvm-cov for coverage reporting
    required: false
    default: "true"
  macos-dynamic-lookup:
    description: Add -undefined dynamic_lookup linker flag on macOS (needed for extension builds)
    required: false
    default: "true"

outputs:
  cache-hit:
    description: Whether the Rust cache was restored
    value: ${{ steps.cache-rust.outputs.cache-hit }}
runs:
  using: composite
  steps:
    - name: Setup Rust
      shell: bash
      run: |
        # When a bare toolchain channel (e.g., 1.95) is provided without
        # architecture, append the runner's arch to ensure macOS-arm64
        # installs the correct triple. actions-rust-lang doesn't do this
        # automatically, leading to "not installed for" errors.
        toolchain="${{ inputs.toolchain }}"
        if [[ -n "$toolchain" ]] && [[ "$toolchain" != *"-"* ]]; then
          arch="${{ runner.arch }}"
          if [[ "$arch" == "ARM64" ]]; then
            arch="aarch64"
          elif [[ "$arch" == "X64" ]]; then
            arch="x86_64"
          fi
          # Map runner.arch to rustup-compatible triplet component.
          # Leave as-is if already contains a triple (e.g., stable-aarch64-apple-darwin).
          if [[ "$arch" != "$toolchain" ]]; then
            case "$(uname -s)" in
              Darwin)
                toolchain="${toolchain}-${arch}-apple-darwin"
                ;;
              Linux)
                toolchain="${toolchain}-${arch}-unknown-linux-gnu"
                ;;
              MINGW*|MSYS*|CYGWIN*)
                toolchain="${toolchain}-${arch}-pc-windows-msvc"
                ;;
            esac
          fi
        fi
        echo "expanded_toolchain=${toolchain}" >> "$GITHUB_ENV"

    - name: Install Rust with expanded toolchain
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: ${{ env.expanded_toolchain || inputs.toolchain }}
        components: ${{ inputs.components }}
        target: ${{ inputs.target }}
        cache: false

    - name: Verify Rust installation
      shell: bash
      run: |
        "$GITHUB_ACTION_PATH/scripts/verify-install.sh" "${{ inputs.target }}"

    - name: Setup sccache
      if: inputs.use-sccache == 'true'
      uses: mozilla-actions/sccache-action@v0.0.10
      continue-on-error: true

    - name: Configure Rust flags
      shell: bash
      run: |
        "$GITHUB_ACTION_PATH/scripts/configure-flags.sh" "${{ inputs.use-sccache }}" "${{ inputs.macos-dynamic-lookup }}"

    - name: Generate Cargo.lock hash
      id: cargo-hash
      shell: bash
      run: |
        "$GITHUB_ACTION_PATH/scripts/cargo-lock-hash.sh"

    - name: Cache Rust build artifacts
      id: cache-rust
      if: inputs.disable-cache != 'true'
      uses: actions/cache@v5
      with:
        path: |
          ~/.cargo/registry/index
          ~/.cargo/registry/cache
          ~/.cargo/git/db
          target/
        key: ${{ inputs.shared-core-cache == 'true' && format('shared-core-v4-{0}-{1}-{2}', runner.os, runner.arch, steps.cargo-hash.outputs.hash) || format('{0}-v4-{1}-{2}-{3}-{4}', inputs.cache-key-prefix, runner.os, runner.arch, inputs.target || 'default', steps.cargo-hash.outputs.hash) }}
        restore-keys: |
          ${{ inputs.shared-core-cache == 'true' && format('shared-core-v4-{0}-{1}-', runner.os, runner.arch) || format('{0}-v4-{1}-{2}-{3}-', inputs.cache-key-prefix, runner.os, runner.arch, inputs.target || 'default') }}

    - name: Validate sccache installation
      if: inputs.use-sccache == 'true'
      shell: bash
      run: |
        "$GITHUB_ACTION_PATH/scripts/validate-sccache.sh"

    - name: Ensure sccache is on PATH
      if: inputs.use-sccache == 'true' && env.SCCACHE_PATH != ''
      shell: bash
      run: |
        "$GITHUB_ACTION_PATH/scripts/ensure-sccache-path.sh"

    - name: Add Rust target
      if: inputs.target != ''
      shell: bash
      run: |
        "$GITHUB_ACTION_PATH/scripts/add-target.sh" "${{ inputs.target }}"

    - name: Clean stale fingerprints
      shell: bash
      run: |
        "$GITHUB_ACTION_PATH/scripts/cleanup-fingerprints.sh"

    - name: Install cargo-llvm-cov
      if: inputs.install-llvm-cov == 'true'
      uses: taiki-e/install-action@v2
      with:
        tool: cargo-llvm-cov

    - name: Report sccache statistics
      if: inputs.use-sccache == 'true' && inputs.report-stats == 'true' && always()
      shell: bash
      run: |
        "$GITHUB_ACTION_PATH/scripts/report-sccache-stats.sh"
