name: Setup PHP CI ini
description: >
  Generate a php.ini that loads a locally-built `ext-php-rs` extension
  alongside the active PHP runtime's bundled extensions. Detects the OS
  to pick the right shared-library suffix, locates the extension under
  `target/<profile>/`, and discovers the active PHP's `extension_dir` so
  bundled extensions (dom, mbstring, tokenizer, ...) resolve when running
  `php -c <ini>`.

inputs:
  crate-name:
    description: "ext-php-rs crate name (e.g. 'kreuzcrawl-php'). Used to derive the shared library filename via 's/-/_/g'."
    required: true
  output-dir:
    description: "Directory to write the ini into."
    required: false
    default: "."
  output-name:
    description: "Ini filename written under output-dir."
    required: false
    default: "php-kreuzcrawl.ini"
  extensions:
    description: "Space-separated PHP bundled extensions to preload via `extension = <name>`."
    required: false
    default: "ctype dom libxml mbstring tokenizer xml xmlwriter"
  build-dir-priority:
    description: "Space-separated list of build directories to search for the extension. First hit wins."
    required: false
    default: "target/release target/debug"

outputs:
  ini-path:
    description: "Absolute path of the generated ini file."
    value: ${{ steps.write-ini.outputs.ini-path }}

runs:
  using: composite
  steps:
    - name: Write CI php.ini
      id: write-ini
      shell: bash
      env:
        CRATE_NAME: ${{ inputs.crate-name }}
        OUTPUT_DIR: ${{ inputs.output-dir }}
        OUTPUT_NAME: ${{ inputs.output-name }}
        PHP_EXTENSIONS: ${{ inputs.extensions }}
        BUILD_DIR_PRIORITY: ${{ inputs.build-dir-priority }}
      run: |
        set -euo pipefail

        if [ -z "${CRATE_NAME}" ]; then
          echo "ERROR: 'crate-name' input is required." >&2
          exit 1
        fi

        crate_underscored="${CRATE_NAME//-/_}"

        case "${RUNNER_OS:-$(uname -s)}" in
          Linux|linux*|Linux*)
            EXT_FILE="lib${crate_underscored}.so"
            ;;
          macOS|Darwin|darwin*)
            EXT_FILE="lib${crate_underscored}.dylib"
            ;;
          Windows|MINGW*|MSYS*|CYGWIN*)
            EXT_FILE="${crate_underscored}.dll"
            ;;
          *)
            echo "WARNING: unknown OS '${RUNNER_OS:-$(uname -s)}' - defaulting to Linux .so" >&2
            EXT_FILE="lib${crate_underscored}.so"
            ;;
        esac

        BUILT_EXT=""
        for candidate_dir in ${BUILD_DIR_PRIORITY}; do
          if [ -f "${candidate_dir}/${EXT_FILE}" ]; then
            BUILT_EXT="${candidate_dir}/${EXT_FILE}"
            break
          fi
        done

        if [ -z "${BUILT_EXT}" ]; then
          echo "ERROR: extension '${EXT_FILE}' not found in any of: ${BUILD_DIR_PRIORITY}" >&2
          for candidate_dir in ${BUILD_DIR_PRIORITY}; do
            echo "Files in ${candidate_dir}:" >&2
            find "${candidate_dir}" -maxdepth 1 -iname "*${crate_underscored}*" -type f 2>/dev/null >&2 || echo "  (missing)" >&2
          done
          exit 1
        fi

        # Resolve to an absolute path so `php -c` does not need a specific cwd.
        if command -v python3 >/dev/null 2>&1; then
          ABS_BUILT_EXT="$(python3 -c 'import os, sys; print(os.path.abspath(sys.argv[1]))' "${BUILT_EXT}")"
        else
          ABS_BUILT_EXT="$(cd "$(dirname "${BUILT_EXT}")" && pwd)/$(basename "${BUILT_EXT}")"
        fi

        # On MSYS-style runners convert backslashes for PHP.
        case "${RUNNER_OS:-$(uname -s)}" in
          Windows|MINGW*|MSYS*|CYGWIN*)
            ABS_BUILT_EXT="${ABS_BUILT_EXT//\\//}"
            ;;
        esac

        DEFAULT_EXT_DIR="$(php -r 'echo ini_get("extension_dir");' 2>/dev/null || true)"
        if [ -z "${DEFAULT_EXT_DIR}" ]; then
          DEFAULT_EXT_DIR="$(php-config --extension-dir 2>/dev/null || true)"
        fi
        if [ -z "${DEFAULT_EXT_DIR}" ]; then
          echo "ERROR: could not determine PHP extension_dir from 'php -r' or 'php-config'." >&2
          exit 1
        fi

        mkdir -p "${OUTPUT_DIR}"
        INI_PATH="${OUTPUT_DIR%/}/${OUTPUT_NAME}"

        {
          echo "; Generated by xberg-io/actions/setup-php-ci-ini"
          echo "; Loads the locally-built ${CRATE_NAME} extension alongside the active PHP runtime."
          echo ""
          echo "extension=\"${ABS_BUILT_EXT}\""
          echo ""
          echo "extension_dir = ${DEFAULT_EXT_DIR}"
          echo ""
          for ext_name in ${PHP_EXTENSIONS}; do
            echo "extension = ${ext_name}"
          done
        } >"${INI_PATH}"

        # Resolve INI_PATH to absolute for the action output.
        if command -v python3 >/dev/null 2>&1; then
          ABS_INI_PATH="$(python3 -c 'import os, sys; print(os.path.abspath(sys.argv[1]))' "${INI_PATH}")"
        else
          ABS_INI_PATH="$(cd "$(dirname "${INI_PATH}")" && pwd)/$(basename "${INI_PATH}")"
        fi

        echo "ini-path=${ABS_INI_PATH}" >>"${GITHUB_OUTPUT}"

        echo "Wrote CI php.ini to ${ABS_INI_PATH}"
        echo "--- ${ABS_INI_PATH} ---"
        cat "${INI_PATH}"
        echo "--- end ---"
