name: Setup Chromium
description: >
  Install non-snap Chromium for headless browser e2e tests. Uses Playwright's
  browser installer to provision a Chromium binary that accepts all CLI flags
  (--no-sandbox, --headless, --disable-features, etc.) — required on Ubuntu
  runners where the default `chromium` package is a snap wrapper that rejects
  Chromium flags. Outputs the absolute binary path for consumers.

outputs:
  chromium-path:
    description: Absolute path to the Chromium binary
    value: ${{ steps.install.outputs.chromium-path }}

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v7
      with:
        node-version: "24"

    - name: Install Chromium via Playwright
      id: install
      shell: bash
      run: |
        set -euo pipefail
        tmpdir="${RUNNER_TEMP:-/tmp}/setup-chromium-$$"
        mkdir -p "$tmpdir"
        cd "$tmpdir"

        cat > package.json <<'EOF'
        { "name": "chromium-installer", "version": "1.0.0", "private": true }
        EOF

        # Install the standalone playwright runtime (no test framework needed)
        npm install --no-audit --no-fund --silent playwright@^1.49.0

        # Download Chromium browser binaries
        if [ "${RUNNER_OS:-}" = "Linux" ]; then
          npx --no-install playwright install --with-deps chromium
        else
          npx --no-install playwright install chromium
        fi

        # Resolve the executable path via Playwright's own API
        chromium_path=$(node -e "console.log(require('playwright').chromium.executablePath())")
        if [ -z "$chromium_path" ] || [ ! -x "$chromium_path" ]; then
          echo "ERROR: Chromium binary not found at: $chromium_path" >&2
          exit 1
        fi

        echo "Chromium binary: $chromium_path"
        echo "chromium-path=$chromium_path" >> "$GITHUB_OUTPUT"

    - name: Verify Chromium accepts headless flags
      shell: bash
      run: |
        set -euo pipefail
        "${{ steps.install.outputs.chromium-path }}" --version
        "${{ steps.install.outputs.chromium-path }}" \
          --headless=new \
          --no-sandbox \
          --disable-features=TranslateUI \
          --dump-dom \
          about:blank > /dev/null
