name: Lint Documentation
description: >
  Run docs lint suite: link check (lychee) + prose lint (textlint),
  with optional snippet validation for code examples via `alef snippets`.

inputs:
  working-directory:
    description: "Working directory for docs commands"
    required: false
    default: "."
  strict:
    description: "Fail on prose lint warnings (not just errors)"
    required: false
    default: "false"
  validate-snippets:
    description: "Also run task docs:snippets:validate if present"
    required: false
    default: "false"
  alef-ref:
    description: "Alef version to install (passed to install-alef@v1) — used by snippet validation"
    required: false
    default: "main"

runs:
  using: composite
  steps:
    - name: Install Task
      uses: xberg-io/actions/install-task@v1

    - name: Install prek
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        PREK_FALLBACK_VERSION: v0.4.4
      run: |
        set -euo pipefail
        OS=$(uname -s)
        ARCH=$(uname -m)
        case "$OS" in
          Darwin)
            TARGET="aarch64-apple-darwin"
            if [ "$ARCH" = "x86_64" ]; then
              TARGET="x86_64-apple-darwin"
            fi
            ;;
          Linux)
            TARGET="x86_64-unknown-linux-gnu"
            if [ "$ARCH" = "aarch64" ]; then
              TARGET="aarch64-unknown-linux-gnu"
            fi
            ;;
          *)
            echo "Unsupported OS: $OS" >&2
            exit 1
            ;;
        esac
        VERSION=""
        for attempt in 1 2 3; do
          if VERSION=$(gh api repos/j178/prek/releases/latest --jq '.tag_name' 2>/dev/null) && [ -n "$VERSION" ]; then
            break
          fi
          echo "Attempt ${attempt}: failed to resolve latest prek version via gh api; retrying..." >&2
          sleep $((attempt * 2))
          VERSION=""
        done
        if [ -z "$VERSION" ]; then
          echo "Falling back to pinned prek ${PREK_FALLBACK_VERSION}" >&2
          VERSION="${PREK_FALLBACK_VERSION}"
        fi
        echo "Installing prek ${VERSION} for ${TARGET}"
        mkdir -p "$HOME/.local/bin"
        URL="https://github.com/j178/prek/releases/download/${VERSION}/prek-${TARGET}.tar.gz"
        ok=0
        for attempt in 1 2 3; do
          if curl --fail --silent --show-error --location --retry 3 --retry-delay 2 "$URL" \
              | tar xz --strip-components=1 -C "$HOME/.local/bin"; then
            ok=1
            break
          fi
          echo "Attempt ${attempt}: prek download failed; retrying..." >&2
          sleep $((attempt * 2))
        done
        if [ "$ok" -ne 1 ]; then
          echo "Failed to download prek after 3 attempts" >&2
          exit 1
        fi
        chmod +x "$HOME/.local/bin/prek"
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"

    - name: Install lychee
      uses: taiki-e/install-action@v2
      with:
        tool: lychee

    - name: Install textlint + xberg rule set
      uses: xberg-io/actions/setup-textlint@v1

    - name: Lint documentation links
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        if [ -x "$(command -v task)" ]; then
          task docs:lint:links || true
        else
          lychee --offline --no-progress docs/ .github/ || true
        fi

    - name: Lint documentation prose
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        if [ -x "$(command -v task)" ]; then
          if [ "${{ inputs.strict }}" = "true" ]; then
            TEXTLINT_STRICT=1 task docs:lint:prose
          else
            task docs:lint:prose || true
          fi
        else
          textlint docs/ 2>&1 || [ "${{ inputs.strict }}" = "false" ]
        fi

    - name: Install alef CLI
      if: inputs.validate-snippets == 'true'
      uses: xberg-io/actions/install-alef@v1
      with:
        version: ${{ inputs.alef-ref }}

    - name: Validate documentation snippets
      if: inputs.validate-snippets == 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        if [ -x "$(command -v task)" ]; then
          task docs:snippets:validate
        else
          alef snippets validate --snippets docs/snippets --level syntax --timeout 120 -j 4
        fi
