name: Lint Documentation
description: >
  Run docs lint suite: link check (lychee) + prose lint (textlint),
  with optional snippet validation for code examples via `alef snippets`.

inputs:
  working-directory:
    description: "Working directory for docs commands"
    required: false
    default: "."
  strict:
    description: "Fail on prose lint warnings (not just errors)"
    required: false
    default: "false"
  validate-snippets:
    description: "Also run task docs:snippets:validate if present"
    required: false
    default: "false"
  alef-ref:
    description: "Alef version to install (passed to install-alef@v1) — used by snippet validation"
    required: false
    default: "main"

runs:
  using: composite
  steps:
    - name: Install Task
      uses: kreuzberg-dev/actions/install-task@v1

    - name: Install prek
      shell: bash
      run: |
        set -euo pipefail
        OS=$(uname -s)
        ARCH=$(uname -m)
        case "$OS" in
          Darwin)
            TARGET="aarch64-apple-darwin"
            if [ "$ARCH" = "x86_64" ]; then
              TARGET="x86_64-apple-darwin"
            fi
            ;;
          Linux)
            TARGET="x86_64-unknown-linux-gnu"
            if [ "$ARCH" = "aarch64" ]; then
              TARGET="aarch64-unknown-linux-gnu"
            fi
            ;;
          *)
            echo "Unsupported OS: $OS" >&2
            exit 1
            ;;
        esac
        VERSION="latest"
        if [ "$VERSION" = "latest" ]; then
          VERSION=$(curl -s https://api.github.com/repos/j178/prek/releases/latest | grep tag_name | cut -d'"' -f4)
        fi
        mkdir -p "$HOME/.local/bin"
        curl -L "https://github.com/j178/prek/releases/download/${VERSION}/prek-${TARGET}.tar.gz" | tar xz -C "$HOME/.local/bin"
        chmod +x "$HOME/.local/bin/prek"
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"

    - name: Install lychee
      uses: taiki-e/install-action@v2
      with:
        tool: lychee

    - name: Install textlint + kreuzberg rule set
      uses: kreuzberg-dev/actions/setup-textlint@v1

    - name: Lint documentation links
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        if [ -x "$(command -v task)" ]; then
          task docs:lint:links || true
        else
          lychee --offline --no-progress docs/ .github/ || true
        fi

    - name: Lint documentation prose
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        if [ -x "$(command -v task)" ]; then
          if [ "${{ inputs.strict }}" = "true" ]; then
            TEXTLINT_STRICT=1 task docs:lint:prose
          else
            task docs:lint:prose || true
          fi
        else
          textlint docs/ 2>&1 || [ "${{ inputs.strict }}" = "false" ]
        fi

    - name: Install alef CLI
      if: inputs.validate-snippets == 'true'
      uses: kreuzberg-dev/actions/install-alef@v1
      with:
        version: ${{ inputs.alef-ref }}

    - name: Validate documentation snippets
      if: inputs.validate-snippets == 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        if [ -x "$(command -v task)" ]; then
          task docs:snippets:validate
        else
          alef snippets validate --snippets docs/snippets --level syntax --timeout 120 -j 4
        fi
