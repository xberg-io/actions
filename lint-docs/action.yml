name: Lint Documentation
description: >
  Run docs lint suite: link check (lychee) + prose lint (textlint),
  with optional snippet validation for code examples via alef-snippets.

inputs:
  working-directory:
    description: "Working directory for docs commands"
    required: false
    default: "."
  strict:
    description: "Fail on prose lint warnings (not just errors)"
    required: false
    default: "false"
  validate-snippets:
    description: "Also run task docs:snippets:validate if present"
    required: false
    default: "false"
  alef-ref:
    description: "Git ref (branch/tag/sha) of kreuzberg-dev/alef to install alef-snippets from"
    required: false
    default: "main"

runs:
  using: composite
  steps:
    - name: Install Task
      uses: kreuzberg-dev/actions/install-task@v1

    - name: Setup Node.js
      uses: kreuzberg-dev/actions/setup-node-workspace@v1

    - name: Install lychee + textlint
      uses: taiki-e/install-action@v2
      with:
        tool: lychee

    - name: Install textlint + kreuzberg rule set
      uses: kreuzberg-dev/actions/setup-textlint@v1

    - name: Lint documentation links
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        if [ -x "$(command -v task)" ]; then
          task docs:lint:links || true
        else
          lychee --offline --no-progress docs/ .github/ || true
        fi

    - name: Lint documentation prose
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        if [ -x "$(command -v task)" ]; then
          if [ "${{ inputs.strict }}" = "true" ]; then
            TEXTLINT_STRICT=1 task docs:lint:prose
          else
            task docs:lint:prose || true
          fi
        else
          textlint docs/ 2>&1 || [ "${{ inputs.strict }}" = "false" ]
        fi

    - name: Cache cargo build artifacts (for alef-snippets install)
      if: inputs.validate-snippets == 'true'
      uses: Swatinem/rust-cache@v2
      with:
        key: alef-snippets-${{ inputs.alef-ref }}

    - name: Install alef-snippets
      if: inputs.validate-snippets == 'true'
      shell: bash
      run: |
        set -euo pipefail
        if command -v alef-snippets >/dev/null 2>&1; then
          echo "alef-snippets already on PATH: $(alef-snippets --help 2>&1 | head -1 || true)"
          exit 0
        fi
        cargo install \
          --locked \
          --git https://github.com/kreuzberg-dev/alef \
          --rev "${{ inputs.alef-ref }}" \
          --features cli \
          alef-snippets || \
        cargo install \
          --locked \
          --git https://github.com/kreuzberg-dev/alef \
          --branch "${{ inputs.alef-ref }}" \
          --features cli \
          alef-snippets

    - name: Validate documentation snippets
      if: inputs.validate-snippets == 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        if [ -x "$(command -v task)" ]; then
          task docs:snippets:validate
        else
          alef-snippets validate --snippets docs/snippets --level syntax --timeout 120 -j 4
        fi
