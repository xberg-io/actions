name: Build WASM Package
description: Builds WebAssembly package and optionally creates tarball

inputs:
  crate-dir:
    description: Path to the WASM crate directory (relative to repo root)
    required: true
  build-command:
    description: Command to build the WASM bundle
    required: false
    default: "pnpm run build:all"
  pack-tarball:
    description: Whether to pack the result as a tarball
    required: false
    default: "false"
  wasm-pack-version:
    description: wasm-pack version to install (or 'skip' to skip install)
    required: false
    default: "0.13.1"

outputs:
  tarball:
    description: Path to the packed tarball (if pack-tarball is true)
    value: ${{ steps.pack.outputs.tarball }}

runs:
  using: composite
  steps:
    - name: Install wasm-pack
      if: inputs.wasm-pack-version != 'skip'
      shell: bash
      run: |
        set -euo pipefail
        if command -v wasm-pack >/dev/null && wasm-pack --version | grep -q "${{ inputs.wasm-pack-version }}"; then
          echo "wasm-pack ${{ inputs.wasm-pack-version }} already installed"
        else
          curl -sSfL https://github.com/rustwasm/wasm-pack/releases/download/v${{ inputs.wasm-pack-version }}/wasm-pack-v${{ inputs.wasm-pack-version }}-x86_64-unknown-linux-musl.tar.gz \
            | tar -xzv --strip-components=1 -C /usr/local/bin --wildcards '*/wasm-pack'
          chmod +x /usr/local/bin/wasm-pack
          wasm-pack --version
        fi

    - name: Build WASM bundle
      shell: bash
      working-directory: ${{ inputs.crate-dir }}
      run: |
        set -euo pipefail
        ${{ inputs.build-command }}

    - name: Pack WASM tarball
      if: inputs.pack-tarball == 'true'
      id: pack
      shell: bash
      run: |
        set -euo pipefail
        pushd "${{ inputs.crate-dir }}" >/dev/null
        WASM_TGZ=$(npm pack | tail -1)
        mv "$WASM_TGZ" "$GITHUB_WORKSPACE/$WASM_TGZ"
        popd >/dev/null
        echo "tarball=$GITHUB_WORKSPACE/$WASM_TGZ" >> "$GITHUB_OUTPUT"
