name: Publish to Packagist
description: >
  Trigger Packagist package update and poll for version availability.
  Packagist auto-indexes from GitHub tags; this action triggers
  immediate re-indexing via API.

inputs:
  packagist-username:
    description: "Packagist username"
    required: true
  package-name:
    description: "Full Packagist package name (e.g., vendor/package)"
    required: true
  version:
    description: "Version to verify is available"
    required: true
  repository-url:
    description: "GitHub repository URL for the package"
    required: true
  max-attempts:
    description: "Maximum polling attempts"
    required: false
    default: "12"
  poll-interval:
    description: "Seconds between polling attempts"
    required: false
    default: "10"
  dry-run:
    description: "Perform a dry run without triggering update"
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Trigger Packagist update and verify
      shell: bash
      env:
        PACKAGIST_API_TOKEN: ${{ env.PACKAGIST_API_TOKEN }}
        INPUT_USERNAME: ${{ inputs.packagist-username }}
        INPUT_PACKAGE_NAME: ${{ inputs.package-name }}
        INPUT_VERSION: ${{ inputs.version }}
        INPUT_REPOSITORY_URL: ${{ inputs.repository-url }}
        INPUT_MAX_ATTEMPTS: ${{ inputs.max-attempts }}
        INPUT_POLL_INTERVAL: ${{ inputs.poll-interval }}
        INPUT_DRY_RUN: ${{ inputs.dry-run }}
      run: |
        python3 "${{ github.action_path }}/scripts/publish.py"
