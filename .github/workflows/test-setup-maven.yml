name: Test setup-maven
on:
  push:
    paths:
      - "setup-maven/**"
      - ".github/workflows/test-setup-maven.yml"
  pull_request:
    paths:
      - "setup-maven/**"
      - ".github/workflows/test-setup-maven.yml"

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Maven (with Java 21)
        uses: ./setup-maven
        with:
          java-version: "21"

      - name: Verify Maven installation
        shell: bash
        run: mvn --version

      - name: Verify Java installation
        shell: bash
        run: java -version
