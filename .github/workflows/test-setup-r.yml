name: Test setup-r
on:
  push:
    paths:
      - "setup-r/**"
      - ".github/workflows/test-setup-r.yml"
  pull_request:
    paths:
      - "setup-r/**"
      - ".github/workflows/test-setup-r.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup R
        uses: ./setup-r
        with:
          install-deps: "false"

      - name: Verify installation
        shell: bash
        run: |
          R --version
          Rscript -e 'cat(R.version.string, "\n")'
