name: Test build-rust-cli
on:
  push:
    paths:
      - "build-rust-cli/**"
      - ".github/workflows/test-build-rust-cli.yml"
  pull_request:
    paths:
      - "build-rust-cli/**"
      - ".github/workflows/test-build-rust-cli.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Stage a tiny cargo workspace with one bin target
        shell: bash
        run: |
          mkdir -p src
          cat >Cargo.toml <<'TOML'
          [package]
          name = "fixture-cli"
          version = "0.0.1"
          edition = "2021"
          publish = false

          [[bin]]
          name = "fixture-cli"
          path = "src/main.rs"
          TOML
          echo 'fn main() { println!("hello from fixture-cli"); }' >src/main.rs

      - name: Build CLI binary via the action
        id: build
        uses: ./build-rust-cli
        with:
          package-name: fixture-cli
          binary-name: fixture-cli

      - name: Verify binary exists and runs
        shell: bash
        run: |
          test -x target/release/fixture-cli
          ./target/release/fixture-cli
          [ -n "${{ steps.build.outputs.binary-path }}" ]
          test -f "${{ steps.build.outputs.binary-path }}"
