name: Test publish actions (dry-run)
on:
  push:
    paths:
      - "publish-*/**"
      - "wait-for-package/**"
      - ".github/workflows/test-publish-actions.yml"
  pull_request:
    paths:
      - "publish-*/**"
      - "wait-for-package/**"
      - ".github/workflows/test-publish-actions.yml"

jobs:
  test-publish-npm-dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Create dummy npm package
        run: |
          mkdir -p dist
          mkdir -p pkg && cd pkg
          npm init -y
          npm pack --pack-destination ../dist

      - name: Test publish-npm (dry-run)
        uses: ./publish-npm
        with:
          packages-dir: dist
          dry-run: "true"
          provenance: "false"

  test-publish-pypi-dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Create dummy dist directory
        run: |
          mkdir -p dist
          touch dist/test_package-0.0.1.tar.gz

      - name: Test publish-pypi (dry-run)
        uses: ./publish-pypi
        with:
          packages-dir: dist
          dry-run: "true"

  test-publish-rubygems-dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Create dummy gem
        run: |
          mkdir -p dist
          cat > /tmp/test.gemspec << 'RUBY'
          Gem::Specification.new do |s|
            s.name = "test-gem"
            s.version = "0.0.1"
            s.summary = "Test"
            s.authors = ["Test"]
          end
          RUBY
          gem build /tmp/test.gemspec -o dist/test-gem-0.0.1.gem

      - name: Test publish-rubygems (dry-run)
        uses: ./publish-rubygems
        with:
          gems-dir: dist
          dry-run: "true"

  test-publish-github-release-dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Test publish-github-release (dry-run)
        uses: ./publish-github-release
        with:
          tag: v0.0.0-test
          title: "Test Release"
          dry-run: "true"

  test-publish-nuget-dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Create dummy nupkg
        run: |
          mkdir -p dist
          touch dist/TestPackage.0.0.1.nupkg

      - name: Test publish-nuget (dry-run)
        uses: ./publish-nuget
        with:
          packages-dir: dist
          dry-run: "true"

  test-publish-packagist-dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Test publish-packagist (dry-run)
        uses: ./publish-packagist
        with:
          packagist-username: test
          package-name: vendor/package
          version: "0.0.1"
          repository-url: "https://github.com/test/repo"
          dry-run: "true"

  test-publish-crates-dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false

      - name: Create dummy Rust crate
        run: |
          cargo init --name test-crate /tmp/test-crate
          cd /tmp/test-crate
          # dry-run will validate but not publish

      - name: Test publish-crates (dry-run)
        uses: ./publish-crates
        with:
          crates: test-crate
          version: "0.0.1"
          dry-run: "true"
          manifest-path: /tmp/test-crate/Cargo.toml

  test-wait-for-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Wait for known published package (npm)
        uses: ./wait-for-package
        with:
          registry: npm
          package: lodash
          version: "4.17.21"
          max-attempts: "3"

      - name: Wait for known published package (pypi)
        uses: ./wait-for-package
        with:
          registry: pypi
          package: requests
          version: "2.31.0"
          max-attempts: "3"

      - name: Wait for known published package (cratesio)
        uses: ./wait-for-package
        with:
          registry: cratesio
          package: serde
          version: "1.0.200"
          max-attempts: "3"

  test-publish-gleam-dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          gleam-version: "1.6"

      - name: Scaffold a Gleam package
        run: gleam new pkg

      - name: Test publish-gleam (dry-run)
        uses: ./publish-gleam
        with:
          package-dir: pkg
          setup-beam: "false"
          dry-run: "true"

  test-publish-hex-dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          elixir-version: "1.17"

      - name: Scaffold an Elixir mix project
        run: mix new pkg

      - name: Test publish-hex (dry-run)
        uses: ./publish-hex
        with:
          package-dir: pkg
          dry-run: "true"

  test-publish-maven-dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Stage a minimal pom.xml
        shell: bash
        run: |
          mkdir -p pkg
          cat >pkg/pom.xml <<'XML'
          <?xml version="1.0" encoding="UTF-8"?>
          <project xmlns="http://maven.apache.org/POM/4.0.0">
            <modelVersion>4.0.0</modelVersion>
            <groupId>dev.kreuzberg.test</groupId>
            <artifactId>dry-run</artifactId>
            <version>0.0.1</version>
            <packaging>jar</packaging>
          </project>
          XML

      - name: Test publish-maven (dry-run)
        uses: ./publish-maven
        with:
          pom-file: pkg/pom.xml
          dry-run: "true"

  test-publish-maven-gradle-dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Stage a minimal Gradle project dir
        run: |
          mkdir -p pkg
          touch pkg/build.gradle.kts

      - name: Test publish-maven-gradle (dry-run)
        uses: ./publish-maven-gradle
        with:
          working-directory: pkg
          setup-java: "false"
          setup-gradle: "false"
          dry-run: "true"

  test-publish-pub-dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Scaffold a Dart package
        run: dart create -t package pkg

      - name: Test publish-pub (dry-run)
        uses: ./publish-pub
        with:
          package-dir: pkg
          setup-dart: "false"
          dry-run: "true"

  test-publish-zig-dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Stage a minimal build.zig.zon
        run: |
          mkdir -p pkg
          cat >pkg/build.zig.zon <<'ZON'
          .{
              .name = "dry_run",
              .version = "0.0.1",
              .paths = .{""},
          }
          ZON

      - name: Test publish-zig (dry-run)
        uses: ./publish-zig
        with:
          working-directory: pkg
          tag: v1.0.0
          setup-zig: "false"
          update-release-notes: "false"
          dry-run: "true"

  test-publish-zig-multi-platform-dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Stage a minimal Zig package + multi-platform FFI fixtures
        run: |
          # Minimal zig package source
          mkdir -p pkg/src
          cat >pkg/build.zig <<'ZIG'
          // In-tree build.zig — the action overwrites this for the distributed tarball.
          const std = @import("std");
          pub fn build(b: *std.Build) void {
              _ = b;
          }
          ZIG
          cat >pkg/build.zig.zon <<'ZON'
          .{
              .name = .dry_run,
              .version = "0.0.1",
              .fingerprint = 0x1234567890abcdef,
              .minimum_zig_version = "0.16.0",
              .dependencies = .{},
              .paths = .{
                  "build.zig",
                  "build.zig.zon",
                  "src",
              },
          }
          ZON
          cat >pkg/src/dry_run.zig <<'ZIG'
          pub const placeholder: u32 = 0;
          ZIG

          # Fixture FFI dir with empty per-RID lib files and a header
          mkdir -p ffi-artifacts/linux-x64 ffi-artifacts/osx-arm64 ffi-artifacts/win-x64 ffi-artifacts/include
          : > ffi-artifacts/linux-x64/libdry_run_ffi.so
          : > ffi-artifacts/osx-arm64/libdry_run_ffi.dylib
          : > ffi-artifacts/win-x64/dry_run_ffi.dll
          : > ffi-artifacts/include/dry_run.h

      - name: Test publish-zig (multi-platform, dry-run)
        uses: ./publish-zig
        with:
          working-directory: pkg
          tag: v1.0.0
          setup-zig: "false"
          update-release-notes: "false"
          dry-run: "true"
          multi-platform-ffi-dir: ffi-artifacts
          module-name: dry_run
          ffi-lib-name: dry_run_ffi

      - name: Verify rewritten build.zig + bundled libs
        shell: bash
        run: |
          # build.zig must reference b.path("lib/<rid>") with the compile-time switch
          grep -q 'fn ridDir' pkg/build.zig
          grep -q 'lib/{s}' pkg/build.zig
          grep -q '"x86_64-linux-gnu"' pkg/build.zig
          grep -q '"aarch64-darwin"' pkg/build.zig
          grep -q '"x86_64-windows-msvc"' pkg/build.zig
          # build.zig.zon must allowlist lib + include
          grep -q '"lib"' pkg/build.zig.zon
          grep -q '"include"' pkg/build.zig.zon
          # bundled libs land in canonical-target subdirs
          test -f pkg/lib/x86_64-linux-gnu/libdry_run_ffi.so
          test -f pkg/lib/aarch64-darwin/libdry_run_ffi.dylib
          test -f pkg/lib/x86_64-windows-msvc/dry_run_ffi.dll
          test -f pkg/include/dry_run.h
          echo "multi-platform layout verified"

  test-publish-helm-chart-dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Stage a minimal helm chart
        run: |
          mkdir -p pkg/templates
          cat >pkg/Chart.yaml <<'YAML'
          apiVersion: v2
          name: dry-run-chart
          description: Smoke-test fixture
          type: application
          version: 0.0.0
          appVersion: "0.0.0"
          YAML
          cat >pkg/templates/configmap.yaml <<'YAML'
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: smoke
          data:
            hello: world
          YAML

      - name: Test publish-helm-chart (dry-run)
        uses: ./publish-helm-chart
        with:
          chart-path: pkg
          version: 0.1.0
          registry: oci://ghcr.io/xberg-io/charts
          username: dummy
          password: dummy
          dry-run: "true"
