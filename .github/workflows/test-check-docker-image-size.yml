name: Test check-docker-image-size
on:
  push:
    paths:
      - "check-docker-image-size/**"
      - ".github/workflows/test-check-docker-image-size.yml"
  pull_request:
    paths:
      - "check-docker-image-size/**"
      - ".github/workflows/test-check-docker-image-size.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Pull alpine image
        run: docker pull alpine:3.20

      - name: Check size below threshold
        id: ok
        uses: ./check-docker-image-size
        with:
          image: alpine:3.20
          warn-mb: "100"
          label: "alpine"

      - name: Verify size output is non-zero
        shell: bash
        env:
          SIZE: ${{ steps.ok.outputs.size-mb }}
        run: |
          test -n "$SIZE"
          [ "$SIZE" -ge 1 ]
          [ "$SIZE" -le 50 ]

      - name: Threshold below size triggers warn (still exit 0)
        uses: ./check-docker-image-size
        with:
          image: alpine:3.20
          warn-mb: "1"
          label: "alpine-warn"

      - name: Threshold below size with fail-mb triggers failure
        id: fail
        uses: ./check-docker-image-size
        continue-on-error: true
        with:
          image: alpine:3.20
          fail-mb: "1"
          label: "alpine-fail"

      - name: Confirm failure outcome
        shell: bash
        run: |
          [ "${{ steps.fail.outcome }}" = "failure" ] || {
            echo "expected failure, got ${{ steps.fail.outcome }}"
            exit 1
          }
