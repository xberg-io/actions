name: Test setup-gradle
on:
  push:
    paths:
      - "setup-gradle/**"
      - ".github/workflows/test-setup-gradle.yml"
  pull_request:
    paths:
      - "setup-gradle/**"
      - ".github/workflows/test-setup-gradle.yml"

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Gradle (with Java 21)
        uses: ./setup-gradle
        with:
          java-version: "21"

      - name: Verify Gradle installation
        shell: bash
        run: gradle --version

      - name: Verify Java installation
        shell: bash
        run: java -version
