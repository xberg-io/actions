name: Test build-node-napi
on:
  push:
    paths:
      - "build-node-napi/**"
      - ".github/workflows/test-build-node-napi.yml"
  pull_request:
    paths:
      - "build-node-napi/**"
      - ".github/workflows/test-build-node-napi.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install pnpm
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@10.25.0 --activate

      - name: Stage a tiny NAPI-RS crate
        shell: bash
        run: |
          mkdir -p packages/node/src
          cat >pnpm-workspace.yaml <<'YAML'
          packages:
            - "packages/*"
          YAML
          cat >package.json <<'JSON'
          {
            "private": true,
            "packageManager": "pnpm@10.25.0"
          }
          JSON
          cat >packages/node/Cargo.toml <<'TOML'
          [package]
          name = "fixture-napi"
          version = "0.0.1"
          edition = "2021"
          publish = false

          [lib]
          crate-type = ["cdylib"]

          [dependencies]
          napi = { version = "2", default-features = false, features = ["napi4"] }
          napi-derive = "2"

          [build-dependencies]
          napi-build = "2"
          TOML
          cat >packages/node/build.rs <<'RS'
          fn main() { napi_build::setup(); }
          RS
          cat >packages/node/src/lib.rs <<'RS'
          #![deny(clippy::all)]
          use napi_derive::napi;

          #[napi]
          pub fn add(a: i32, b: i32) -> i32 { a + b }
          RS
          cat >packages/node/package.json <<'JSON'
          {
            "name": "fixture-napi",
            "version": "0.0.1",
            "main": "index.js",
            "scripts": {
              "build": "napi build --platform --release"
            },
            "files": ["index.js", "index.d.ts", "*.node"],
            "napi": {
              "binaryName": "fixture-napi",
              "targets": ["x86_64-unknown-linux-gnu"]
            },
            "devDependencies": {
              "@napi-rs/cli": "3.7.2"
            }
          }
          JSON
          cargo generate-lockfile --manifest-path packages/node/Cargo.toml

      - name: Build NAPI bindings via the action
        uses: ./build-node-napi
        with:
          crate-dir: packages/node
          build-command: "pnpm run build"

      - name: Verify .node artifact produced
        shell: bash
        run: |
          ls -la packages/node/
          test -n "$(ls packages/node/*.node 2>/dev/null)"

      - name: Build with cross-compile and verify platform subdirectory
        uses: ./build-node-napi
        with:
          crate-dir: packages/node
          target: x86_64-unknown-linux-gnu
          use-napi-cross: "true"

      - name: Verify platform subdirectory structure
        shell: bash
        run: |
          # After the above build with target, npm/ should contain platform subdirs
          # The verification step in build-node-napi should have validated the .node file
          echo "npm/ directory structure:"
          find packages/node/npm -type f 2>/dev/null | head -20 || echo "npm/ not present or empty"
