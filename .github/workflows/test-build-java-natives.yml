name: Test build-java-natives
on:
  push:
    paths:
      - "build-java-natives/**"
      - ".github/workflows/test-build-java-natives.yml"
  pull_request:
    paths:
      - "build-java-natives/**"
      - ".github/workflows/test-build-java-natives.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Stage workspace with FFI crate
        shell: bash
        run: |
          mkdir -p crates/fixture-ffi/src
          cat >Cargo.toml <<'TOML'
          [workspace]
          resolver = "2"
          members = ["crates/fixture-ffi"]
          TOML
          cat >crates/fixture-ffi/Cargo.toml <<'TOML'
          [package]
          name = "fixture-ffi"
          version = "0.0.1"
          edition = "2021"
          publish = false

          [lib]
          crate-type = ["cdylib"]
          TOML
          cat >crates/fixture-ffi/src/lib.rs <<'RS'
          #[unsafe(no_mangle)]
          pub extern "C" fn fixture_add(a: i32, b: i32) -> i32 { a + b }
          RS

      - name: Build Java natives via the action
        id: build
        uses: ./build-java-natives
        with:
          target: x86_64-unknown-linux-gnu
          crate-name: fixture-ffi
          classifier: linux-x86_64

      - name: Verify staging layout
        shell: bash
        run: |
          [ -n "${{ steps.build.outputs.library-path }}" ]
          test -f "${{ steps.build.outputs.library-path }}"
          [ -n "${{ steps.build.outputs.staging-dir }}" ]
          test -d dist/java-natives/native/linux-x86_64
          ls -la dist/java-natives/native/linux-x86_64
          test -f dist/java-natives/native/linux-x86_64/libfixture_ffi.so
