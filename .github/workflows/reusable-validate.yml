name: Validate

on:
  workflow_call:
    inputs:
      setup-rust:
        description: "Install the Rust toolchain (needed when poly.toml enables the cargo/clippy hook)."
        required: false
        type: boolean
        default: false
      rust-components:
        description: "rustup components for setup-rust."
        required: false
        type: string
        default: "rustfmt, clippy"
      setup-python:
        description: "Install a Python env so poly's pyrefly type-check can resolve imports."
        required: false
        type: boolean
        default: false
      python-version:
        description: "Python version for setup-python-env."
        required: false
        type: string
        default: "3.13"
      runner:
        description: "Runner label(s) to run on. Defaults to GitHub-hosted; pass a self-hosted label to run on org runners."
        required: false
        type: string
        default: "ubuntu-latest"
      poly-version:
        description: "poly version to install. Empty (default) installs the latest release; set to pin a specific version."
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  validate:
    name: Validate (poly)
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@v7

      - name: Set up Rust
        if: ${{ inputs.setup-rust }}
        uses: xberg-io/actions/setup-rust@v1
        with:
          components: ${{ inputs.rust-components }}
          install-llvm-cov: "false"

      - name: Set up Python
        if: ${{ inputs.setup-python }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}

      - name: Set up uv
        if: ${{ inputs.setup-python }}
        uses: astral-sh/setup-uv@v7

      - name: Sync Python deps (best-effort)
        if: ${{ inputs.setup-python }}
        continue-on-error: true
        run: uv sync || echo "uv sync skipped — non-fatal for poly lint"

      - name: Install poly (latest)
        if: ${{ inputs.poly-version == '' }}
        uses: Goldziher/poly@v0

      - name: Install poly (pinned)
        if: ${{ inputs.poly-version != '' }}
        uses: Goldziher/poly@v0
        with:
          version: ${{ inputs.poly-version }}

      - name: Format check
        run: poly fmt --check .

      - name: Lint
        run: poly lint .
