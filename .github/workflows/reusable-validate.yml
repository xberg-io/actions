name: Validate

# Single shared validation workflow for every xberg-io repo: run polylint
# (format check + lint) over the whole tree. poly bundles its lint/format
# engines (ruff, oxc, taplo, rumdl, …), so most repos need no toolchain. Rust
# and Python toolchains are opt-in via inputs because poly's cargo/clippy hook
# and pyrefly type-check delegate to the installed toolchain.

on:
  workflow_call:
    inputs:
      setup-rust:
        description: "Install the Rust toolchain (needed when poly.toml enables the cargo/clippy hook)."
        required: false
        type: boolean
        default: false
      rust-components:
        description: "rustup components for setup-rust."
        required: false
        type: string
        default: "rustfmt, clippy"
      setup-python:
        description: "Install a Python env so poly's pyrefly type-check can resolve imports."
        required: false
        type: boolean
        default: false
      python-version:
        description: "Python version for setup-python-env."
        required: false
        type: string
        default: "3.13"

permissions:
  contents: read

jobs:
  validate:
    name: Validate (poly)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Rust
        if: ${{ inputs.setup-rust }}
        uses: xberg-io/actions/setup-rust@v1
        with:
          components: ${{ inputs.rust-components }}
          install-llvm-cov: "false"

      - name: Set up Python
        if: ${{ inputs.setup-python }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}

      - name: Set up uv
        if: ${{ inputs.setup-python }}
        uses: astral-sh/setup-uv@v7

      # Best-effort dependency install so poly's pyrefly type-check can resolve
      # imports. Non-fatal: poly's core engines (ruff/oxc/…) are bundled and need
      # no deps, and pyrefly missing-import findings are warnings. Repos with a
      # non-root or workspace layout where a bare `uv sync` doesn't apply simply
      # skip this without failing the job.
      - name: Sync Python deps (best-effort)
        if: ${{ inputs.setup-python }}
        continue-on-error: true
        run: uv sync || echo "uv sync skipped — non-fatal for poly lint"

      - name: Install poly
        uses: Goldziher/polylint@v0

      - name: Format check
        run: poly fmt --check .

      - name: Lint
        run: poly lint .
