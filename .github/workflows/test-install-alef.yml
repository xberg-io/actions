name: Test install-alef
on:
  push:
    paths:
      - "install-alef/**"
      - ".github/workflows/test-install-alef.yml"
  pull_request:
    paths:
      - "install-alef/**"
      - ".github/workflows/test-install-alef.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Alef (latest)
        uses: ./install-alef
        with:
          version: "latest"

      - name: Verify installation
        shell: bash
        run: |
          alef --version
          which alef

      # Re-install with alef already on PATH. Exercises the cargo source-build
      # fallback's --force path (the binary-already-exists case) when the
      # release binary is missing or the runner is warm.
      - name: Install Alef again (idempotent re-install)
        uses: ./install-alef
        with:
          version: "latest"

      - name: Verify re-installation
        shell: bash
        run: |
          alef --version
          which alef
