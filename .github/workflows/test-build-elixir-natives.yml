name: Test build-elixir-natives
on:
  push:
    paths:
      - "build-elixir-natives/**"
      - ".github/workflows/test-build-elixir-natives.yml"
  pull_request:
    paths:
      - "build-elixir-natives/**"
      - ".github/workflows/test-build-elixir-natives.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Stage a tiny Rustler NIF crate
        shell: bash
        run: |
          mkdir -p packages/elixir/native/fixture_nif/src
          cat >Cargo.toml <<'TOML'
          [workspace]
          resolver = "2"
          members = ["packages/elixir/native/fixture_nif"]
          TOML
          cat >packages/elixir/native/fixture_nif/Cargo.toml <<'TOML'
          [package]
          name = "fixture_nif"
          version = "0.0.1"
          edition = "2021"
          publish = false

          [lib]
          name = "fixture_nif"
          crate-type = ["cdylib"]

          [dependencies]
          rustler = "0.34"
          TOML
          cat >packages/elixir/native/fixture_nif/src/lib.rs <<'RS'
          #[rustler::nif]
          fn add(a: i64, b: i64) -> i64 { a + b }

          rustler::init!("Elixir.FixtureNif");
          RS
          cargo generate-lockfile

      - name: Build Elixir NIF via the action
        id: build
        uses: ./build-elixir-natives
        with:
          target: x86_64-unknown-linux-gnu
          nif-crate-name: fixture_nif
          nif-crate-path: packages/elixir/native/fixture_nif
          package-dir: packages/elixir
          nif-version: "0.0.1"
          nif-api-version: "2.16"
          # Standalone fixture crate with no alef.toml — nothing to rewrite.
          rewrite-native-deps: "false"

      - name: Verify NIF tarball produced
        shell: bash
        run: |
          [ -n "${{ steps.build.outputs.archive-path }}" ]
          test -f "${{ steps.build.outputs.archive-path }}"
          [ -n "${{ steps.build.outputs.archive-sha256 }}" ]
          [ -n "${{ steps.build.outputs.archive-name }}" ]
          tar -tzf "${{ steps.build.outputs.archive-path }}"
