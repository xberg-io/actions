name: Test build-zig-package
on:
  push:
    paths:
      - "build-zig-package/**"
      - ".github/workflows/test-build-zig-package.yml"
  pull_request:
    paths:
      - "build-zig-package/**"
      - ".github/workflows/test-build-zig-package.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - name: Stage workspace with FFI crate + minimal Zig package
        shell: bash
        run: |
          mkdir -p crates/fixture-ffi/src packages/zig/src
          cat >Cargo.toml <<'TOML'
          [workspace]
          resolver = "2"
          members = ["crates/fixture-ffi"]
          TOML
          cat >crates/fixture-ffi/Cargo.toml <<'TOML'
          [package]
          name = "fixture-ffi"
          version = "0.0.1"
          edition = "2021"
          publish = false

          [lib]
          crate-type = ["cdylib", "staticlib"]
          TOML
          cat >crates/fixture-ffi/src/lib.rs <<'RS'
          #[unsafe(no_mangle)]
          pub extern "C" fn fixture_add(a: i32, b: i32) -> i32 { a + b }
          RS
          cat >packages/zig/src/fixture.zig <<'ZIG'
          const std = @import("std");
          extern fn fixture_add(a: c_int, b: c_int) c_int;
          test "fixture_add links and computes" {
              try std.testing.expectEqual(@as(c_int, 5), fixture_add(2, 3));
          }
          ZIG
          cat >packages/zig/build.zig <<'ZIG'
          const std = @import("std");

          pub fn build(b: *std.Build) void {
              const target = b.standardTargetOptions(.{});
              const optimize = b.standardOptimizeOption(.{});

              // The build-zig-package action passes -Dffi_path=<dir with the FFI lib>.
              const ffi_path = b.option(
                  []const u8,
                  "ffi_path",
                  "Path to directory containing the FFI static/dynamic library",
              ) orelse "../../target/release";

              const test_module = b.createModule(.{
                  .root_source_file = b.path("src/fixture.zig"),
                  .target = target,
                  .optimize = optimize,
                  .link_libc = true,
              });
              test_module.addLibraryPath(.{ .cwd_relative = ffi_path });
              test_module.linkSystemLibrary("fixture_ffi", .{});

              const tests = b.addTest(.{ .root_module = test_module });
              const run_tests = b.addRunArtifact(tests);
              const test_step = b.step("test", "Run unit tests");
              test_step.dependOn(&run_tests.step);
          }
          ZIG
          cat >packages/zig/build.zig.zon <<'ZON'
          .{
              .name = .fixture,
              .version = "0.0.1",
              .fingerprint = 0x5e540eeff314b8d,
              .paths = .{""},
          }
          ZON
          cargo generate-lockfile

      - name: Build Zig package via the action
        id: build
        uses: ./build-zig-package
        with:
          ffi-crate: fixture-ffi
          package-dir: packages/zig

      - name: Verify FFI library produced
        shell: bash
        run: |
          [ -n "${{ steps.build.outputs.ffi-library-path }}" ]
          test -f "${{ steps.build.outputs.ffi-library-path }}"
