name: Test setup-php
on:
  push:
    paths:
      - "setup-php/**"
      - ".github/workflows/test-setup-php.yml"
  pull_request:
    paths:
      - "setup-php/**"
      - ".github/workflows/test-setup-php.yml"

jobs:
  test:
    name: PHP ${{ matrix.php-version }} on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        php-version: ["8.4", "8.5"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: Setup PHP
        uses: ./setup-php
        with:
          php-version: ${{ matrix.php-version }}

      - name: Verify installation
        shell: bash
        run: |
          php --version
          composer --version
          php -r 'exit(version_compare(PHP_VERSION, "${{ matrix.php-version }}", ">=") ? 0 : 1);'

  tools:
    name: Tool install (phpstan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup PHP with phpstan
        uses: ./setup-php
        with:
          tools: phpstan

      - name: Verify phpstan installation
        shell: bash
        run: phpstan --version
