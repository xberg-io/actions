name: Test build-rust-ffi
on:
  push:
    paths:
      - "build-rust-ffi/**"
      - ".github/workflows/test-build-rust-ffi.yml"
  pull_request:
    paths:
      - "build-rust-ffi/**"
      - ".github/workflows/test-build-rust-ffi.yml"

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Stage a tiny cdylib FFI crate
        shell: bash
        run: |
          mkdir -p fixture/src
          cat >fixture/Cargo.toml <<'TOML'
          [package]
          name = "fixture-ffi"
          version = "0.0.1"
          edition = "2021"
          publish = false

          [lib]
          crate-type = ["cdylib", "rlib"]
          TOML
          cat >fixture/src/lib.rs <<'RS'
          #[unsafe(no_mangle)]
          pub extern "C" fn fixture_add(a: i32, b: i32) -> i32 { a + b }
          RS
          cargo generate-lockfile --manifest-path fixture/Cargo.toml

      - name: Build FFI library via the action
        id: build
        uses: ./build-rust-ffi
        with:
          crate-name: fixture-ffi
          manifest-path: fixture/Cargo.toml
          verbose: "false"

      - name: Verify shared library was produced
        shell: bash
        run: |
          [ -n "${{ steps.build.outputs.library-path }}" ]
          test -f "${{ steps.build.outputs.library-path }}"
          # macOS `file` outputs `Mach-O 64-bit dynamically linked shared library`,
          # Linux outputs `ELF 64-bit LSB shared object`, Windows outputs PE32+ DLL.
          file "${{ steps.build.outputs.library-path }}" | grep -Ei 'shared object|shared library|dynamic library|dll|dylib'

      - name: Verify macOS dylib install_name uses @rpath
        if: runner.os == 'macOS'
        shell: bash
        run: |
          lib_path="${{ steps.build.outputs.library-path }}"
          install_name=$(otool -D "$lib_path" | tail -1)
          echo "Dylib install_name: $install_name"
          if [[ "$install_name" == @rpath/* ]]; then
            echo "✓ install_name correctly uses @rpath"
          else
            echo "✗ install_name does not use @rpath: $install_name"
            exit 1
          fi
