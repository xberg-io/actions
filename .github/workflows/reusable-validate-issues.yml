name: Validate Issues (Reusable)

on:
  workflow_call:
    secrets:
      XBERG_DEV_PROJECT_TOKEN:
        description: Fine-grained PAT with repository-projects=write and issues=write for xberg-io/1
        required: false

permissions:
  issues: write
  repository-projects: write

jobs:
  validate-issue-title:
    name: Issue Title
    runs-on: ubuntu-latest
    if: |
      (github.event.action == 'opened' || github.event.action == 'edited') &&
      github.event.issue.user.type != 'Bot'
    outputs:
      prefix: ${{ steps.check.outputs.prefix }}
    steps:
      - name: Check title format
        id: check
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          allowed='^(bug|feat|docs|chore|refactor|test|ci|perf|build): .{8,}$'
          if ! echo "$ISSUE_TITLE" | grep -qE "$allowed"; then
            echo "::error::Issue title must match: <type>: <description with at least 8 chars>"
            echo ""
            echo "Valid types: bug, feat, docs, chore, refactor, test, ci, perf, build"
            echo ""
            echo "Examples:"
            echo "  bug: extraction returns empty result for password-protected PDF"
            echo "  feat: add streaming output mode to MCP server"
            echo "  docs: explain caching invalidation rules"
            echo ""
            echo "Got: $ISSUE_TITLE"
            exit 1
          fi
          prefix=$(echo "$ISSUE_TITLE" | cut -d: -f1)
          echo "prefix=$prefix" >> "$GITHUB_OUTPUT"

  apply-label:
    name: Apply Canonical Label
    needs: validate-issue-title
    runs-on: ubuntu-latest
    steps:
      - name: Map prefix to label and apply
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          PREFIX: ${{ needs.validate-issue-title.outputs.prefix }}
        run: |
          case "$PREFIX" in
            bug)  label=bug ;;
            feat) label=enhancement ;;
            docs) label=documentation ;;
            *)    echo "No canonical label for prefix '$PREFIX' — skipping"; exit 0 ;;
          esac
          gh issue edit "$ISSUE_URL" --add-label "$label"

  add-to-project:
    name: Add to Project Board
    needs: validate-issue-title
    runs-on: ubuntu-latest
    steps:
      - name: Add issue to xberg-io/1
        env:
          GH_TOKEN: ${{ secrets.XBERG_DEV_PROJECT_TOKEN || github.token }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "::warning::No project token available; skipping project board assignment"
            exit 0
          fi
          if ! gh project item-add 1 --owner xberg-io --url "$ISSUE_URL"; then
            echo "::warning::Failed to add issue to project board (token may lack organization Projects: write scope)"
            exit 0
          fi
