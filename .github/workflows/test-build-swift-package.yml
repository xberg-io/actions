name: Test build-swift-package
on:
  push:
    paths:
      - "build-swift-package/**"
      - ".github/workflows/test-build-swift-package.yml"
  pull_request:
    paths:
      - "build-swift-package/**"
      - ".github/workflows/test-build-swift-package.yml"

jobs:
  # Smoke via dry-run only. A live invocation requires a swift-bridge build
  # script inside the crate that produces SwiftBridgeCore.h plus per-crate
  # .h/.swift outputs under target/<profile>/build/<crate>-*/out/. Faking
  # that is brittle; downstream packages/swift exercises the real path.
  test-dry-run:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Stage minimal package dir
        shell: bash
        run: |
          mkdir -p packages/swift
          : >packages/swift/Package.swift

      - name: Dry-run build-swift-package
        id: build
        uses: ./build-swift-package
        with:
          package-dir: packages/swift
          crate-name: fixture-swift
          dry-run: "true"

      - name: Verify dry-run completed
        shell: bash
        run: |
          [ "${{ steps.build.outputs.package-dir }}" = "packages/swift" ]
