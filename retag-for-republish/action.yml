name: Retag for Republish
description: >
  Delete and recreate a Git tag on HEAD so that registry republish workflows
  pick up the new commit without needing a new version number.

inputs:
  tag:
    description: "The tag to move to HEAD (e.g. v1.2.3)"
    required: true
  token:
    description: >
      Token used to delete/recreate the tag via the GitHub API. The default
      GITHUB_TOKEN cannot write git refs (returns HTTP 403), so pass a GitHub
      App installation token with `contents: write`. Defaults to github.token
      for backward compatibility.
    required: false
    default: ${{ github.token }}

outputs:
  sha:
    description: "The HEAD commit SHA that the tag now points to"
    value: ${{ steps.retag.outputs.sha }}

runs:
  using: composite
  steps:
    - name: Move tag to HEAD
      id: retag
      shell: bash
      env:
        INPUT_TAG: ${{ inputs.tag }}
        GH_TOKEN: ${{ inputs.token }}
      run: >-
        python3 "${{ github.action_path }}/scripts/retag.py"
