name: Setup Chrome
description: >
  Install a Chrome-compatible browser for headless tests. On `ubuntu-*-arm`
  runners installs the official chromium snap (Chrome for Testing has no
  linux-arm64 build at the time of writing) and explicitly connects its
  non-default interfaces so headless launches do not race snap-store
  seeding or interface autoconnect. The install is followed by a blocking
  smoke test that fails fast if chromium cannot render `about:blank`.
  On every other runner delegates to `browser-actions/setup-chrome@v1`
  with the requested channel/version.

inputs:
  chrome-version:
    description: "Chrome channel (`stable`, `beta`, `dev`) or an explicit Chrome-for-Testing version. Ignored on linux-arm64, where the latest stable chromium snap is installed."
    required: false
    default: "stable"

runs:
  using: composite
  steps:
    - name: Detect platform
      id: detect
      shell: bash
      run: |
        os="$(uname -s)"
        arch="$(uname -m)"
        if [ "$os" = "Linux" ] && [ "$arch" = "aarch64" ]; then
          echo "linux_arm64=true" >> "$GITHUB_OUTPUT"
        else
          echo "linux_arm64=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Install chromium snap (linux-arm64)
      if: steps.detect.outputs.linux_arm64 == 'true'
      shell: bash
      run: |
        set -euxo pipefail

        # Chrome for Testing publishes no linux-arm64 build (only linux64/x86_64), so on
        # ubuntu-*-arm runners we fall back to the official chromium snap. The apt
        # chromium package on noble is a stub that re-execs into snap and mangles
        # command-line flags, so we install the snap directly with --classic confinement
        # to get a real binary that respects flags like --disable-hang-monitor.

        # Snapd on GitHub-hosted ubuntu-*-arm runners is frequently not fully seeded when this
        # step first runs, which makes `snap install` fail with "error: cannot perform the
        # following tasks:" (snapd's generic refusal when its task graph is not ready or the
        # snap-store backend has not finished startup). Warm snapd up, wait for it to finish
        # seeding, then retry the install with backoff.
        sudo systemctl start snapd.service snapd.socket || true
        sudo snap wait system seed.loaded || true

        attempts=0
        max_attempts=5
        until sudo snap install chromium --classic; do
          attempts=$((attempts + 1))
          if [ "$attempts" -ge "$max_attempts" ]; then
            echo "::error::snap install chromium failed after ${max_attempts} attempts on linux-arm64"
            exit 1
          fi
          echo "snap install attempt ${attempts} failed; sleeping $((attempts * 5))s before retry"
          sleep $((attempts * 5))
          # Re-warm snapd in case the previous failure left it in a bad state.
          sudo systemctl restart snapd.service || true
          sudo snap wait system seed.loaded || true
        done

        # Explicitly connect non-default snap interfaces. Autoconnect on ubuntu-*-arm
        # runners is racy — without this, headless chromium intermittently aborts with
        # "Content snap command-chain for .../gpu-2404-provider-wrapper not found:
        # ensure slot is connected". These connects are idempotent; allow them to fail
        # individually (interface may not exist on every chromium revision) but verify
        # at least the core ones below.
        sudo snap connect chromium:hardware-observe || true
        sudo snap connect chromium:process-control || true
        sudo snap connect chromium:system-observe || true
        sudo snap connect chromium:mount-observe || true
        sudo snap connect chromium:network-observe || true
        sudo snap connect chromium:opengl || true
        sudo snap connect chromium:audio-playback || true
        sudo snap connect chromium:audio-record || true
        sudo snap connect chromium:camera || true
        sudo snap connect chromium:joystick || true
        sudo snap connect chromium:removable-media || true
        sudo snap connect chromium:cups-control || true
        sudo snap connect chromium:u2f-devices || true
        # gpu-2404 content slot: connect explicitly so the gpu provider wrapper resolves
        # at chromium launch (this is the root cause of the intermittent
        # "Content snap command-chain ... not found" abort on Ubuntu ARM).
        sudo snap connect chromium:gpu-2404 mesa-2404 || true

        # Log connected interfaces for diagnostics on failure.
        sudo snap connections chromium || true

        binary="/snap/chromium/current/usr/bin/chromium"

        # Create symlinks for common binary names
        for alias in chromium google-chrome chrome; do
          sudo ln -sf "$binary" "/usr/local/bin/$alias"
        done

        chromium --version

        # Blocking smoke test: chromium must successfully render about:blank with the
        # same flag combo crawl tests use. We retry with backoff to absorb residual
        # snap initialisation lag on first launch, but a final failure fails the step
        # so a broken runner does not produce confusing downstream test failures.
        smoke_attempts=0
        smoke_max=3
        until timeout 30 chromium \
            --headless=new \
            --disable-gpu \
            --no-sandbox \
            --use-mock-keychain \
            --dump-dom about:blank | grep -qi '<html'; do
          smoke_attempts=$((smoke_attempts + 1))
          if [ "$smoke_attempts" -ge "$smoke_max" ]; then
            echo "::error::chromium smoke test failed after ${smoke_max} attempts on linux-arm64"
            sudo snap connections chromium || true
            exit 1
          fi
          echo "chromium smoke attempt ${smoke_attempts} failed; sleeping $((smoke_attempts * 3))s before retry"
          sleep $((smoke_attempts * 3))
        done

        echo "chromium snap installed and smoke-tested successfully on linux-arm64"

    - name: Setup Chrome (non-arm64)
      if: steps.detect.outputs.linux_arm64 != 'true'
      uses: browser-actions/setup-chrome@v1
      with:
        chrome-version: ${{ inputs.chrome-version }}
