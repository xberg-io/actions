name: Setup Chrome
description: >
  Install a Chrome-compatible browser for headless tests. On `ubuntu-*-arm`
  runners installs `chromium` via apt because Google does not ship
  Chrome for Testing on linux-arm64 (the chrome-for-testing manifest
  only covers `linux64`, `mac-arm64`, `mac-x64`, `win32`, `win64`). On
  every other runner delegates to `browser-actions/setup-chrome@v1`
  with the requested channel/version.

inputs:
  chrome-version:
    description: "Chrome channel (`stable`, `beta`, `dev`) or an explicit Chrome-for-Testing version. Ignored on linux-arm64, where chromium is installed via apt."
    required: false
    default: "stable"

runs:
  using: composite
  steps:
    - name: Detect platform
      id: detect
      shell: bash
      run: |
        os="$(uname -s)"
        arch="$(uname -m)"
        if [ "$os" = "Linux" ] && [ "$arch" = "aarch64" ]; then
          echo "linux_arm64=true" >> "$GITHUB_OUTPUT"
        else
          echo "linux_arm64=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Install chromium via apt (linux-arm64)
      if: steps.detect.outputs.linux_arm64 == 'true'
      shell: bash
      run: |
        set -euxo pipefail
        sudo apt-get update -qq
        # chromium-browser is a transitional snap-stub on noble; the real binary is `chromium`.
        sudo apt-get install -y --no-install-recommends chromium
        chromium --version
        # Provide `google-chrome` and `chrome` aliases since many test harnesses look those up first.
        for alias in google-chrome chrome; do
          sudo ln -sf "$(command -v chromium)" "/usr/local/bin/$alias"
        done

    - name: Setup Chrome (non-arm64)
      if: steps.detect.outputs.linux_arm64 != 'true'
      uses: browser-actions/setup-chrome@v1
      with:
        chrome-version: ${{ inputs.chrome-version }}
