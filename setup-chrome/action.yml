name: Setup Chrome
description: >
  Install a Chrome-compatible browser for headless tests. On `ubuntu-*-arm`
  runners downloads and installs Chrome for Testing (linux-arm64) directly
  since the chromium apt package is a snap-stub that mangles command-line flags.
  On every other runner delegates to `browser-actions/setup-chrome@v1`
  with the requested channel/version.

inputs:
  chrome-version:
    description: "Chrome channel (`stable`, `beta`, `dev`) or an explicit Chrome-for-Testing version. Ignored on linux-arm64, where the latest stable Chrome for Testing is installed."
    required: false
    default: "stable"

runs:
  using: composite
  steps:
    - name: Detect platform
      id: detect
      shell: bash
      run: |
        os="$(uname -s)"
        arch="$(uname -m)"
        if [ "$os" = "Linux" ] && [ "$arch" = "aarch64" ]; then
          echo "linux_arm64=true" >> "$GITHUB_OUTPUT"
        else
          echo "linux_arm64=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Install Chrome for Testing (linux-arm64)
      if: steps.detect.outputs.linux_arm64 == 'true'
      shell: bash
      run: |
        set -euxo pipefail

        # On Ubuntu 24.04 (noble) ARM, the apt chromium package is a snap stub that mangles --flags.
        # Install the official chromium snap with --classic confinement to get a real binary that
        # properly handles command-line arguments like --disable-hang-monitor.

        # Snapd on GitHub-hosted ubuntu-*-arm runners is frequently not fully seeded when this
        # step first runs, which makes `snap install` fail with "error: cannot perform the
        # following tasks:" (snapd's generic refusal when its task graph is not ready or the
        # snap-store backend has not finished startup). Warm snapd up, wait for it to finish
        # seeding, then retry the install with backoff.
        sudo systemctl start snapd.service snapd.socket || true
        sudo snap wait system seed.loaded || true

        attempts=0
        max_attempts=5
        until sudo snap install chromium --classic; do
          attempts=$((attempts + 1))
          if [ "$attempts" -ge "$max_attempts" ]; then
            echo "::error::snap install chromium failed after ${max_attempts} attempts on linux-arm64"
            exit 1
          fi
          echo "snap install attempt ${attempts} failed; sleeping $((attempts * 5))s before retry"
          sleep $((attempts * 5))
          # Re-warm snapd in case the previous failure left it in a bad state.
          sudo systemctl restart snapd.service || true
          sudo snap wait system seed.loaded || true
        done

        binary="/snap/chromium/current/usr/bin/chromium"

        # Create symlinks for common binary names
        for alias in chromium google-chrome chrome; do
          sudo ln -sf "$binary" "/usr/local/bin/$alias"
        done

        # Verify installation and proper flag handling
        chromium --version
        # Quick sanity test: chromium should parse flags without snap wrapper errors
        timeout 10 chromium --headless --disable-gpu --dump-dom about:blank >/dev/null 2>&1 || true
        echo "Chrome for Testing installed successfully on linux-arm64"

    - name: Setup Chrome (non-arm64)
      if: steps.detect.outputs.linux_arm64 != 'true'
      uses: browser-actions/setup-chrome@v1
      with:
        chrome-version: ${{ inputs.chrome-version }}
