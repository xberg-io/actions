name: Build Swift Artifact Bundle
description: >
  Build a Swift Package Manager SE-0305 artifact bundle containing static
  Rust libraries for macOS (arm64, x86_64), iOS (device arm64, simulator
  arm64+x86_64), and Linux (arm64, x86_64). Produces a zip suitable for
  SPM .binaryTarget distribution.

  Assumes the calling workflow has already checked out the repo and set up
  Rust (e.g. via `kreuzberg-dev/actions/setup-rust@v1`). Must run on
  macos-latest. Linux targets are cross-compiled using the `cross` CLI.

inputs:
  crate-name:
    description: "Cargo package name"
    required: false
    default: "kreuzberg-swift"
  lib-name:
    description: "Library base name (default = crate-name with '-' replaced by '_')"
    required: false
    default: ""
  artifact-name:
    description: "Artifact bundle name without extension (default = PascalCase of lib-name)"
    required: false
    default: ""
  header-path:
    description: "Optional path to C headers directory to embed in bundle"
    required: false
    default: ""
  output-dir:
    description: "Output directory for the artifact bundle"
    required: false
    default: "dist/swift-artifactbundle"
  build-profile:
    description: "Cargo build profile (release, dev, or a custom named profile)"
    required: false
    default: "release"
  include-macos-x86_64:
    description: >
      Build for x86_64-apple-darwin (Intel Mac). Apple has been deprecating
      Intel Macs since 2020 and some Rust dependencies (notably pyke ort
      2.0.0-rc.12+) no longer ship prebuilt binaries for this triple. Set
      to "false" to skip the target and omit it from the bundle.
    required: false
    default: "true"
  include-ios-x86_64:
    description: >
      Build for x86_64-apple-ios (deprecated Intel iOS simulator). The
      Apple-Silicon simulator covers modern dev hosts; Intel simulator
      support requires both pyke ORT prebuilts and an Intel Mac host.
      Set to "false" to skip the target. When skipped, the iOS-sim
      variant in the bundle uses the aarch64-apple-ios-sim library
      directly (no lipo fat-binary step).
    required: false
    default: "true"
  dry-run:
    description: "Print the planned commands and exit without building"
    required: false
    default: "false"
  package-manifest-path:
    description: "Optional path to Package.swift to update with checksum"
    required: false
    default: ""
  package-version:
    description: >
      Release version (without leading 'v') used to substitute the
      `v__ALEF_SWIFT_VERSION__` placeholder in Package.swift. Required when
      `package-manifest-path` is provided and the manifest's
      `.binaryTarget` URL contains `v__ALEF_SWIFT_VERSION__`. Pass the bare
      version such as `0.3.0-rc.52`; the action prepends `v` to match the
      typical GitHub release tag pattern.
    required: false
    default: ""
  binary-target-name:
    description: "Swift Package Manager binary target name (e.g., 'RustBridge'); defaults to artifact-name if not specified"
    required: false
    default: ""

outputs:
  bundle-path:
    description: "Absolute path to the .artifactbundle directory"
    value: ${{ steps.build.outputs.bundle-path }}
  bundle-zip:
    description: "Absolute path to the zipped .artifactbundle.zip"
    value: ${{ steps.build.outputs.bundle-zip }}
  checksum:
    description: "SHA256 checksum of the artifact bundle zip"
    value: ${{ steps.build.outputs.checksum }}
  checksum-file:
    description: "Path to checksum artifact file (used by upload-artifact step)"
    value: ${{ steps.upload-checksum.outputs.checksum-file }}
  package-manifest-updated:
    description: "Path to the updated Package.swift (if package-manifest-path was provided)"
    value: ${{ steps.substitute-manifest.outputs.package-manifest-path }}

runs:
  using: composite
  steps:
    - name: Build artifact bundle
      id: build
      shell: bash
      env:
        INPUT_CRATE_NAME: ${{ inputs.crate-name }}
        INPUT_LIB_NAME: ${{ inputs.lib-name }}
        INPUT_ARTIFACT_NAME: ${{ inputs.artifact-name }}
        INPUT_BINARY_TARGET_NAME: ${{ inputs.binary-target-name }}
        INPUT_HEADER_PATH: ${{ inputs.header-path }}
        INPUT_OUTPUT_DIR: ${{ inputs.output-dir }}
        INPUT_BUILD_PROFILE: ${{ inputs.build-profile }}
        INPUT_INCLUDE_MACOS_X86_64: ${{ inputs.include-macos-x86_64 }}
        INPUT_INCLUDE_IOS_X86_64: ${{ inputs.include-ios-x86_64 }}
        INPUT_DRY_RUN: ${{ inputs.dry-run }}
        INPUT_PACKAGE_MANIFEST_PATH: ${{ inputs.package-manifest-path }}
      run: |
        bash "${{ github.action_path }}/scripts/build.sh"

    - name: Substitute Package.swift placeholders
      id: substitute-manifest
      if: inputs.package-manifest-path != ''
      shell: bash
      env:
        CHECKSUM: ${{ steps.build.outputs.checksum }}
        PACKAGE_MANIFEST_PATH: ${{ inputs.package-manifest-path }}
        PACKAGE_VERSION: ${{ inputs.package-version }}
      run: |
        if [[ ! -f "$PACKAGE_MANIFEST_PATH" ]]; then
          echo "Error: Package.swift not found at $PACKAGE_MANIFEST_PATH"
          exit 1
        fi
        # BSD sed (macOS) requires a backup-extension argument with -i; GNU sed
        # accepts an empty extension. Using `-i.bak` + `rm -f *.bak` keeps both
        # platforms happy.
        sed -i.bak "s/__ALEF_SWIFT_CHECKSUM__/$CHECKSUM/g" "$PACKAGE_MANIFEST_PATH"
        if [[ -n "$PACKAGE_VERSION" ]]; then
          # Substitute the release-version placeholder used by the canonical
          # alef Package.swift seed (`…/releases/download/v__ALEF_SWIFT_VERSION__/…`).
          # Without this, downstream `swift build` resolves to a 404 URL.
          sed -i.bak "s|v__ALEF_SWIFT_VERSION__|v${PACKAGE_VERSION}|g" "$PACKAGE_MANIFEST_PATH"
        fi
        rm -f "${PACKAGE_MANIFEST_PATH}.bak"
        echo "package-manifest-path=$PACKAGE_MANIFEST_PATH" >> "$GITHUB_OUTPUT"
        echo "Updated $PACKAGE_MANIFEST_PATH with checksum: $CHECKSUM${PACKAGE_VERSION:+ and version: $PACKAGE_VERSION}"

    - name: Save checksum as artifact
      id: upload-checksum
      shell: bash
      env:
        OUTPUT_DIR: ${{ inputs.output-dir }}
        ARTIFACT_NAME: ${{ steps.build.outputs.bundle-path }}
        CHECKSUM: ${{ steps.build.outputs.checksum }}
      run: |
        # Extract the artifact name from the bundle-path (e.g., /path/to/FooBar.artifactbundle → FooBar)
        artifact_name=$(basename "$ARTIFACT_NAME" .artifactbundle)

        # Create a checksums directory
        mkdir -p "$OUTPUT_DIR/swift-checksums"
        checksum_file="$OUTPUT_DIR/swift-checksums/${artifact_name}.artifactbundle.zip.checksum"

        # Write the checksum to the file
        echo "$CHECKSUM" > "$checksum_file"

        echo "checksum-file=$checksum_file" >> "$GITHUB_OUTPUT"
        echo "Saved checksum to: $checksum_file"
