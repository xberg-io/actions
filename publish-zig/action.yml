name: Publish Zig Package
description: >
  "Publish" a Zig package via Git tag.

  Zig has no central package registry; packages are consumed via
  `zig fetch --save <tarball-url>` against a Git tag tarball. This action:
    1. Validates `build.zig.zon` syntax via `zig build --fetch` (no-op
       fetch).
    2. Verifies the Git tag is present on `origin`.
    3. Computes the GitHub release tarball SHA-256 that downstream
       consumers will need for their `build.zig.zon` `hash` field.
    4. Optionally posts a summary comment on the release with the
       resolved tarball URL + hash so consumers can copy-paste.

inputs:
  working-directory:
    description: "Directory containing build.zig.zon"
    required: false
    default: "."
  package-name:
    description: "Package name for the tarball. Defaults to .name from build.zig.zon."
    required: false
    default: ""
  tag:
    description: "Git tag to validate (defaults to GITHUB_REF_NAME on a tag push)"
    required: false
    default: ""
  zig-version:
    description: "Zig version (passed to mlugg/setup-zig)"
    required: false
    default: "0.16.0"
  setup-zig:
    description: "Install Zig via mlugg/setup-zig. Set to 'false' if Zig is already installed."
    required: false
    default: "true"
  update-release-notes:
    description: "Append the resolved tarball URL + Zig hash to the GitHub release notes"
    required: false
    default: "false"
  update-existing:
    description: "Pass --clobber to gh release upload (overwrite existing asset)"
    required: false
    default: "false"
  dry-run:
    description: "Skip release asset upload and notes update; only validate"
    required: false
    default: "false"
  token:
    description: "GitHub token for `gh release upload` and release-notes updates. Defaults to the job's GITHUB_TOKEN."
    required: false
    default: ${{ github.token }}
  use-alef-package:
    description: "Use alef publish package_zig to bundle FFI artifacts. Set to 'true' to enable, provide ffi-library-path and ffi-header-path."
    required: false
    default: "false"
  target:
    description: "Rust target triple (e.g., aarch64-apple-darwin). Required when use-alef-package is 'true'."
    required: false
    default: ""
  ffi-library-path:
    description: "Absolute path to the built FFI static library (libts_pack_core_ffi.a). Required when use-alef-package is 'true'."
    required: false
    default: ""
  ffi-header-path:
    description: "Absolute path to the FFI header file (ts_pack.h). Required when use-alef-package is 'true'."
    required: false
    default: ""
  alef-version:
    description: "Alef version to install for package_zig. Defaults to stable."
    required: false
    default: ""
  multi-platform-ffi-dir:
    description: >
      Path to a directory containing prebuilt FFI artifacts laid out per Rust target
      RID, e.g. `ffi-artifacts/linux-x64/libfoo_ffi.so`, `ffi-artifacts/osx-arm64/libfoo_ffi.dylib`,
      `ffi-artifacts/win-x64/foo_ffi.dll`, plus a shared `include/` subdir for the C header.
      When set, the action bundles these libraries into `<working-directory>/lib/<zig-rid>/`,
      copies the header into `<working-directory>/include/`, patches `build.zig.zon` `.paths`
      to include `lib` and `include`, and overwrites `build.zig` with a target-aware build
      script that picks the right `lib/<rid>/` subdir at compile time. The resulting tarball
      is consumable as a single multi-platform Zig package via `zig fetch --save`.
      Mutually exclusive with `use-alef-package: 'true'`.
    required: false
    default: ""
  module-name:
    description: >
      Zig module name to export from the bundled build.zig (e.g., `liter_llm`). Required
      when `multi-platform-ffi-dir` is set. Must match the `.name` enum literal in
      `build.zig.zon` and the consumer's `b.dependency(...).module("<module-name>")` call.
    required: false
    default: ""
  ffi-lib-name:
    description: >
      FFI shared library name without `lib` prefix or extension (e.g., `liter_llm_ffi`).
      Required when `multi-platform-ffi-dir` is set. Used both for `linkSystemLibrary`
      in the rewritten build.zig and to locate the file inside `multi-platform-ffi-dir`.
    required: false
    default: ""

outputs:
  tarball-url:
    description: "Resolved release-asset tarball URL for downstream `zig fetch --save`"
    value: ${{ steps.resolve.outputs.tarball-url }}
  zig-hash:
    description: "Zig content multihash (from `zig fetch`) for build.zig.zon .hash field"
    value: ${{ steps.resolve.outputs.zig-hash }}
  tarball-sha256:
    description: "SHA-256 of the tarball (secondary reference)"
    value: ${{ steps.resolve.outputs.tarball-sha256 }}
  package-name:
    description: "Resolved package name used for the tarball"
    value: ${{ steps.resolve.outputs.package-name }}

runs:
  using: composite
  steps:
    - name: Set up Zig
      if: inputs.setup-zig == 'true'
      uses: mlugg/setup-zig@v2.2.1
      with:
        version: ${{ inputs.zig-version }}

    - name: Resolve tag
      id: tag
      shell: bash
      env:
        INPUT_TAG: ${{ inputs.tag }}
      run: |
        if [[ -n "$INPUT_TAG" ]]; then
          tag="$INPUT_TAG"
        elif [[ "$GITHUB_REF" =~ ^refs/tags/ ]]; then
          tag="$GITHUB_REF_NAME"
        else
          echo "Error: no tag input and not running on a tag ref" >&2
          exit 1
        fi
        echo "tag=$tag" >> "$GITHUB_OUTPUT"
        echo "Using tag: $tag"

    - name: Validate build.zig.zon
      shell: bash
      env:
        WORKING_DIR: ${{ inputs.working-directory }}
      run: |
        cd "$WORKING_DIR"
        test -f build.zig.zon || { echo "build.zig.zon not found in $WORKING_DIR" >&2; exit 1; }
        # `zig build --fetch` resolves dependencies without compiling; it's
        # the canonical syntax check for a .zon manifest.
        if command -v zig >/dev/null 2>&1; then
          zig build --fetch || { echo "build.zig.zon failed to validate" >&2; exit 1; }
          echo "build.zig.zon validates"
        else
          echo "Zig CLI not present; skipping --fetch validation"
        fi

    - name: Resolve package name
      id: pkg
      shell: bash
      env:
        INPUT_PKG: ${{ inputs.package-name }}
        WORKING_DIR: ${{ inputs.working-directory }}
      run: |
        if [[ -n "$INPUT_PKG" ]]; then
          pkg="$INPUT_PKG"
        else
          # Parse .name from build.zig.zon. Zig 0.14+ accepts enum-literal
          # names (`.name = .foo`) alongside the legacy quoted form
          # (`.name = "foo"`). Try the quoted form first; fall back to the
          # enum-literal form so both layouts resolve.
          pkg=$(awk '/^\s*\.name\s*=\s*"/ {match($0, /"([^"]+)"/, arr); print arr[1]; exit}' "$WORKING_DIR/build.zig.zon")
          if [[ -z "$pkg" ]]; then
            pkg=$(awk '/^\s*\.name\s*=\s*\./ {match($0, /\.name\s*=\s*\.([A-Za-z_][A-Za-z0-9_]*)/, arr); print arr[1]; exit}' "$WORKING_DIR/build.zig.zon")
          fi
          [[ -n "$pkg" ]] || { echo "Error: unable to parse .name from build.zig.zon" >&2; exit 1; }
        fi
        echo "package-name=$pkg" >> "$GITHUB_OUTPUT"
        echo "Resolved package name: $pkg"

    - name: Verify tag is fetchable
      if: inputs.dry-run != 'true'
      shell: bash
      env:
        TAG: ${{ steps.tag.outputs.tag }}
      run: |
        if git ls-remote --tags origin "$TAG" | grep -q "refs/tags/$TAG"; then
          echo "Tag $TAG present on remote"
        else
          echo "Error: tag $TAG not found on remote" >&2
          exit 1
        fi

    - name: Install alef (when using alef package_zig)
      if: inputs.use-alef-package == 'true'
      uses: xberg-io/actions/install-alef@v1
      with:
        version: ${{ inputs.alef-version }}

    - name: Package Zig with alef
      if: inputs.use-alef-package == 'true'
      id: package-alef
      shell: bash
      env:
        TARGET: ${{ inputs.target }}
        FFI_LIB_PATH: ${{ inputs.ffi-library-path }}
        FFI_HEADER_PATH: ${{ inputs.ffi-header-path }}
        TAG: ${{ steps.tag.outputs.tag }}
      run: |
        set -euo pipefail

        # Validate required inputs
        if [[ -z "$TARGET" ]]; then
          echo "Error: target input is required when use-alef-package is 'true'" >&2
          exit 1
        fi
        if [[ -z "$FFI_LIB_PATH" || ! -f "$FFI_LIB_PATH" ]]; then
          echo "Error: ffi-library-path must be an existing file" >&2
          exit 1
        fi
        if [[ -z "$FFI_HEADER_PATH" || ! -f "$FFI_HEADER_PATH" ]]; then
          echo "Error: ffi-header-path must be an existing file" >&2
          exit 1
        fi

        # Extract version from tag (strip 'v' prefix if present)
        version="${TAG#v}"

        # Stage FFI artifact at workspace target/<target>/release/ where alef expects it
        target_dir="target/$TARGET/release"
        mkdir -p "$target_dir"

        # Copy FFI library and header to staging location
        ffi_lib_name=$(basename "$FFI_LIB_PATH")
        cp "$FFI_LIB_PATH" "$target_dir/$ffi_lib_name"
        cp "$FFI_HEADER_PATH" "$target_dir/$(basename "$FFI_HEADER_PATH")"

        # Run alef publish package_zig to assemble the distribution tarball
        output_dir="$RUNNER_TEMP/zig-package"
        mkdir -p "$output_dir"

        echo "Running: alef publish package --lang zig --target $TARGET -o $output_dir"
        alef publish package --lang zig --target "$TARGET" -o "$output_dir"

        # Find the generated tarball (should be {name}-v{version}.tar.gz)
        tarball_path=$(find "$output_dir" -maxdepth 1 -name "*.tar.gz" -type f | head -1)
        if [[ -z "$tarball_path" ]]; then
          echo "Error: alef publish package did not generate a tarball" >&2
          exit 1
        fi

        tarball_name=$(basename "$tarball_path")
        echo "Tarball created: $tarball_path ($(stat -f%z "$tarball_path" 2>/dev/null || stat -c%s "$tarball_path") bytes)"
        echo "tarball-path=$tarball_path" >> "$GITHUB_OUTPUT"
        echo "tarball-name=$tarball_name" >> "$GITHUB_OUTPUT"

    - name: Package Zig (multi-platform method)
      if: inputs.use-alef-package != 'true' && inputs.multi-platform-ffi-dir != ''
      id: package-multi
      shell: bash
      env:
        WORKING_DIR: ${{ inputs.working-directory }}
        PKG_NAME: ${{ steps.pkg.outputs.package-name }}
        TAG: ${{ steps.tag.outputs.tag }}
        FFI_DIR: ${{ inputs.multi-platform-ffi-dir }}
        MODULE_NAME: ${{ inputs.module-name }}
        FFI_LIB_NAME: ${{ inputs.ffi-lib-name }}
      run: |
        set -euo pipefail

        # Validate required inputs
        if [[ -z "$MODULE_NAME" ]]; then
          echo "Error: module-name input is required when multi-platform-ffi-dir is set" >&2
          exit 1
        fi
        if [[ -z "$FFI_LIB_NAME" ]]; then
          echo "Error: ffi-lib-name input is required when multi-platform-ffi-dir is set" >&2
          exit 1
        fi
        if [[ ! -d "$FFI_DIR" ]]; then
          echo "Error: multi-platform-ffi-dir does not exist: $FFI_DIR" >&2
          exit 1
        fi

        # Map Rust RID (build-ffi artifact layout) → Zig target subdir used by the
        # rewritten build.zig at compile time. The downloaded build-ffi artifacts
        # live under {linux-x64,linux-arm64,osx-arm64,osx-x64,win-x64}/{lib}; the
        # bundled package re-keys them under canonical Rust target triples that
        # Zig's compile-time target switch maps to (see the rewritten build.zig
        # below).
        declare -A rid_to_libdir=(
          ["linux-x64"]="x86_64-linux-gnu"
          ["linux-arm64"]="aarch64-linux-gnu"
          ["osx-arm64"]="aarch64-darwin"
          ["osx-x64"]="x86_64-darwin"
          ["win-x64"]="x86_64-windows-msvc"
        )

        mkdir -p "$WORKING_DIR/lib" "$WORKING_DIR/include"

        bundled_any=0
        for rid in "${!rid_to_libdir[@]}"; do
          libdir="${rid_to_libdir[$rid]}"
          src_dir="$FFI_DIR/$rid"
          if [[ -d "$src_dir" ]]; then
            dst_dir="$WORKING_DIR/lib/$libdir"
            mkdir -p "$dst_dir"
            # Copy shared/static libraries only — headers go in include/ shared.
            find "$src_dir" -maxdepth 1 -type f \
              \( -name '*.so' -o -name '*.dylib' -o -name '*.dll' -o -name '*.a' \) \
              -exec cp {} "$dst_dir/" \;
            if compgen -G "$dst_dir/*" > /dev/null; then
              bundled_any=1
              echo "Bundled $rid -> lib/$libdir:"
              ls -lh "$dst_dir/" || true
            fi
          fi
        done

        if [[ $bundled_any -eq 0 ]]; then
          echo "Error: no platform libraries found under $FFI_DIR (expected per-RID subdirs)" >&2
          exit 1
        fi

        # Copy the C header(s) shared across platforms into include/.
        if [[ -d "$FFI_DIR/include" ]]; then
          find "$FFI_DIR/include" -maxdepth 1 -type f -name '*.h' -exec cp {} "$WORKING_DIR/include/" \;
          echo "Bundled headers:"
          ls -lh "$WORKING_DIR/include/" || true
        fi

        # Patch build.zig.zon .paths to expose lib/ and include/ to consumers.
        # Zig's .paths is an allowlist: only listed entries are materialized for
        # `zig fetch` consumers, so the bundled libs are invisible without this.
        # Insert "lib" and "include" immediately after the `.paths = .{` opener.
        zon="$WORKING_DIR/build.zig.zon"
        if [[ ! -f "$zon" ]]; then
          echo "Error: $zon not found" >&2
          exit 1
        fi
        if ! grep -q '"lib"' "$zon"; then
          if ! grep -q '\.paths *= *\.{' "$zon"; then
            echo "Error: .paths block not found in $zon — cannot patch" >&2
            exit 1
          fi
          # Use awk to insert two lines after the matching .paths line. Awk
          # preserves the rest of the file byte-for-byte and avoids the
          # heredoc-in-YAML indent trap.
          tmp="$(mktemp)"
          awk '{
            print $0
            if (!done && match($0, /\.paths[[:space:]]*=[[:space:]]*\.\{/)) {
              print "        \"lib\","
              print "        \"include\","
              done = 1
            }
          }' "$zon" > "$tmp"
          mv "$tmp" "$zon"
          echo "Patched build.zig.zon .paths to include lib + include"
        fi

        # Overwrite build.zig with a target-aware version that picks the bundled
        # lib/<rid>/ subdir at compile time. The in-tree build.zig points at the
        # workspace target/ dir for local dev; the distributable form bundled here
        # must resolve package-relative paths so it works under the global Zig
        # cache after `zig fetch`. The template is emitted line-by-line with
        # `printf` because heredoc bodies inside a YAML `run: |` block must be
        # indented at least as much as the scalar — and if we indent the body,
        # Zig sees the leading whitespace as part of the source.
        zig_path="$WORKING_DIR/build.zig"
        {
          printf '%s\n' 'const std = @import("std");'
          printf '\n'
          printf '%s\n' '// alef-managed: this build.zig is overwritten at publish time by'
          printf '%s\n' '// xberg-io/actions/publish-zig to point at the bundled'
          printf '%s\n' '// lib/<rid>/ subdirectory selected from Zig'"'"'s compile-time target.'
          printf '%s\n' 'pub fn build(b: *std.Build) void {'
          printf '%s\n' '    const target = b.standardTargetOptions(.{});'
          printf '%s\n' '    const optimize = b.standardOptimizeOption(.{});'
          printf '\n'
          printf '%s\n' '    const rid = ridDir(target);'
          printf '%s\n' '    const lib_subdir = b.fmt("lib/{s}", .{rid});'
          printf '\n'
          printf '    const module = b.addModule("%s", .{\n' "$MODULE_NAME"
          printf '        .root_source_file = b.path("src/%s.zig"),\n' "$MODULE_NAME"
          printf '%s\n' '        .target = target,'
          printf '%s\n' '        .optimize = optimize,'
          printf '%s\n' '        .link_libc = true,'
          printf '%s\n' '    });'
          printf '%s\n' '    module.addLibraryPath(b.path(lib_subdir));'
          printf '%s\n' '    module.addIncludePath(b.path("include"));'
          printf '    module.linkSystemLibrary("%s", .{});\n' "$FFI_LIB_NAME"
          printf '%s\n' '}'
          printf '\n'
          printf '%s\n' 'fn ridDir(target: std.Build.ResolvedTarget) []const u8 {'
          printf '%s\n' '    return switch (target.result.os.tag) {'
          printf '%s\n' '        .linux => switch (target.result.cpu.arch) {'
          printf '%s\n' '            .x86_64 => "x86_64-linux-gnu",'
          printf '%s\n' '            .aarch64 => "aarch64-linux-gnu",'
          printf '%s\n' '            else => @panic("unsupported linux arch for this package"),'
          printf '%s\n' '        },'
          printf '%s\n' '        .macos => switch (target.result.cpu.arch) {'
          printf '%s\n' '            .aarch64 => "aarch64-darwin",'
          printf '%s\n' '            .x86_64 => "x86_64-darwin",'
          printf '%s\n' '            else => @panic("unsupported macos arch for this package"),'
          printf '%s\n' '        },'
          printf '%s\n' '        .windows => switch (target.result.cpu.arch) {'
          printf '%s\n' '            .x86_64 => "x86_64-windows-msvc",'
          printf '%s\n' '            else => @panic("unsupported windows arch for this package"),'
          printf '%s\n' '        },'
          printf '%s\n' '        else => @panic("unsupported os for this package"),'
          printf '%s\n' '    };'
          printf '%s\n' '}'
        } > "$zig_path"
        echo "Rewrote $zig_path for multi-platform distribution"

        # Extract version from tag and tarball it up. Reuse the same deterministic
        # settings as the fallback path so identical inputs produce identical
        # tarballs.
        version="${TAG#v}"
        tarball_name="${PKG_NAME}-v${version}.tar.gz"
        tarball_path="$RUNNER_TEMP/$tarball_name"

        echo "Packaging $PKG_NAME as $tarball_name (multi-platform)..."
        cd "$WORKING_DIR"
        find . -type f \
          ! -path './.zig-cache/*' \
          ! -path './zig-out/*' \
          ! -path './.git/*' \
          | sort | tar -czn -T - -f "$tarball_path"

        echo "Tarball created: $tarball_path ($(stat -f%z "$tarball_path" 2>/dev/null || stat -c%s "$tarball_path") bytes)"
        echo "tarball-path=$tarball_path" >> "$GITHUB_OUTPUT"
        echo "tarball-name=$tarball_name" >> "$GITHUB_OUTPUT"

    - name: Package Zig (fallback tar method)
      if: inputs.use-alef-package != 'true' && inputs.multi-platform-ffi-dir == ''
      id: package
      shell: bash
      env:
        WORKING_DIR: ${{ inputs.working-directory }}
        PKG_NAME: ${{ steps.pkg.outputs.package-name }}
        TAG: ${{ steps.tag.outputs.tag }}
      run: |
        # Extract version from tag (strip 'v' prefix if present)
        version="${TAG#v}"
        tarball_name="${PKG_NAME}-v${version}.tar.gz"
        tarball_path="$RUNNER_TEMP/$tarball_name"

        echo "Packaging $PKG_NAME as $tarball_name..."

        # Create a deterministic tarball: gzip -n for reproducibility,
        # sorted file list, exclude build artifacts and .git
        cd "$WORKING_DIR"
        find . -type f \
          ! -path './.zig-cache/*' \
          ! -path './zig-out/*' \
          ! -path './.git/*' \
          | sort | tar -czn -T - -f "$tarball_path"

        echo "Tarball created: $tarball_path ($(stat -f%z "$tarball_path" 2>/dev/null || stat -c%s "$tarball_path") bytes)"
        echo "tarball-path=$tarball_path" >> "$GITHUB_OUTPUT"
        echo "tarball-name=$tarball_name" >> "$GITHUB_OUTPUT"

    - name: Resolve release id (draft-aware)
      id: release
      if: inputs.dry-run != 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        TAG: ${{ steps.tag.outputs.tag }}
      run: |
        set -euo pipefail
        # Resolve the GitHub Release that matches $TAG via the paginated
        # /releases endpoint — that listing surfaces drafts when the calling
        # token has `contents:write`, whereas `gh release view <tag>` and
        # `/repos/.../releases/tags/<tag>` only resolve *published* tags and
        # 404 on drafts regardless of token scope. The publish workflows in
        # xberg-io/* keep the release in draft until the terminal
        # `release-finalize` step, so every prior consumer (this action,
        # publish-hex, publish-homebrew-source-formulas, …) must address
        # the release by id, not by tag.
        max_attempts=20
        sleep_seconds=10
        release_id=""
        for attempt in $(seq 1 $max_attempts); do
          release_id=$(gh api --paginate \
            "repos/$GITHUB_REPOSITORY/releases?per_page=100" \
            --jq ".[] | select(.tag_name == \"$TAG\") | .id" \
            | head -1 || true)
          if [[ -n "$release_id" ]]; then
            break
          fi
          # Fallback for tokens without draft visibility: published-tags endpoint.
          release_id=$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/$TAG" \
            --jq '.id // empty' 2>/dev/null || true)
          if [[ -n "$release_id" ]]; then
            break
          fi
          if [[ $attempt -lt $max_attempts ]]; then
            echo "release lookup attempt $attempt/$max_attempts: tag $TAG not found yet, retrying in ${sleep_seconds}s..." >&2
            sleep $sleep_seconds
          fi
        done
        if [[ -z "$release_id" ]]; then
          echo "Error: release for tag $TAG not found after $max_attempts attempts" >&2
          echo "(requires contents:write to see drafts; pass an App token via inputs.token)" >&2
          exit 1
        fi
        echo "Resolved release id: $release_id (tag=$TAG)"
        echo "release-id=$release_id" >> "$GITHUB_OUTPUT"

    - name: Upload release asset
      if: inputs.dry-run != 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        RELEASE_ID: ${{ steps.release.outputs.release-id }}
        TARBALL_PATH_ALEF: ${{ steps.package-alef.outputs.tarball-path }}
        TARBALL_PATH_MULTI: ${{ steps.package-multi.outputs.tarball-path }}
        TARBALL_PATH_FALLBACK: ${{ steps.package.outputs.tarball-path }}
        TARBALL_NAME_ALEF: ${{ steps.package-alef.outputs.tarball-name }}
        TARBALL_NAME_MULTI: ${{ steps.package-multi.outputs.tarball-name }}
        TARBALL_NAME_FALLBACK: ${{ steps.package.outputs.tarball-name }}
        UPDATE_EXISTING: ${{ inputs.update-existing }}
        USE_ALEF: ${{ inputs.use-alef-package }}
        MULTI_FFI_DIR: ${{ inputs.multi-platform-ffi-dir }}
      run: |
        set -euo pipefail
        # Select tarball path based on which packaging method was used
        if [[ "$USE_ALEF" == "true" ]]; then
          tarball_path="$TARBALL_PATH_ALEF"
          tarball_name="$TARBALL_NAME_ALEF"
        elif [[ -n "$MULTI_FFI_DIR" ]]; then
          tarball_path="$TARBALL_PATH_MULTI"
          tarball_name="$TARBALL_NAME_MULTI"
        else
          tarball_path="$TARBALL_PATH_FALLBACK"
          tarball_name="$TARBALL_NAME_FALLBACK"
        fi

        # Clobber: delete any existing asset with the same name before uploading.
        # The previous `gh release upload --clobber` flag won't help here because
        # we upload via the raw /releases/{id}/assets endpoint, which 422s with
        # "already_exists" on name collisions. Without this, `gh run rerun
        # --failed` aborts when a prior attempt already uploaded the asset.
        existing_id=$(gh api --paginate \
          "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID/assets?per_page=100" \
          --jq ".[] | select(.name == \"$tarball_name\") | .id" \
          | head -1 || true)
        if [[ -n "$existing_id" ]]; then
          echo "Deleting existing asset id=$existing_id ($tarball_name) to allow re-upload"
          gh api -X DELETE "repos/$GITHUB_REPOSITORY/releases/assets/$existing_id"
        fi

        echo "Uploading release asset: $tarball_name (release_id=$RELEASE_ID)"
        # Upload via the raw /uploads endpoint — works for drafts (where
        # `gh release upload <tag>` 404s because it resolves tag→id via the
        # published-tags endpoint). `--retry 3 --retry-delay 2` handles
        # transient 5xx from the uploads CDN; --fail-with-body surfaces the
        # actual error body on non-2xx instead of silently swallowing it.
        # `-f`/`--fail` is mutually exclusive with `--fail-with-body` on
        # curl 7.76+; passing both makes curl reject the invocation with
        # "option --fail-with-body: is badly used here". Use `-sS` (silent +
        # show-errors) instead of `-fsS` — `--fail-with-body` already supplies
        # the non-2xx failure semantics.
        curl -sSL --fail-with-body --retry 3 --retry-delay 2 \
          -X POST \
          -H "Authorization: Bearer $GH_TOKEN" \
          -H "Accept: application/vnd.github+json" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          -H "Content-Type: application/gzip" \
          --data-binary "@$tarball_path" \
          "https://uploads.github.com/repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID/assets?name=$tarball_name" \
          > /dev/null
        echo "Asset uploaded successfully"

    - name: Resolve Zig hash + URLs
      id: resolve
      shell: bash
      env:
        TAG: ${{ steps.tag.outputs.tag }}
        PKG_NAME: ${{ steps.pkg.outputs.package-name }}
        TARBALL_PATH_ALEF: ${{ steps.package-alef.outputs.tarball-path }}
        TARBALL_PATH_MULTI: ${{ steps.package-multi.outputs.tarball-path }}
        TARBALL_PATH_FALLBACK: ${{ steps.package.outputs.tarball-path }}
        TARBALL_NAME_ALEF: ${{ steps.package-alef.outputs.tarball-name }}
        TARBALL_NAME_MULTI: ${{ steps.package-multi.outputs.tarball-name }}
        TARBALL_NAME_FALLBACK: ${{ steps.package.outputs.tarball-name }}
        DRY_RUN: ${{ inputs.dry-run }}
        USE_ALEF: ${{ inputs.use-alef-package }}
        MULTI_FFI_DIR: ${{ inputs.multi-platform-ffi-dir }}
      run: |
        set -euo pipefail
        # Extract version from tag
        version="${TAG#v}"

        # Select tarball name + path based on which packaging method was used
        if [[ "$USE_ALEF" == "true" ]]; then
          tarball_name="$TARBALL_NAME_ALEF"
          tarball_path="$TARBALL_PATH_ALEF"
        elif [[ -n "$MULTI_FFI_DIR" ]]; then
          tarball_name="$TARBALL_NAME_MULTI"
          tarball_path="$TARBALL_PATH_MULTI"
        else
          tarball_name="$TARBALL_NAME_FALLBACK"
          tarball_path="$TARBALL_PATH_FALLBACK"
        fi

        # Construct the release-asset tarball URL — what downstream consumers
        # paste into their build.zig.zon `.url`. This is *not* fetched here:
        # for draft releases the URL 404s, and the zig content multihash is
        # content-addressed (deterministic from tarball bytes), so the same
        # hash is produced whether `zig fetch` reads from a local path or
        # from the eventual public download URL.
        asset_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/download/${TAG}/${tarball_name}"
        echo "Tarball URL (for consumer build.zig.zon): $asset_url"

        if [[ "$DRY_RUN" == "true" ]]; then
          # In dry-run, skip actual zig fetch (asset doesn't exist yet)
          hash="(dry-run: zig hash not computed)"
          sha256="(dry-run: tarball SHA not computed)"
        else
          if [[ -z "$tarball_path" || ! -f "$tarball_path" ]]; then
            echo "Error: local tarball not found at '$tarball_path'" >&2
            exit 1
          fi

          # Compute Zig content multihash from the LOCAL tarball. Earlier
          # versions of this action fetched the public release-asset URL,
          # but draft releases have no publicly resolvable CDN URL (the
          # GitHub workflow holds the release in draft until
          # `release-finalize`), so the URL-based fetch 404'd indefinitely.
          # The hash is content-addressed: identical bytes produce an
          # identical hash whether reached by URL or by file path, so
          # computing locally is both correct and immune to CDN propagation.
          #
          # `zig fetch` walks up the directory tree looking for a build.zig
          # and exits with an error if none is found, so the scratch dir
          # must be bootstrapped via `zig init` before the fetch call.
          scratch=$(mktemp -d)
          trap "rm -rf $scratch" EXIT

          zig_init_output=$(cd "$scratch" && zig init 2>&1)
          zig_init_exit=$?
          if [[ $zig_init_exit -ne 0 ]]; then
            echo "Error: zig init failed" >&2
            echo "$zig_init_output" >&2
            exit 1
          fi

          set +e
          zig_fetch_output=$(cd "$scratch" && zig fetch "$tarball_path" 2>&1)
          zig_fetch_exit=$?
          set -e
          if [[ $zig_fetch_exit -ne 0 ]]; then
            echo "Error: zig fetch <local-tarball> failed with exit code $zig_fetch_exit" >&2
            echo "$zig_fetch_output" >&2
            exit 1
          fi

          # Extract the hash (first line of output) from the captured output.
          hash=$(echo "$zig_fetch_output" | head -1)
          if [[ -z "$hash" ]]; then
            echo "Error: zig fetch did not produce a hash" >&2
            echo "Full zig fetch output:" >&2
            echo "$zig_fetch_output" >&2
            exit 1
          fi
          echo "Zig content hash: $hash"

          # Also compute the gzipped tarball SHA-256 from the same local
          # tarball, as a secondary output.
          sha256=$(sha256sum "$tarball_path" | awk '{print $1}')
          echo "Tarball SHA-256: $sha256"
        fi

        echo "tarball-url=$asset_url" >> "$GITHUB_OUTPUT"
        echo "zig-hash=$hash" >> "$GITHUB_OUTPUT"
        echo "tarball-sha256=$sha256" >> "$GITHUB_OUTPUT"
        echo "package-name=$PKG_NAME" >> "$GITHUB_OUTPUT"

    - name: Append to release notes
      if: inputs.update-release-notes == 'true' && inputs.dry-run != 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        RELEASE_ID: ${{ steps.release.outputs.release-id }}
        PKG_NAME: ${{ steps.pkg.outputs.package-name }}
        URL: ${{ steps.resolve.outputs.tarball-url }}
        HASH: ${{ steps.resolve.outputs.zig-hash }}
      run: |
        set -euo pipefail
        if [[ -z "${GH_TOKEN:-}" ]]; then
          echo "GH_TOKEN not set; skipping release-notes update"
          exit 0
        fi
        # Address the release by id, not tag — `gh release view <tag>` and
        # `gh release edit <tag>` resolve via /releases/tags/<tag>, which
        # 404s on drafts. The Resolve-release-id step ran first and gave us
        # an id that works for both draft and published releases.
        body=$(gh api "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID" \
          --jq '.body // ""' 2>/dev/null || echo "")
        # Append a Zig fetch block (idempotent: only append once).
        if ! echo "$body" | grep -q "<!-- zig-fetch -->"; then
          new_body="$body"$'\n\n<!-- zig-fetch -->\n## Zig\n\nAdd to your `build.zig.zon`:\n\n```\n.dependencies = .{\n    .'"$PKG_NAME"' = .{\n        .url = \"'"$URL"'\",\n        .hash = \"'"$HASH"'\",\n    },\n},\n```\n'
          gh api -X PATCH "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID" \
            -f body="$new_body" > /dev/null
          echo "Release notes updated with Zig fetch block"
        else
          echo "Zig fetch block already present in release notes"
        fi

    - name: Dry-run summary
      if: inputs.dry-run == 'true'
      shell: bash
      env:
        TAG: ${{ steps.tag.outputs.tag }}
        PKG_NAME: ${{ steps.pkg.outputs.package-name }}
        URL: ${{ steps.resolve.outputs.tarball-url }}
        HASH: ${{ steps.resolve.outputs.zig-hash }}
      run: |
        echo "[dry-run] Resolved Zig package metadata for $TAG:"
        echo "  package:  $PKG_NAME"
        echo "  url:      $URL"
        echo "  zig-hash: $HASH"
