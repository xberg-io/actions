name: Publish to Hex.pm
description: >
  Publish Elixir packages to Hex.pm using mix hex.publish. Optionally accepts
  a pre-built Hex source tarball (.tar) from build-elixir-hex@v1 to avoid
  double-building; when tarball-path is set, publishes that artifact instead
  of rebuilding from source.

inputs:
  package-dir:
    description: "Directory containing the Elixir project"
    required: false
    default: "."
  replace:
    description: "Allow replacing an existing version"
    required: false
    default: "true"
  skip-docs:
    description: "Skip generating docs (needed for NIF packages without pre-built binaries)"
    required: false
    default: "false"
  dry-run:
    description: "Perform a dry run without actually publishing"
    required: false
    default: "false"
  tarball-path:
    description: "Optional path to a pre-built Hex source tarball (.tar). When set, publishes this tarball instead of rebuilding. Recommended pairing: output from build-elixir-hex@v1."
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Setup Elixir and OTP
      uses: erlef/setup-beam@v1
      with:
        elixir-version: "1.19"
        otp-version: "28"

    - name: Verify Hex.pm availability
      if: inputs.dry-run != 'true'
      shell: bash
      env:
        HEX_API_KEY: ${{ env.HEX_API_KEY }}
        PACKAGE_DIR: ${{ inputs.package-dir }}
      run: |
        if [[ -z "${HEX_API_KEY:-}" ]]; then
          echo "Error: HEX_API_KEY environment variable not set" >&2
          exit 1
        fi
        cd "$PACKAGE_DIR"
        mix local.hex --force
        mix local.rebar --force

    - name: Fetch Mix dependencies
      if: inputs.dry-run != 'true'
      shell: bash
      env:
        PACKAGE_DIR: ${{ inputs.package-dir }}
      run: |
        cd "$PACKAGE_DIR"
        mix deps.get

    - name: Generate Cargo.lock for native dependencies
      if: inputs.dry-run != 'true' && inputs.tarball-path == ''
      shell: bash
      env:
        PACKAGE_DIR: ${{ inputs.package-dir }}
      run: |
        set -euo pipefail
        cd "$PACKAGE_DIR"
        # Find and generate Cargo.lock for any native Rust dependencies
        for cargo_toml in $(find native -name "Cargo.toml" 2>/dev/null || true); do
          cargo_dir=$(dirname "$cargo_toml")
          echo "Generating ${cargo_dir}/Cargo.lock via cargo generate-lockfile"
          cd "${GITHUB_WORKSPACE}/${PACKAGE_DIR}/${cargo_dir}"
          cargo generate-lockfile
          cd "${GITHUB_WORKSPACE}/${PACKAGE_DIR}"
        done

    - name: Publish to Hex.pm (pre-built tarball)
      if: inputs.dry-run != 'true' && inputs.tarball-path != ''
      shell: bash
      env:
        HEX_API_KEY: ${{ env.HEX_API_KEY }}
        REPLACE: ${{ inputs.replace }}
        TARBALL_PATH: ${{ inputs.tarball-path }}
      run: |
        if [[ ! -f "$TARBALL_PATH" ]]; then
          echo "Error: tarball not found at $TARBALL_PATH" >&2
          exit 1
        fi
        PUBLISH_FLAGS="package ${TARBALL_PATH} --yes"
        if [[ "$REPLACE" == "true" ]]; then
          PUBLISH_FLAGS="${PUBLISH_FLAGS} --replace"
        fi
        set +e
        # shellcheck disable=SC2086
        output=$(mix hex.publish $PUBLISH_FLAGS 2>&1)
        exit_code=$?
        set -e

        echo "$output"

        if [[ $exit_code -eq 0 ]]; then
          echo "Published successfully"
        elif echo "$output" | grep -qi "already published\|version already exists\|already been published\|can only modify a release"; then
          # Hex returns "can only modify a release up to one hour after publication"
          # when a re-publish lands >1h after the original push. The release is
          # already live, so treat as success-equivalent skip.
          echo "Package already published, skipping"
        else
          echo "Error publishing:" >&2
          echo "$output" >&2
          exit 1
        fi

    - name: Publish to Hex.pm (rebuild)
      if: inputs.dry-run != 'true' && inputs.tarball-path == ''
      shell: bash
      env:
        HEX_API_KEY: ${{ env.HEX_API_KEY }}
        PACKAGE_DIR: ${{ inputs.package-dir }}
        REPLACE: ${{ inputs.replace }}
        SKIP_DOCS: ${{ inputs.skip-docs }}
      run: |
        cd "$PACKAGE_DIR"
        PUBLISH_FLAGS="--yes"
        if [[ "$REPLACE" == "true" ]]; then
          PUBLISH_FLAGS="${PUBLISH_FLAGS} --replace"
        fi
        if [[ "$SKIP_DOCS" == "true" ]]; then
          PUBLISH_FLAGS="package ${PUBLISH_FLAGS}"
        fi
        set +e
        # shellcheck disable=SC2086
        output=$(mix hex.publish $PUBLISH_FLAGS 2>&1)
        exit_code=$?
        set -e

        echo "$output"

        if [[ $exit_code -eq 0 ]]; then
          echo "Published successfully"
        elif echo "$output" | grep -qi "already published\|version already exists\|already been published\|can only modify a release"; then
          # Hex returns "can only modify a release up to one hour after publication"
          # when a re-publish lands >1h after the original push. The release is
          # already live, so treat as success-equivalent skip.
          echo "Package already published, skipping"
        else
          echo "Error publishing:" >&2
          echo "$output" >&2
          exit 1
        fi

    - name: Dry run
      if: inputs.dry-run == 'true'
      shell: bash
      env:
        PACKAGE_DIR: ${{ inputs.package-dir }}
      run: |
        cd "$PACKAGE_DIR"
        echo "[dry-run] Would run: mix hex.publish --yes"
        mix hex.info 2>/dev/null || echo "  (mix hex.info not available)"
