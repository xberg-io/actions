name: Build Ruby Gem
description: Builds Ruby gem with native Rust extension (Unix and Windows)

inputs:
  package-dir:
    description: Path to the Ruby package directory (relative to repo root)
    required: false
    default: "packages/ruby"
  rewrite-native-deps:
    description: >
      Rewrite workspace path-deps to registry version-deps via alef before
      building, so the shipped gem resolves on a consumer machine. Disable for
      non-release CI that builds against the local workspace.
    required: false
    default: "true"
  alef-version:
    description: "Alef version for the dependency rewrite (passed to install-alef@v1)"
    required: false
    default: "latest"
  dry-run:
    description: >
      Skip the rewrite-native-deps step when true. Dry-run publish workflows run
      before the core crate is on crates.io, so requiring the registry would
      hard-fail on a chicken-and-egg version lookup.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Rewrite native dependencies to registry versions
      if: inputs.rewrite-native-deps == 'true' && inputs.dry-run != 'true'
      uses: kreuzberg-dev/actions/rewrite-native-deps@v1
      with:
        lang: ruby
        alef-version: ${{ inputs.alef-version }}
        require-registry: "true"

    # --- Unix (Linux/macOS) ---
    - name: Set LD_LIBRARY_PATH (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: echo "LD_LIBRARY_PATH=$(ruby -rrbconfig -e'puts RbConfig::CONFIG["libdir"]')${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}" >> "$GITHUB_ENV"

    - name: Install Ruby gems (Unix)
      if: runner.os != 'Windows'
      shell: bash
      working-directory: ${{ inputs.package-dir }}
      run: bundle install

    - name: Compile Ruby extension (Unix)
      if: runner.os != 'Windows'
      shell: bash
      working-directory: ${{ inputs.package-dir }}
      env:
        RB_SYS_CARGO_PROFILE: release
      run: bundle exec rake compile

    # --- Windows ---
    - name: Install MSYS2 toolchain
      if: runner.os == 'Windows'
      shell: pwsh
      run: ridk exec pacman -S --needed --noconfirm base-devel mingw-w64-ucrt-x86_64-toolchain mingw-w64-ucrt-x86_64-lld

    - name: Export RUBY path (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $rubyPath = ridk exec ruby -e "print RbConfig.ruby"
        Add-Content $env:GITHUB_ENV "RUBY=$rubyPath"

    - name: Install Rust GNU toolchain (Windows)
      if: runner.os == 'Windows'
      shell: bash
      run: rustup toolchain install stable-gnu --profile minimal --no-self-update

    - name: Configure bindgen sysroot (Windows)
      if: runner.os == 'Windows'
      shell: bash
      run: echo "BINDGEN_EXTRA_CLANG_ARGS=--target=x86_64-pc-windows-gnu --sysroot=${RI_DEVKIT//\\/\/}$MSYSTEM_PREFIX" >> "$GITHUB_ENV"

    - name: Install Ruby gems (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      working-directory: ${{ inputs.package-dir }}
      env:
        PACKAGE_DIR: ${{ inputs.package-dir }}
      run: |
        $unixPath = ridk exec bash -lc "cygpath -au '$env:GITHUB_WORKSPACE/$env:PACKAGE_DIR'"
        ridk exec bash -lc "cd '$unixPath' && export RUSTUP_TOOLCHAIN=stable-gnu CC=x86_64-w64-mingw32-gcc CXX=x86_64-w64-mingw32-g++ && bundle install"

    - name: Compile Ruby extension (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      working-directory: ${{ inputs.package-dir }}
      env:
        RB_SYS_CARGO_PROFILE: release
        PACKAGE_DIR: ${{ inputs.package-dir }}
      run: |
        $unixPath = ridk exec bash -lc "cygpath -au '$env:GITHUB_WORKSPACE/$env:PACKAGE_DIR'"
        ridk exec bash -lc "cd '$unixPath' && export RUSTUP_TOOLCHAIN=stable-gnu CC=x86_64-w64-mingw32-gcc CXX=x86_64-w64-mingw32-g++ CARGO_TARGET_X86_64_PC_WINDOWS_GNU_RUSTFLAGS='-C link-arg=-fuse-ld=lld' && bundle exec rake compile"
