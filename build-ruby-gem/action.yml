name: Build Ruby Gem
description: Builds Ruby gem with native Rust extension (Unix and Windows)

inputs:
  package-dir:
    description: Path to the Ruby package directory (relative to repo root)
    required: false
    default: "packages/ruby"
  platform:
    description: >
      Ruby platform tag for validation (e.g. x86_64-linux, aarch64-linux, arm64-darwin,
      x86_64-darwin, x64-mingw-ucrt). When non-empty, the compiled gem's platform is
      checked against this value. rake-compiler detects the native platform automatically
      and tags the gem accordingly; this input is primarily for documentation and optional
      validation. When empty (default), native build on the runner without validation.
    required: false
    default: ""
  dock-platform:
    description: >
      Platform identifier for rb-sys-dock when cross-compiling to Windows
      (e.g. x64-mingw-ucrt). When non-empty, uses rb-sys-dock Docker to cross-compile
      the gem for the specified platform.
    required: false
    default: ""
  rewrite-native-deps:
    description: >
      Rewrite workspace path-deps to registry version-deps via alef before
      building, so the shipped gem resolves on a consumer machine. Disable for
      non-release CI that builds against the local workspace.
    required: false
    default: "true"
  alef-version:
    description: "Alef version for the dependency rewrite (passed to install-alef@v1)"
    required: false
    default: "latest"
  dry-run:
    description: >
      Skip the rewrite-native-deps step when true. Dry-run publish workflows run
      before the core crate is on crates.io, so requiring the registry would
      hard-fail on a chicken-and-egg version lookup.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Rewrite native dependencies to registry versions
      if: inputs.rewrite-native-deps == 'true' && inputs.dry-run != 'true'
      uses: kreuzberg-dev/actions/rewrite-native-deps@v1
      with:
        lang: ruby
        alef-version: ${{ inputs.alef-version }}
        require-registry: "true"

    # --- Unix (Linux/macOS) ---
    - name: Set LD_LIBRARY_PATH (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: echo "LD_LIBRARY_PATH=$(ruby -rrbconfig -e'puts RbConfig::CONFIG["libdir"]')${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}" >> "$GITHUB_ENV"

    - name: Install Ruby gems (Unix)
      if: runner.os != 'Windows'
      shell: bash
      working-directory: ${{ inputs.package-dir }}
      run: bundle install

    - name: Compile Ruby extension (Unix)
      if: runner.os != 'Windows'
      shell: bash
      working-directory: ${{ inputs.package-dir }}
      env:
        RB_SYS_CARGO_PROFILE: release
      run: bundle exec rake compile

    - name: Build platform gem (Unix)
      if: runner.os != 'Windows'
      shell: bash
      working-directory: ${{ inputs.package-dir }}
      run: bundle exec rake build

    # --- Windows ---
    - name: Install MSYS2 toolchain
      if: runner.os == 'Windows'
      shell: pwsh
      run: ridk exec pacman -S --needed --noconfirm base-devel mingw-w64-ucrt-x86_64-toolchain mingw-w64-ucrt-x86_64-lld

    - name: Export RUBY path (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $rubyPath = ridk exec ruby -e "print RbConfig.ruby"
        Add-Content $env:GITHUB_ENV "RUBY=$rubyPath"

    - name: Install Rust GNU toolchain (Windows)
      if: runner.os == 'Windows'
      shell: bash
      run: rustup toolchain install stable-x86_64-pc-windows-gnu --profile minimal --no-self-update

    - name: Configure bindgen sysroot (Windows)
      if: runner.os == 'Windows'
      shell: bash
      run: echo "BINDGEN_EXTRA_CLANG_ARGS=--target=x86_64-pc-windows-gnu --sysroot=${RI_DEVKIT//\\/\/}$MSYSTEM_PREFIX" >> "$GITHUB_ENV"

    - name: Disable consumer rust-toolchain.toml (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        if (Test-Path "$env:GITHUB_WORKSPACE/rust-toolchain.toml") {
          Move-Item "$env:GITHUB_WORKSPACE/rust-toolchain.toml" "$env:GITHUB_WORKSPACE/rust-toolchain.toml.disabled"
        }

    - name: Install and default GNU toolchain (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $toolchainFile = "$env:GITHUB_WORKSPACE/rust-toolchain.toml.disabled"
        $channel = "stable"
        if (Test-Path $toolchainFile) {
          $content = Get-Content $toolchainFile -Raw
          if ($content -match 'channel\s*=\s*"([^"]+)"') {
            $channel = $matches[1]
          }
        }
        $gnuToolchain = "$channel-x86_64-pc-windows-gnu"
        rustup toolchain install $gnuToolchain --profile minimal --no-self-update
        rustup default $gnuToolchain
        rustup show active-toolchain

    - name: Install Ruby gems (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      working-directory: ${{ inputs.package-dir }}
      env:
        PACKAGE_DIR: ${{ inputs.package-dir }}
      run: |
        $unixPath = ridk exec bash -lc "cygpath -au '$env:GITHUB_WORKSPACE/$env:PACKAGE_DIR'"
        ridk exec bash -lc "cd '$unixPath' && export CC=x86_64-w64-mingw32-gcc CXX=x86_64-w64-mingw32-g++ CARGO_BUILD_TARGET=x86_64-pc-windows-gnu && bundle install"

    - name: Diagnostic rustc info (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      working-directory: ${{ inputs.package-dir }}
      run: |
        rustup which rustc
        rustc --print sysroot
        # rustc 1.95+ renamed `host-triple` to `host-tuple`.
        rustc --print host-tuple

    - name: Compile Ruby extension (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      working-directory: ${{ inputs.package-dir }}
      env:
        RB_SYS_CARGO_PROFILE: release
        PACKAGE_DIR: ${{ inputs.package-dir }}
      run: |
        $unixPath = ridk exec bash -lc "cygpath -au '$env:GITHUB_WORKSPACE/$env:PACKAGE_DIR'"
        ridk exec bash -lc "cd '$unixPath' && export CC=x86_64-w64-mingw32-gcc CXX=x86_64-w64-mingw32-g++ CARGO_BUILD_TARGET=x86_64-pc-windows-gnu RUSTFLAGS=\"-C link-arg=-fuse-ld=lld\" && bundle exec rake compile"

    - name: Build platform gem (Windows)
      if: runner.os == 'Windows'
      shell: bash
      working-directory: ${{ inputs.package-dir }}
      run: |
        if [ -n "${{ inputs.dock-platform }}" ]; then
          # Cross-compile for Windows via Docker using rb-sys-dock.
          # The rb-sys-dock container ships its own Ruby toolchain; bundler
          # must `install` inside the container before `exec rake` so the
          # lockfile materializes against the container's Ruby version
          # rather than the host's.
          gem install rb_sys
          rb-sys-dock --platform "${{ inputs.dock-platform }}" -- bash -c "bundle install --jobs=4 --retry=3 && bundle exec rake compile && bundle exec rake build"
        else
          # Native build via MSYS2/mingw (fallback if dock-platform not specified)
          bundle exec rake compile
          bundle exec rake build
        fi

    - name: Restore consumer rust-toolchain.toml (Windows)
      if: always() && runner.os == 'Windows'
      shell: pwsh
      run: |
        if (Test-Path "$env:GITHUB_WORKSPACE/rust-toolchain.toml.disabled") {
          Move-Item "$env:GITHUB_WORKSPACE/rust-toolchain.toml.disabled" "$env:GITHUB_WORKSPACE/rust-toolchain.toml"
        }
