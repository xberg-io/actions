name: Check Registry for Existing Version
description: |
  Query a package registry to determine if a specific version already exists.
  Backed by `alef check-registry`. Supports: pypi, npm, wasm, rubygems, hex,
  maven (groupId:artifactId), nuget, cratesio, packagist, homebrew (tap),
  github-release.
inputs:
  registry:
    description: "Registry to check"
    required: true
  package:
    description: "Package name (e.g. 'kreuzberg', '@kreuzberg/node-linux-x64-gnu', 'dev.kreuzberg:kreuzberg')"
    required: true
  version:
    description: "Version to check for"
    required: true
  extra-packages:
    description: |
      Additional packages to check (one per line, format: output_key=package_name).
      Each is queried with the same registry and version.
    required: false
    default: ""
  tap-repo:
    description: "Homebrew tap repository (owner/repo). Required for homebrew."
    required: false
    default: ""
  tag:
    description: "GitHub release tag (defaults to v{version}) — github-release only."
    required: false
    default: ""
  asset-prefix:
    description: "Asset name prefix to match (forwarded to alef when supported) — github-release only."
    required: false
    default: ""
  assets:
    description: "Comma-separated list of required asset names — github-release only."
    required: false
    default: ""
  repo:
    description: "GitHub repository (owner/repo) — github-release only."
    required: false
    default: ""
  source:
    description: "NuGet source URL (defaults to https://api.nuget.org)."
    required: false
    default: ""
  alef-version:
    description: "Alef CLI version to install (semver, 'latest', or 'main')."
    required: false
    default: "latest"
outputs:
  exists:
    description: "Whether the primary package version exists (true/false)."
    value: ${{ steps.check.outputs.exists }}
runs:
  using: composite
  steps:
    - name: Fetch alef.toml so install-alef can read the pin
      # Many publish jobs reach this action without first running
      # actions/checkout. Without alef.toml in cwd, install-alef falls
      # back to the GitHub "latest" release tag — which 404s during the
      # window between an alef release being tagged and its publish
      # workflow finishing the binary upload. Pull just alef.toml from
      # the calling repo's HEAD so install-alef sees the pinned version.
      if: inputs.alef-version == 'latest'
      shell: bash
      run: |
        if [[ ! -f alef.toml ]]; then
          if curl --silent --fail --location \
              "https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${GITHUB_SHA}/alef.toml" \
              -o alef.toml; then
            echo "Fetched alef.toml from ${GITHUB_REPOSITORY}@${GITHUB_SHA}"
          else
            rm -f alef.toml
            echo "No alef.toml at ${GITHUB_REPOSITORY}@${GITHUB_SHA} — install-alef will resolve latest from GitHub"
          fi
        fi

    - name: Install alef
      uses: xberg-io/actions/install-alef@v1
      with:
        version: ${{ inputs.alef-version }}

    - name: Check registry
      id: check
      shell: bash
      env:
        REGISTRY: ${{ inputs.registry }}
        PACKAGE: ${{ inputs.package }}
        VERSION: ${{ inputs.version }}
        EXTRA_PACKAGES: ${{ inputs.extra-packages }}
        TAP_REPO: ${{ inputs.tap-repo }}
        REPO_INPUT: ${{ inputs.repo }}
        SOURCE: ${{ inputs.source }}
        ASSET_PREFIX: ${{ inputs.asset-prefix }}
        REQUIRED_ASSETS: ${{ inputs.assets }}
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail

        run_alef_check() {
          local pkg="$1"
          local max_attempts=5
          local attempt=1
          local backoff=2

          while [[ $attempt -le $max_attempts ]]; do
            local args=(check-registry --registry "${REGISTRY}" --package "${pkg}" --version "${VERSION}" --json)
            if [[ -n "${TAP_REPO}" ]]; then
              args+=(--tap-repo "${TAP_REPO}")
            fi
            if [[ -n "${REPO_INPUT}" ]]; then
              args+=(--repo "${REPO_INPUT}")
            fi
            if [[ -n "${SOURCE}" ]]; then
              args+=(--source "${SOURCE}")
            fi
            if [[ -n "${ASSET_PREFIX}" ]]; then
              args+=(--asset-prefix "${ASSET_PREFIX}")
            fi
            if [[ -n "${REQUIRED_ASSETS}" ]]; then
              args+=(--required-assets "${REQUIRED_ASSETS}")
            fi

            if alef "${args[@]}"; then
              return 0
            fi

            local exit_code=$?
            if [[ $attempt -lt $max_attempts ]]; then
              echo "Attempt $attempt failed with exit code $exit_code, retrying in ${backoff}s..." >&2
              sleep "$backoff"
              backoff=$((backoff * 2))
              ((attempt++))
            else
              echo "Max retries ($max_attempts) exhausted for package: $pkg" >&2
              return $exit_code
            fi
          done
        }

        # Primary package check.
        primary_json=$(run_alef_check "${PACKAGE}")
        primary_exists=$(echo "${primary_json}" | jq -r '.exists // false')
        echo "exists=${primary_exists}" >>"$GITHUB_OUTPUT"
        echo "Primary check: ${PACKAGE}@${VERSION} on ${REGISTRY} -> exists=${primary_exists}"

        # Extra packages: same registry/version, emit per-line output keys.
        if [[ -n "${EXTRA_PACKAGES}" ]]; then
          while IFS= read -r line; do
            line="$(echo "${line}" | xargs)"
            [[ -z "${line}" ]] && continue
            output_key="${line%%=*}"
            extra_pkg="${line#*=}"
            extra_json=$(run_alef_check "${extra_pkg}")
            extra_exists=$(echo "${extra_json}" | jq -r '.exists // false')
            echo "${output_key}=${extra_exists}" >>"$GITHUB_OUTPUT"
            echo "Extra check (${output_key}): ${extra_pkg}@${VERSION} on ${REGISTRY} -> exists=${extra_exists}"
          done <<<"${EXTRA_PACKAGES}"
        fi
