name: Publish to pub.dev
description: >
  Publish Dart packages to pub.dev using OIDC trusted publishing.
  Requires the workflow to have `permissions: id-token: write` and the
  package to be configured for automated publishing on pub.dev (one-time
  setup per package). Handles already-published versions idempotently.

inputs:
  package-dir:
    description: "Directory containing pubspec.yaml"
    required: false
    default: "."
  dart-version:
    description: "Dart SDK version (passed to dart-lang/setup-dart). Use 'stable' for latest stable."
    required: false
    default: "stable"
  setup-dart:
    description: "Whether to run dart-lang/setup-dart. Set to 'false' if Dart is already installed."
    required: false
    default: "true"
  natives-dir:
    description: "Optional directory containing per-RID native libraries to bundle into packages/dart/lib/src/native/<rid>/"
    required: false
    default: ""
  dry-run:
    description: "Perform a dry run without actually publishing"
    required: false
    default: "false"

outputs:
  skipped:
    description: "Whether the publish step was skipped because the version was already published"
    value: ${{ steps.publish.outputs.skipped }}

runs:
  using: composite
  steps:
    - name: Set up Dart SDK
      if: inputs.setup-dart == 'true'
      uses: dart-lang/setup-dart@v1
      with:
        sdk: ${{ inputs.dart-version }}

    - name: Bundle native libraries
      shell: bash
      env:
        NATIVES_DIR: ${{ inputs.natives-dir }}
        PACKAGE_DIR: ${{ inputs.package-dir }}
      run: |
        if [[ -n "$NATIVES_DIR" && -d "$NATIVES_DIR" ]]; then
          echo "Bundling native libraries from $NATIVES_DIR into package..."
          mkdir -p "$PACKAGE_DIR/lib/src/native"
          cp -r "$NATIVES_DIR"/* "$PACKAGE_DIR/lib/src/native/"
          echo "Native libraries bundled successfully"
        else
          echo "No natives-dir provided or directory does not exist; skipping native bundling"
        fi

    - name: Resolve dependencies
      shell: bash
      env:
        PACKAGE_DIR: ${{ inputs.package-dir }}
      run: |
        cd "$PACKAGE_DIR"
        dart pub get

    - name: Set up pub.dev trusted publishing via OIDC
      id: oidc-token
      shell: bash
      run: |
        # Request OIDC token from GitHub Actions for pub.dev trusted publishing
        token_request_url="${ACTIONS_ID_TOKEN_REQUEST_URL}"
        token_request_token="${ACTIONS_ID_TOKEN_REQUEST_TOKEN}"

        if [ -z "$token_request_url" ] || [ -z "$token_request_token" ]; then
          echo "Warning: OIDC environment not available; will attempt credential-less pub publish"
          exit 0
        fi

        oidc_token=$(curl -sS "$token_request_url" \
          -H "Authorization: bearer $token_request_token" \
          -H "Accept: application/json" \
          -d '{}' | jq -r '.oidcToken // empty' 2>/dev/null || echo "")

        if [ -n "$oidc_token" ]; then
          # Create credentials file for pub publish to use
          mkdir -p ~/.config/dart
          printf '{"accessToken":"%s","refreshToken":"","tokenEndpoint":"https://pub.dev/api/oauth/token","expiration":null}' "$oidc_token" > ~/.config/dart/pub-credentials.json
          echo "oidc-configured=true" >> "$GITHUB_OUTPUT"
        fi

    - name: Validate with pub publish --dry-run
      shell: bash
      env:
        PACKAGE_DIR: ${{ inputs.package-dir }}
      run: |
        cd "$PACKAGE_DIR"
        # Capture warnings but don't fail on them — the real publish will enforce.
        # Many alef-generated packages emit "homepage" / "documentation" warnings
        # that are non-fatal.
        dart pub publish --dry-run || true

    - name: Publish to pub.dev
      id: publish
      if: inputs.dry-run != 'true'
      shell: bash
      env:
        PACKAGE_DIR: ${{ inputs.package-dir }}
      run: |
        cd "$PACKAGE_DIR"
        set +e
        output=$(dart pub publish --force 2>&1)
        exit_code=$?
        set -e

        echo "$output"

        if [[ $exit_code -eq 0 ]]; then
          echo "Published successfully"
          echo "skipped=false" >> "$GITHUB_OUTPUT"
        elif echo "$output" | grep -qiE "version.*already exists|already been published|already in the registry"; then
          echo "Package already published, skipping"
          echo "skipped=true" >> "$GITHUB_OUTPUT"
        else
          echo "Error publishing to pub.dev:" >&2
          echo "$output" >&2
          exit 1
        fi

    - name: Dry run summary
      if: inputs.dry-run == 'true'
      shell: bash
      env:
        PACKAGE_DIR: ${{ inputs.package-dir }}
      run: |
        cd "$PACKAGE_DIR"
        name=$(grep '^name:' pubspec.yaml | head -1 | awk '{print $2}')
        version=$(grep '^version:' pubspec.yaml | head -1 | awk '{print $2}')
        echo "[dry-run] Would publish ${name}@${version} to pub.dev"
        echo "skipped=false" >> "$GITHUB_OUTPUT"
