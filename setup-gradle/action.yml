name: Setup Gradle
description: >
  Install Gradle via `gradle/actions/setup-gradle@v6` with xberg-io
  defaults. Mirrors the wiring used inside `publish-maven-gradle`.

inputs:
  gradle-version:
    description: "Gradle version to install"
    required: false
    default: "9.6.0"
  cache-cleanup:
    description: "Cache cleanup policy passed through to gradle/actions/setup-gradle"
    required: false
    default: "on-success"
  java-version:
    description: "Java version to install"
    required: false
    default: "25"

runs:
  using: composite
  steps:
    - name: Set up Java
      uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: ${{ inputs.java-version }}
    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v6
      with:
        gradle-version: ${{ inputs.gradle-version }}
        cache-cleanup: ${{ inputs.cache-cleanup }}
