
version = '4.0'
name = 'actions'
description = 'Shared GitHub Actions composite actions for xberg-io CI/CD pipelines'
gitignore = true
presets = ["claude", "codex"]
builtins = ['cicd', 'default-commands']

compact = true
[[includes]]
name = 'xberg-core'
source = 'https://github.com/xberg-io/agent-conventions.git'
path = 'modules/core'
merge_strategy = 'local-override'

[[includes]]
name = 'xberg-cicd'
source = 'https://github.com/xberg-io/agent-conventions.git'
path = 'modules/cicd'
merge_strategy = 'local-override'

[[marketplaces]]
name = "basemind"
source = "Goldziher/basemind"
type = "github"

[[plugins]]
marketplace = "basemind"
name = "basemind"
scope = "project"
enabled = true
