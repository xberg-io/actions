name: Setup wasm-pack
description: >
  Install `wasm-pack` at a pinned version with OS/arch detection. Downloads
  the appropriate prebuilt release tarball from wasm-bindgen/wasm-pack and places
  the binary on PATH. No-ops if the requested version is already installed.

inputs:
  wasm-pack-version:
    description: "wasm-pack version to install (without the leading 'v')"
    required: false
    default: "0.15.0"

runs:
  using: composite
  steps:
    - name: Install wasm-pack (Unix)
      if: runner.os != 'Windows'
      shell: bash
      env:
        WASM_PACK_VERSION: ${{ inputs.wasm-pack-version }}
      run: |
        set -euo pipefail

        if command -v wasm-pack >/dev/null 2>&1 \
            && wasm-pack --version 2>/dev/null | grep -q "${WASM_PACK_VERSION}"; then
          echo "wasm-pack ${WASM_PACK_VERSION} already installed"
          exit 0
        fi

        os="$(uname -s)"
        arch="$(uname -m)"
        case "${os}-${arch}" in
          Linux-x86_64) target="x86_64-unknown-linux-musl" ;;
          Linux-aarch64 | Linux-arm64) target="aarch64-unknown-linux-musl" ;;
          Darwin-x86_64) target="x86_64-apple-darwin" ;;
          Darwin-arm64) target="aarch64-apple-darwin" ;;
          *)
            echo "Unsupported OS/arch: ${os}-${arch}" >&2
            exit 1
            ;;
        esac

        url="https://github.com/wasm-bindgen/wasm-pack/releases/download/v${WASM_PACK_VERSION}/wasm-pack-v${WASM_PACK_VERSION}-${target}.tar.gz"
        echo "Downloading ${url}"

        install_dir="/usr/local/bin"
        if [[ ! -w "${install_dir}" ]]; then
          sudo curl -sSfL "${url}" \
            | sudo tar -xz --strip-components=1 -C "${install_dir}" "wasm-pack-v${WASM_PACK_VERSION}-${target}/wasm-pack"
          sudo chmod +x "${install_dir}/wasm-pack"
        else
          curl -sSfL "${url}" \
            | tar -xz --strip-components=1 -C "${install_dir}" "wasm-pack-v${WASM_PACK_VERSION}-${target}/wasm-pack"
          chmod +x "${install_dir}/wasm-pack"
        fi

        wasm-pack --version

    - name: Install wasm-pack (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      env:
        WASM_PACK_VERSION: ${{ inputs.wasm-pack-version }}
      run: |
        $ErrorActionPreference = 'Stop'

        if (Get-Command wasm-pack -ErrorAction SilentlyContinue) {
          $existing = (wasm-pack --version) 2>$null
          if ($existing -match $env:WASM_PACK_VERSION) {
            Write-Host "wasm-pack $env:WASM_PACK_VERSION already installed"
            exit 0
          }
        }

        $target = 'x86_64-pc-windows-msvc'
        $archive = "wasm-pack-v$env:WASM_PACK_VERSION-$target.tar.gz"
        $url = "https://github.com/wasm-bindgen/wasm-pack/releases/download/v$env:WASM_PACK_VERSION/$archive"
        $tmp = Join-Path $env:RUNNER_TEMP $archive
        $extractDir = Join-Path $env:RUNNER_TEMP "wasm-pack-extract"

        Write-Host "Downloading $url"
        Invoke-WebRequest -Uri $url -OutFile $tmp
        Expand-Archive -Path $tmp -DestinationPath $extractDir -Force

        $binary = Get-ChildItem -Path $extractDir -Recurse -Filter wasm-pack.exe | Select-Object -First 1
        if (-not $binary) {
          throw "wasm-pack.exe not found in extracted archive"
        }

        $installDir = "C:\\Program Files\\wasm-pack"
        New-Item -ItemType Directory -Force -Path $installDir | Out-Null
        Copy-Item $binary.FullName (Join-Path $installDir 'wasm-pack.exe') -Force
        Add-Content -Path $env:GITHUB_PATH -Value $installDir

        & (Join-Path $installDir 'wasm-pack.exe') --version
