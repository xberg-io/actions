name: Build PHP Extension
description: Builds PHP extension using ext-php-rs (Linux and Windows)

inputs:
  crate-name:
    description: Cargo crate name for the PHP extension
    required: true
  lib-name:
    description: Name of the built library (without lib prefix or extension)
    required: true
  php-version:
    description: PHP version (only used on Windows for thread safety)
    required: false
    default: ""
  php-ts:
    description: Thread safety mode - ts or nts (Windows only)
    required: false
    default: ""
  rewrite-native-deps:
    description: >
      Rewrite workspace path-deps to registry version-deps via alef before
      building, so a source-distributed extension resolves on a consumer machine.
      Disable for non-release CI that builds against the local workspace.
    required: false
    default: "true"
  alef-version:
    description: "Alef version for the dependency rewrite (passed to install-alef@v1)"
    required: false
    default: "latest"
  dry-run:
    description: >
      Skip the rewrite-native-deps step when true. Dry-run publish workflows run
      before the core crate is on crates.io, so requiring the registry would
      hard-fail on a chicken-and-egg version lookup.
    required: false
    default: "false"

outputs:
  extension-path:
    description: Path to the built extension file (.so on Linux, .dll on Windows)
    value: ${{ steps.build-unix.outputs.extension-path || steps.build-windows.outputs.dll }}

runs:
  using: composite
  steps:
    - name: Rewrite native dependencies to registry versions
      if: inputs.rewrite-native-deps == 'true' && inputs.dry-run != 'true'
      uses: kreuzberg-dev/actions/rewrite-native-deps@v1
      with:
        lang: php
        alef-version: ${{ inputs.alef-version }}
        require-registry: "true"

    # --- Linux/macOS ---
    - name: Build PHP extension (Linux/macOS)
      if: runner.os != 'Windows'
      id: build-unix
      shell: bash
      run: |
        set -euo pipefail

        # Build out-of-workspace to avoid Cargo `links` conflicts when the workspace
        # contains other path-deps that reference the same native libs.

        CRATE_NAME="${{ inputs.crate-name }}"
        LIB_NAME="${{ inputs.lib-name }}"
        WORKSPACE_ROOT="${GITHUB_WORKSPACE}"
        CRATE_DIR="${WORKSPACE_ROOT}/crates/${CRATE_NAME}"

        # If crate is in packages/ instead, adjust path.
        if [ ! -d "$CRATE_DIR" ]; then
          CRATE_DIR="${WORKSPACE_ROOT}/packages/${CRATE_NAME}"
        fi

        if [ ! -d "$CRATE_DIR" ]; then
          echo "Error: crate directory not found at $CRATE_DIR" >&2
          exit 1
        fi

        # Create temp directory for out-of-workspace build.
        BUILD_TEMP=$(mktemp -d)
        trap "rm -rf '$BUILD_TEMP'" EXIT

        # Copy crate to temp dir.
        cp -r "$CRATE_DIR" "$BUILD_TEMP/crate"
        cd "$BUILD_TEMP/crate"

        # Strip workspace inheritance to avoid cross-workspace dep conflicts.
        if grep -q 'workspace = true' Cargo.toml 2>/dev/null; then
          python3 << 'PYTHON_SCRIPT'
import re

# Read root Cargo.toml to extract [workspace.package] values.
root_toml_path = "$WORKSPACE_ROOT/Cargo.toml"
ws_values = {}
try:
    with open(root_toml_path, 'r') as f:
        content = f.read()
        # Extract [workspace.package] section.
        match = re.search(r'\[workspace\.package\](.*?)(?=\[|$)', content, re.DOTALL)
        if match:
            for line in match.group(1).split('\n'):
                line = line.strip()
                if '=' in line and not line.startswith('#'):
                    key, val = line.split('=', 1)
                    ws_values[key.strip()] = val.strip()
except Exception as e:
    print(f"Warning: could not parse workspace Cargo.toml: {e}", flush=True)

# Read binding crate's Cargo.toml and replace workspace = true directives.
with open('Cargo.toml', 'r') as f:
    content = f.read()

# Replace [package].workspace = true with explicit values.
if 'workspace = true' in content:
    lines = content.split('\n')
    in_package = False
    result = []
    for line in lines:
        if line.strip().startswith('[package]'):
            in_package = True
            result.append(line)
        elif in_package and line.strip().startswith('['):
            in_package = False
            result.append(line)
        elif in_package and 'workspace = true' in line:
            # Replace with extracted workspace values.
            indent = len(line) - len(line.lstrip())
            for key, val in sorted(ws_values.items()):
                result.append(' ' * indent + f'{key} = {val}')
            continue
        elif 'workspace = true' in line and not in_package:
            # Skip non-package workspace = true lines.
            continue
        result.append(line)
    content = '\n'.join(result)

with open('Cargo.toml', 'w') as f:
    f.write(content)
print("Stripped workspace inheritance from binding crate Cargo.toml", flush=True)
PYTHON_SCRIPT
        fi

        # Generate fresh lockfile for out-of-workspace build.
        cargo generate-lockfile

        # Build the crate.
        cargo build --release

        # Copy built artifact back to workspace target dir.
        mkdir -p "$WORKSPACE_ROOT/target/release"
        if [[ "$RUNNER_OS" == "macOS" ]]; then
          cp "$BUILD_TEMP/crate/target/release/lib${LIB_NAME}.dylib" "$WORKSPACE_ROOT/target/release/"
          echo "extension-path=$WORKSPACE_ROOT/target/release/lib${LIB_NAME}.dylib" >> "$GITHUB_OUTPUT"
        else
          cp "$BUILD_TEMP/crate/target/release/lib${LIB_NAME}.so" "$WORKSPACE_ROOT/target/release/"
          echo "extension-path=$WORKSPACE_ROOT/target/release/lib${LIB_NAME}.so" >> "$GITHUB_OUTPUT"
        fi

    # --- Windows ---
    - name: Install LLVM for libclang (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        choco install llvm --version=18.1.8 --allow-downgrade -y
        $llvmPath = "C:\Program Files\LLVM\bin"
        if (-not (Test-Path (Join-Path $llvmPath "libclang.dll"))) {
          throw "libclang.dll not found in LLVM installation"
        }
        "LIBCLANG_PATH=$llvmPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        "PATH=$llvmPath;$env:PATH" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: Build PHP extension (Windows)
      if: runner.os == 'Windows'
      id: build-windows
      shell: pwsh
      env:
        # ext-php-rs uses #![cfg_attr(windows, feature(abi_vectorcall))] in its
        # lib.rs — the abi_vectorcall feature is unstable, so on stable Rust
        # we need RUSTC_BOOTSTRAP=1 to allow it. This is the upstream-recommended
        # workaround; the alternative is using the nightly toolchain.
        RUSTC_BOOTSTRAP: "1"
      run: |
        $ErrorActionPreference = "Stop"

        # Build out-of-workspace to avoid Cargo `links` conflicts.

        $crateName = "${{ inputs.crate-name }}"
        $libName = "${{ inputs.lib-name }}"
        $workspaceRoot = $env:GITHUB_WORKSPACE
        $crateDir = Join-Path $workspaceRoot "crates" $crateName

        # If crate is in packages/ instead, adjust path.
        if (-not (Test-Path $crateDir)) {
          $crateDir = Join-Path $workspaceRoot "packages" $crateName
        }

        if (-not (Test-Path $crateDir)) {
          throw "Crate directory not found at $crateDir"
        }

        # Create temp directory for out-of-workspace build.
        $buildTemp = New-TemporaryDirectory

        try {
          # Copy crate to temp dir.
          Copy-Item -Path $crateDir -Destination (Join-Path $buildTemp "crate") -Recurse
          Set-Location (Join-Path $buildTemp "crate")

          # Strip workspace inheritance (simplified for Windows).
          $cargoToml = Join-Path (Get-Location) "Cargo.toml"
          if (Test-Path $cargoToml) {
            $content = Get-Content $cargoToml -Raw
            if ($content -match 'workspace = true') {
              # Remove workspace = true lines.
              $content = $content -replace '^\s*workspace = true\s*$', ''
              Set-Content -Path $cargoToml -Value $content
              Write-Host "Stripped workspace inheritance from Cargo.toml"
            }
          }

          # Generate fresh lockfile for out-of-workspace build.
          cargo generate-lockfile

          # Build the crate.
          cargo build --release

          # Copy built artifact back to workspace target dir.
          $dllPath = Join-Path $workspaceRoot "target\release\${libName}.dll"
          $sourceDir = Join-Path (Get-Location) "target\release"
          $targetDir = Join-Path $workspaceRoot "target\release"
          New-Item -ItemType Directory -Force -Path $targetDir > $null
          Copy-Item -Path (Join-Path $sourceDir "${libName}.dll") -Destination $dllPath
          if (-not (Test-Path $dllPath)) {
            throw "Built DLL not found at $dllPath"
          }
          Write-Host "Built DLL at: $dllPath"
          "dll=$dllPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        } finally {
          Set-Location $workspaceRoot
          Remove-Item -Path $buildTemp -Recurse -Force
        }
