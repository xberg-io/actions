name: Build PHP Extension
description: Builds PHP extension using ext-php-rs (Linux and Windows)

inputs:
  crate-name:
    description: Cargo crate name for the PHP extension
    required: true
  lib-name:
    description: Name of the built library (without lib prefix or extension)
    required: true
  php-version:
    description: PHP version (only used on Windows for thread safety)
    required: false
    default: ""
  php-ts:
    description: Thread safety mode - ts or nts (Windows only)
    required: false
    default: ""
  rewrite-native-deps:
    description: >
      Rewrite workspace path-deps to registry version-deps via alef before
      building, so a source-distributed extension resolves on a consumer machine.
      Disable for non-release CI that builds against the local workspace.
    required: false
    default: "true"
  alef-version:
    description: "Alef version for the dependency rewrite (passed to install-alef@v1)"
    required: false
    default: "latest"
  dry-run:
    description: >
      Skip the rewrite-native-deps step when true. Dry-run publish workflows run
      before the core crate is on crates.io, so requiring the registry would
      hard-fail on a chicken-and-egg version lookup.
    required: false
    default: "false"

outputs:
  extension-path:
    description: Path to the built extension file (.so on Linux, .dll on Windows)
    value: ${{ steps.build-unix.outputs.extension-path || steps.build-windows.outputs.dll }}

runs:
  using: composite
  steps:
    - name: Rewrite native dependencies to registry versions
      if: inputs.rewrite-native-deps == 'true' && inputs.dry-run != 'true'
      uses: xberg-io/actions/rewrite-native-deps@v1
      with:
        lang: php
        alef-version: ${{ inputs.alef-version }}
        require-registry: "true"

    # --- Linux/macOS ---
    - name: Build PHP extension (Linux/macOS)
      if: runner.os != 'Windows'
      id: build-unix
      shell: bash
      env:
        CRATE_NAME: ${{ inputs.crate-name }}
        LIB_NAME: ${{ inputs.lib-name }}
      run: |
        set -euo pipefail
        extension_path=$( \
          bash "${{ github.action_path }}/scripts/build-out-of-workspace.sh" \
          "$CRATE_NAME" "$LIB_NAME" "$GITHUB_WORKSPACE"
        )
        echo "extension-path=$extension_path" >> "$GITHUB_OUTPUT"

    # --- Windows ---
    - name: Install LLVM for libclang (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        choco install llvm --version=18.1.8 --allow-downgrade -y
        $llvmPath = "C:\Program Files\LLVM\bin"
        if (-not (Test-Path (Join-Path $llvmPath "libclang.dll"))) {
          throw "libclang.dll not found in LLVM installation"
        }
        "LIBCLANG_PATH=$llvmPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        "PATH=$llvmPath;$env:PATH" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: Build PHP extension (Windows)
      if: runner.os == 'Windows'
      id: build-windows
      shell: pwsh
      env:
        RUSTC_BOOTSTRAP: "1"
        CRATE_NAME: ${{ inputs.crate-name }}
        LIB_NAME: ${{ inputs.lib-name }}
        # Force /MD CRT for cc-rs MSVC builds. esaxx-rs (via gliner → tokenizers)
        # builds with cc-rs which defaults to /MT. kreuzberg-tesseract uses cmake-rs
        # which defaults to /MD. Linking both rlibs into kreuzberg_php.dll on
        # x86_64-pc-windows-msvc triggers LNK1319 mismatch. cc-rs honors
        # target-suffixed env vars only when compiling for that target, so safe
        # on non-Windows builds. See kreuzberg commit 1ce6be9b17.
        CFLAGS_x86_64_pc_windows_msvc: "/MD"
        CXXFLAGS_x86_64_pc_windows_msvc: "/MD"
        CFLAGS_i686_pc_windows_msvc: "/MD"
        CXXFLAGS_i686_pc_windows_msvc: "/MD"
      run: |
        $ErrorActionPreference = "Stop"
        $workspaceRoot = $env:GITHUB_WORKSPACE
        $crateDir = Join-Path $workspaceRoot "crates" $env:CRATE_NAME

        if (-not (Test-Path $crateDir)) {
          $crateDir = Join-Path $workspaceRoot "packages" $env:CRATE_NAME
        }

        if (-not (Test-Path $crateDir)) {
          throw "Crate directory not found"
        }

        $buildTemp = New-Item -ItemType Directory -Path (Join-Path $env:RUNNER_TEMP "build-$([Guid]::NewGuid())")
        Copy-Item -Path $crateDir -Destination (Join-Path $buildTemp "crate") -Recurse
        Set-Location (Join-Path $buildTemp "crate")

        # Strip workspace = true from Cargo.toml
        $cargoToml = Join-Path (Get-Location) "Cargo.toml"
        if (Test-Path $cargoToml) {
          $content = Get-Content $cargoToml -Raw
          if ($content -match 'workspace = true') {
            $content = $content -replace '^\s*workspace = true\s*$', ''
            Set-Content -Path $cargoToml -Value $content
          }
        }

        cargo generate-lockfile
        # Pin `time` to 0.3.47 to avoid the trait-impl conflict between `time` 0.3.48
        # and `cookie` 0.18.1 (E0119 in cookie 0.18.1). Tolerate absence in the graph.
        try { cargo update -p time --precise 0.3.47 } catch { Write-Host "time crate not in dep graph; skipping pin" }
        cargo build --locked --release

        $dllPath = Join-Path $workspaceRoot "target\release\$($env:LIB_NAME).dll"
        New-Item -ItemType Directory -Force -Path (Split-Path $dllPath) > $null
        Copy-Item -Path (Join-Path (Get-Location) "target\release\$($env:LIB_NAME).dll") -Destination $dllPath

        Set-Location $workspaceRoot
        Remove-Item -Path $buildTemp -Recurse -Force

        "dll=$dllPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
