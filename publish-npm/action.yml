name: Publish npm Packages
description: >
  Publish npm packages with dist-tag support.
  Supports two modes: .tgz files from a directory (packages-dir)
  or direct publish from a package directory (package-dir).
  Handles already-published versions idempotently.

  Authentication: OIDC-first. When NODE_AUTH_TOKEN is empty/unset, npm
  CLI v11+ exchanges the GHA OIDC token (audience: npm) for a short-lived
  npm credential via npmjs.org's trusted publishing flow — the caller's
  job only needs `permissions: id-token: write`. Classic NPM_TOKEN auth
  is still supported by setting NODE_AUTH_TOKEN in the caller's env.

inputs:
  packages-dir:
    description: "Directory containing .tgz package files (mutually exclusive with package-dir)"
    required: false
    default: ""
  package-dir:
    description: "Package directory to publish from directly via npm publish (mutually exclusive with packages-dir)"
    required: false
    default: ""
  npm-tag:
    description: "npm dist-tag to apply (e.g., latest, next, beta)"
    required: false
    default: "latest"
  access:
    description: "Package access level (public or restricted)"
    required: false
    default: "public"
  provenance:
    description: "Enable npm provenance attestation"
    required: false
    default: "true"
  dry-run:
    description: "Perform a dry run without actually publishing"
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Ensure npm supports OIDC trusted publishing
      shell: bash
      run: |
        # OIDC trusted publishing requires npm CLI v11.5.1+. Node 22 ships
        # npm 10.x, which falls through to classic-token auth and yields
        # `ENEEDAUTH` when no static token is provided. Upgrade in place.
        # See https://docs.npmjs.com/trusted-publishers for the exact CLI
        # version cutoff.
        npm_major=$(npm --version | cut -d. -f1)
        if [[ "${npm_major}" -lt 11 ]]; then
          echo "npm $(npm --version) does not support OIDC trusted publishing; upgrading to latest"
          npm install -g npm@latest
        else
          echo "npm $(npm --version) already supports OIDC trusted publishing"
        fi

    - name: Publish npm packages
      shell: bash
      env:
        NODE_AUTH_TOKEN: ${{ env.NODE_AUTH_TOKEN }}
        INPUT_PACKAGES_DIR: ${{ inputs.packages-dir }}
        INPUT_PACKAGE_DIR: ${{ inputs.package-dir }}
        INPUT_NPM_TAG: ${{ inputs.npm-tag }}
        INPUT_ACCESS: ${{ inputs.access }}
        INPUT_PROVENANCE: ${{ inputs.provenance }}
        INPUT_DRY_RUN: ${{ inputs.dry-run }}
      run: |
        python3 "${GITHUB_ACTION_PATH}/scripts/publish.py"
